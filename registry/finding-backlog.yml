# h5policy finding-catalog backlog.
#
# Every production finding code must appear in exactly one of this file or
# findings.yml.  This file is deliberately NOT a semantic catalog: an entry
# records only the source files that can emit the code.  Moving a code to
# findings.yml requires a reviewed record/invariant/scope mapping (and context
# rules when one code has more than one role).
#
# tools/check_registry.py derives the production inventory from the pickle
# sources plus the h5policy wrapper, checks these source lists exactly, and
# rejects untracked, stale, or doubly tracked codes.  The backlog therefore
# makes incomplete family migration explicit without inventing mappings.
