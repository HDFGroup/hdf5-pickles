    scope: policy
    invariant: elink.no_external_traverse
    record: external_link
    versions: [1]
    shared: false
    edge_type: external_target_path
    emitted_in: [h5policy/pickles/h5_dense_links.pk]
    message: external link traversal denied by the active profile
  H5_POLICY_VDS:
