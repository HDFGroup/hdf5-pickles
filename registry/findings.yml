    record: address_space_bounds
    # The superblock extension only exists for v2/v3 superblocks.
    versions: [2, 3]
    shared: false
    edge_type: file_address
    emitted_in: [h5policy/pickles/h5_walk.pk]
    message: superblock extension address aliases a reachable object header
    # Scope is reference_graph, not local_decode like its siblings in this
    # record: the address decodes fine and is in file: what is wrong is that
    # two roles claim one object header.  Detected in the duplicate-enqueue
    # suppression, which is reachable only because the extension is always
    # enqueued before the root.  Source case
    # cve/GHSA-3q59-vm8m-rmjw/38_ext-addr-eoa-bypass.h5 (variant).

