# h5policy finding catalog.
#
# One entry per REVIEWED stable finding code, keyed by the code string h5policy
# emits.  Codes still awaiting a semantic family/invariant mapping live in
# finding-backlog.yml; together the two files cover every production emit.
# The catalog records only the STATIC facts about a code: the invariant it
# proves, its validation scope, the record family and versions it applies to,
# whether the code is shared across families, and where it is emitted.
#
# Per-OCCURRENCE facts (absolute offset, object path, source/target intervals,
# primary-vs-consequential) belong on the emitted finding instance in a report,
# not here -- the catalog is the same for every file.
#
# Cross-checks enforced by tools/check_registry.py and h5policy/tests/run.sh:
#   - every production code appears in exactly one of this file or the backlog
#   - every `invariant` id here appears in validation-coverage.yml
#   - every `emitted_in` claim names a source that carries the code; backlog
#     source lists must be complete
#   - duplicate, untracked, and stale codes fail the registry check
#
# The catalog now spans all 16 registered families as vertical slices. Shared
# codes are catalogued in one record's role and flagged `shared: true`; context
# rules grow as other roles are reviewed. Remaining family work is explicit in
# finding-backlog.yml rather than being silently absent.
schema_version: 1

findings:

  # ── object-header continuation family (strategy §5) ────────────────────────

  H5_CORRUPT_ZERO_CONTINUATION_CHUNK:
    severity: corrupt
    scope: reference_graph
    invariant: continuation.nonzero_extent
    record: object_header_continuation
    versions: [1, 2]
    shared: false
    edge_type: object_header_chunk
    emitted_in: [h5policy/pickles/h5_dispatch.pk]
    message: object-header continuation chunk has zero size

  H5_CORRUPT_SELF_REFERENTIAL_CONTINUATION:
    severity: corrupt
    scope: reference_graph
    invariant: continuation.no_source_overlap
    record: object_header_continuation
    versions: [1, 2]
    shared: false
    edge_type: object_header_chunk
    emitted_in: [h5policy/pickles/h5_dispatch.pk]
    message: object-header continuation chunk overlaps its own source chunk
    # Generalized from the pre-interval-model exact test (cont_addr == chunk_off)
    # to any shared byte between the target interval and the source chunk's
    # physical extent. See cases/continuation-self-overlap.yml.

  H5_CORRUPT_NON_PROGRESS_LOOP:
    severity: corrupt
    scope: reference_graph
    invariant: continuation.no_chunk_alias
    record: object_header_continuation
    versions: [1, 2]
    shared: false
    edge_type: object_header_chunk
    emitted_in: [h5policy/pickles/h5_dispatch.pk]
    message: object-header continuation chunk overlaps an already-decoded chunk
    # Interval alias against the set of continuation chunks already decoded on
    # this walk (was: exact start-address revisit).

  H5_RESOURCE_OBJECT_HEADER_CHUNKS:
    severity: resource
    scope: resource
    invariant: continuation.chunk_budget
    record: object_header_continuation
    versions: [1, 2]
    shared: false
    edge_type: object_header_chunk
    emitted_in: [h5policy/pickles/h5_dispatch.pk]
    message: object-header continuation chunk budget exceeded
    # Charged only AFTER a target clears bounds and the overlap gate, so a
    # rejected, self-referential, or aliased chunk never inflates the budget.

  # ── shared codes, in their continuation-envelope role ──────────────────────
  # These prove continuation invariants here but are emitted by many families;
  # `roles` will grow as other families are catalogued.

  # H5_CORRUPT_OFFSET_OUT_OF_FILE was defined twice -- once here in its
  # object-header-continuation role and once below in its address-space role.
  # YAML keeps only the last, so this definition was silently dead.  Both roles
  # now live on the single entry below as `contexts`; see the README.

  H5_CORRUPT_MESSAGE_OVERRUNS_CHUNK:
    severity: corrupt
    scope: reference_graph
    invariant: continuation.valid_envelope
    record: object_header_continuation
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via `contexts` below.
    ambiguous: true
    versions: [2]
    shared: true
    edge_type: object_header_chunk
    emitted_in: [h5policy/pickles/h5_dispatch.pk]
    message: v2 continuation chunk is too small for its signature and checksum

  H5_CORRUPT_BAD_SIGNATURE:
    severity: corrupt
    scope: reference_graph
    invariant: continuation.valid_envelope
    record: object_header_continuation
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via `contexts` below.
    ambiguous: true
    contexts:
      - match: "HDF5 signature was not found at a valid superblock offset"
        record: validation_controls
        invariant: control.base_address
        evidence: fixture
    versions: [2]
    shared: true
    edge_type: object_header_chunk
    emitted_in: [h5policy/pickles/h5_dispatch.pk]
    message: v2 continuation chunk signature mismatch   # expects OCHK

  H5_CORRUPT_BAD_CHECKSUM:
    severity: corrupt
    scope: reference_graph
    invariant: continuation.valid_checksum
    record: object_header_continuation
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via `contexts` below.
    ambiguous: true
    contexts:
      # Dense ATTRIBUTE storage, so the family is heap_structures, whose
      # exercise drives H5Aopen_by_idx.  The dense_index exercise drives
      # H5Lvisit2, which never reaches an attribute index.
      - match: "dense attribute v2 B-tree internal node checksum mismatch"
        record: heap_structures
        evidence: curated
      - match: "dense creation-order v2 B-tree node checksum mismatch"
        record: heap_structures
        evidence: curated
      - match: "SOHM v2 B-tree leaf checksum mismatch"
        record: shared_messages_legacy
        evidence: fixture
      - match: "v2 B-tree chunk leaf checksum mismatch"
        record: chunk_index
        evidence: fixture
      - match: "dense link v2 B-tree header checksum mismatch"
        record: dense_index
        evidence: fixture
      - match: "dense link v2 B-tree leaf checksum mismatch"
        record: dense_index
        evidence: fixture
      - match: "fractal heap direct block checksum mismatch"
        record: heap_structures
        evidence: fixture
      - match: "fractal heap indirect block checksum mismatch"
        record: heap_structures
        evidence: fixture
      - match: "fractal heap header checksum mismatch"
        record: heap_structures
        evidence: fixture
      - match: "extensible-array data block checksum mismatch"
        record: chunk_index
        evidence: fixture
      - match: "free-space section list checksum mismatch"
        record: validation_controls
        evidence: fixture
      - match: "object-header checksum mismatch"
        record: message_envelope
        evidence: fixture
    versions: [2]
    shared: true
    edge_type: object_header_chunk
    emitted_in: [h5policy/pickles/h5_dispatch.pk]
    message: v2 continuation chunk checksum mismatch

  # ── external-reference family: EFL, external links, VDS (strategy §7) ───────
