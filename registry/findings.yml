    ambiguous: true
    contexts:
      - match: "group B-tree node body outside file"
        record: btree_heap_index
        invariant: btree.extent_bounds
        evidence: curated
      # An address-range bound, not datatype arithmetic.  Exercised by
      # malformed/contiguous_data_past_eof.h5, where the range check is the
      # only thing that fires.
      - match: "contiguous data range outside file"
