    ambiguous: true
    contexts:
    # Ordered LONGEST MATCH FIRST -- substring matching, first hit wins.
    #
    # This code is not a defect in the FILE: it says the validator declined to
    # decode something.  The `record` is still the structural family rather than
    # validation_controls, because `record` selects the exact-build canary
    # (CANARY_BY_RECORD in tools/h5cve) -- and "we skipped this; what does
    # libhdf5 do with it?" is exactly the question a coverage gap raises.
    # Routing them all to validation_controls would run the free-space canary
    # for, say, a dense-link fractal-heap gap: the wrong surface entirely.
    #
    # The invariant is the family's own `*.decode_coverage` -- "the validator
    # decodes this family's structures rather than skipping them" -- a statement
    # about OUR coverage, which is what the coverage manifest records.  Only the
    # two genuinely file-level surfaces (driver member files, non-file
    # free-space managers) keep control.coverage_gap.
    #
    # scope stays `policy`: a validator-policy outcome, not a decode,
    # record-local, or graph failure.
      - match: "shared object-header message is not stored in a committed object header"
        record: shared_messages_legacy
        invariant: sohm.decode_coverage
        scope: policy
        evidence: curated
      - match: "dense attribute storage uses an unsupported fractal-heap/B-tree layout"
