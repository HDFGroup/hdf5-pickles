# Three size-arithmetic divergences surfaced by the contract sweep and
# deliberately NOT yet investigated. Filed so they are a tracked queue rather
# than an unexplained allowance in the matrix policy.
#
# These are flagged as the highest-priority outstanding divergences because they
# are the only ones so far whose SHAPE is integer overflow / bounds arithmetic
# rather than an unverified checksum. Every genuine divergence found to date has
# been a corruption-detection gap with no memory-safety consequence; an
# arithmetic gap is the category where that could stop being true. That is a
# reason to look, not a claim that it is exploitable.
schema_version: 1

id: arithmetic-divergences-backlog
title: libhdf5 accepts three files whose size/bounds arithmetic h5policy rejects
status: uninvestigated
disclosure: "n/a — not yet assessed"

root_cause_classification: local_decode
entry_points:
  - h5policy (oracle)
  - "libhdf5 — accepts via h5dump, h5ls -r and h5py alike"

items:
  - fixture: h5policy/tests/malformed/chunk_size_uint32_wrap.h5
    record: dataset_layout_filter_fill
    invariant: layout.chunk_size_32bit
    oracle: reject_corrupt
    libhdf5: accepted
    question: >-
      The encoded chunk dimensions multiply to a byte size that wraps a
      uint32_t (H5O_layout_chunk_t.size). Does libhdf5 then allocate or read
      against the WRAPPED value while indexing against the unwrapped one?

  - fixture: h5policy/tests/malformed/compound_member_array_bounds.h5
    record: datatypes
    invariant: datatype.compound_member_bounds
    oracle: reject_corrupt
    libhdf5: accepted
    question: >-
      A compound member array extends past its parent datatype's size. Is the
      member ever read at its declared extent?

  - fixture: h5policy/tests/malformed/compound_member_array_nelem_overflow.h5
    record: datatypes
    invariant: datatype.size_arithmetic
    oracle: reject_corrupt
    libhdf5: accepted
    question: >-
      The member array element count overflows. Same question as above, reached
      through the count rather than the bounds.

# ── How to investigate ────────────────────────────────────────────────────────
method: >-
  The pattern that worked for the SOHM and dense-attribute cases: find the path
  that actually USES the value, not just the one that decodes it, and run the
  valid base as a control so a null result is interpretable. Here that means
  reading the dataset/attribute and comparing the bytes returned against the
  bytes on disk -- acceptance alone proves nothing, since a value that is
  decoded but never used cannot hurt anyone.

caution: >-
  The matrix currently allows `violation` for all three so it stays green. That
  allowance is provisional and is the reason this file exists: it must not be
  read as a judgement that these are benign.

provenance:
  found_by: "h5cve matrix — contract sweep over previously uncontracted fixtures"
