# Worked example instantiating cve-case.yml — libhdf5 does not enforce a link
# name's declared character set. Not a numbered CVE: no memory-safety
# consequence established.
schema_version: 1

id: link-name-charset-unenforced
title: libhdf5 accepts a link name declared ASCII that contains a high-bit byte
status: reported-upstream-candidate
disclosure: "n/a — input-validation gap, no memory-safety consequence established"

# ── Triage (§11.2) ────────────────────────────────────────────────────────────
record: dense_index
versions: [1, 2]
entry_points:
  - h5policy (oracle)
  - "libhdf5 link traversal (H5Lvisit2 / H5Literate) — confirmed reached"
root_cause_classification: local_decode
violated_invariant: dense.link_name_charset
validation_closure: >-
  a link name message declaring H5T_CSET_ASCII must contain only bytes that are
  valid in that character set, checked when the name is decoded rather than
  left to the consumer.
activation_before_validation:
  - none

# ── Oracle behaviour ──────────────────────────────────────────────────────────
oracle:
  profile: untrusted-strict
  decision: reject_corrupt
  primary_finding: H5_CORRUPT_LINK_NAME_CHARSET

# ── Divergence evidence ───────────────────────────────────────────────────────
divergence:
  oracle: reject_corrupt
  libhdf5: accepted
  libhdf5_version: 2.2.0
  probes:
    - "h5dump           -> exit 0, 39 lines, no diagnostic"
    - "h5ls -r          -> exit 0, 6 objects listed"
    - "h5py .visit()    -> OK, 5 objects visited"
    - "h5probe --exercise dense_index -> accepted, H5Lvisit2 succeeded"
  note: >-
    Measured against the selected build; not inferred from the format spec.

# ── Containment vs systemic (§11.5) ───────────────────────────────────────────
containment:
  status: landed
  description: >-
    h5policy rejects: the link-name decoder validates the name bytes against
    the charset the message declares.
systemic:
  semantic_boundary: link name decoding
  status: linked-followup
  owner: TODO
  description: >-
    Upstream follow-up for libhdf5: either validate names against the declared
    charset at decode time, or document that the charset field is advisory and
    that consumers must not assume it. Severity is low — the consequence is a
    name that is not what its metadata claims, which matters for consumers that
    decode it as ASCII, not for memory safety.

# ── Reproducers (§11.4) ───────────────────────────────────────────────────────
reproducers:
  direct_fixture: h5policy/tests/malformed/bad_link_name_charset.h5
  generator: "h5policy-gencorpus: _make_bad_link_name_charset"
  assertions:
    stable_finding: true
    no_plugin_load: true
    no_decompression: true
    no_external_open: true

sibling_audit: >-
  Open: every other name-bearing message carrying a charset field — attribute
  names, and dense (fractal-heap-backed) link names as opposed to the compact
  link this fixture uses.

coverage_manifest_change: >-
  dense_index already covered (invariant dense.link_name_charset); this fixture
  is the family's malformed canary specimen.

provenance:
  found_by: >-
    canary reachability audit — contracting previously uncontracted malformed
    fixtures to give dense_index a malformed specimen
