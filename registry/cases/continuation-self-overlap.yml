# Worked example instantiating cve-case.yml — the object-header continuation
# self-overlap hardening (reference-graph interval model, strategy §5). Not a
# numbered CVE: proactive closure of the continuation-family evasion gap.
schema_version: 1

id: continuation-self-overlap
title: Object-header continuation overlapping its own source chunk evaded the self-reference test
status: contained
disclosure: "n/a — proactive hardening on branch docs/cve-process"

# ── Triage (§11.2) ────────────────────────────────────────────────────────────
record: object_header_continuation
versions: [1, 2]
entry_points:
  - h5policy (oracle)
  - "libhdf5 object-header decode (H5O__load / continuation follow) — unverified"
root_cause_classification: reference_graph
violated_invariant: continuation.no_source_overlap
validation_closure: >-
  the object-header continuation closure — the source chunk plus every chunk its
  continuation messages reach — must be validated as a set before any chunk is
  counted or followed.
activation_before_validation:
  # h5policy performs no materialization/activation at any point. The selected
  # libhdf5 build was probed too (see verification.exact_build_probe): it rejects
  # the file in traversal with zero objects materialized and zero OS-observable
  # activation events. Internal events (cache insertion, ID registration, user
  # callbacks) are not OS-observable and remain unverified pending option-B
  # instrumentation.
  - none

# ── Oracle behaviour ──────────────────────────────────────────────────────────
oracle:
  profile: untrusted-strict
  decision: reject_corrupt
  primary_finding: H5_CORRUPT_SELF_REFERENTIAL_CONTINUATION
  object_path: "/"
  offset: null      # payload offset of the continuation message; file-specific

# ── Containment vs systemic (§11.5) ───────────────────────────────────────────
containment:
  status: landed
  description: >-
    Interval model in h5policy — the continuation coordinator tracks each
    chunk's occupied [lo, hi) extent instead of bare start addresses, rejects
    any target that shares a byte with its source chunk or an already-decoded
    chunk, and counts a chunk only after it clears that gate.
systemic:
  semantic_boundary: object-header continuation closure
  status: linked-followup
  owner: "n/a — libhdf5 enforcement + exact-build activation probe (roadmap change #3) pending"
backports: []

# ── Reproducers (§11.4) ───────────────────────────────────────────────────────
reproducers:
  integration_poc: "n/a — no full-file libhdf5 crash PoC; synthesized oracle demonstrator"
  direct_fixture: h5policy/tests/malformed/continuation_overlaps_source.h5
  generator: "h5policy-gencorpus :: _make_continuation_overlaps_source (repoints root continuation to root_off + 4)"
  assertions:
    stable_finding: true          # H5_CORRUPT_SELF_REFERENTIAL_CONTINUATION, chunk_count == 0
    fails_before_materialization: true   # oracle never materializes; probe: objects=0
    no_plugin_load: true          # oracle expectation + probe: plugin_load count 0
    no_decompression: true        # probe: no filter plugin loaded, no data path reached
    no_external_open: true        # oracle expectation + probe: external_open count 0
    no_user_callback: unverified  # not OS-observable; needs option-B internal counters
    no_legacy_fallback: true      # h5policy has no legacy decoder; libhdf5 side unverified

# ── Variants and corpus (§11.5) ───────────────────────────────────────────────
sibling_audit: >-
  Both v1 and v2 continuations share the coordinator and the interval gate. The
  alias case (overlap with a previously-decoded chunk) maps to
  H5_CORRUPT_NON_PROGRESS_LOOP. Typed continuation mutation recipes (target at
  source start/inside/end/adjacent; partial/full/duplicate overlap; cycles) are
  roadmap change #4 and still planned — see validation-coverage.yml fuzz_targets.
fuzz_seed: h5policy/tests/valid/continuation_chunks.h5
coverage_manifest_change: >-
  object_header_continuation added to validation-coverage.yml as covered /
  oracle-enforced with nine invariants; continuation.no_source_overlap and
  continuation.no_chunk_alias generalized from exact-address to interval checks.
compatibility_backport_risks: >-
  None for valid files — valid multi-chunk continuations still accept with all
  chunks counted (valid/continuation_chunks.h5). The old exact test is a strict
  subset of the interval test, so no previously-rejected file becomes accepted.

# ── Provenance (byte-reproducible fixture; timestamps pinned) ─────────────────
provenance:
  input_sha256: 8f8c8fbf44677cbc644ac67d35e023503ed1a6e9ce6bae309407888169d74bd1
  h5policy_commit: 520a59e
  poke_version: GNU poke 4.3

# ── Exact-build libhdf5 verification (roadmap change #3, OS-level layer) ───────
# Reproduce: h5policy/tools/h5policy-probe <fixture> --hdf5-bindir <DIR> --json
#            --forbid external_open,plugin_load,write,network,crash
verification:
  exact_build_probe:
    tool: h5policy-probe
    outcome: rejected_in_traversal   # opened a handle, refused during traversal, no crash
    libhdf5_version: "2.2.0"
    linked_library: /home/bob/.local/lib/libhdf5.so.1000
    build_mode: Release
    settings_sha256: 03a2abb3389353da0b406cb21f938f86c76356728639507cc0a04d66de2026ad
    materialization: {objects: 0, datasets: 0, data_reads: 0, call_errors: 1}
    activation: {external_open: 0, plugin_load: 0, write: 0, network: 0}
    forbidden_events_observed: none
    scope_note: >-
      OS-observable events only. Rejection precedes object/data materialization
      (objects=0). Internal ordering (cache insertion, ID registration) is not
      covered by this layer and needs a patched instrumented build.
