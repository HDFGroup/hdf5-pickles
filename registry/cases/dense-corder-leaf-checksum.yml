# Worked example instantiating cve-case.yml — a libhdf5 corruption-detection
# gap found by investigating the h5cve matrix `oracle_alignment: divergent`
# rows. Not a numbered CVE: no memory-safety consequence is established, and a
# checksum is not an attacker barrier. Filed so the divergence is explained
# rather than parked in an allowlist.
schema_version: 1

id: dense-corder-leaf-checksum
title: libhdf5 walks a dense-attribute creation-order B-tree leaf without validating its checksum
status: reported-upstream-candidate
disclosure: "n/a — robustness gap, not a security boundary"

# ── Triage (§11.2) ────────────────────────────────────────────────────────────
record: heap_structures
versions: [2]
# The gap is in the creation-order traversal path generally, not in attribute
# handling specifically: dense LINK storage has it too, covered by
# h5policy/tests/malformed/bad_dense_link_corder_leaf_checksum.h5.
entry_points:
  - h5policy (oracle)
  - "libhdf5 H5Aopen_by_idx(H5_INDEX_CRT_ORDER) / H5Aread — confirmed reached"
root_cause_classification: record_local
violated_invariant: null      # no catalogued invariant for a dense corder-leaf
                              # checksum yet; see coverage_manifest_change
validation_closure: >-
  a dense-attribute creation-order v2 B-tree node must have its stored lookup3
  checksum verified before any record in it is decoded or followed.
activation_before_validation:
  # No OS-observable activation: no external open, plugin load, write or
  # network. The gap is that libhdf5 decodes and returns attribute data from a
  # node whose integrity check it never performed.
  - none

# ── Oracle behaviour ──────────────────────────────────────────────────────────
oracle:
  profile: untrusted-strict
  decision: reject_corrupt
  primary_finding: H5_CORRUPT_BAD_CHECKSUM
  primary_finding_message: dense creation-order v2 B-tree node checksum mismatch
  object_path: "/d"

# ── Divergence evidence ───────────────────────────────────────────────────────
# The corrupt leaf IS on the traversal path: the type-9 tree's root is an
# internal node and creation-order iteration of all 40 attributes visits every
# leaf. So this is a genuine unvalidated-checksum case, not a not-reached one.
divergence:
  oracle: reject_corrupt
  libhdf5: accepted
  libhdf5_version: 2.2.0
  probes:
    - "H5Aopen_by_idx(H5_INDEX_CRT_ORDER) x40 -> opened=40 read_ok=40 open_fail=0"
    - "control, valid base -> opened=30 read_ok=30 (test discriminates)"
    - "h5dump (full data dump) -> exit 0, no diagnostic"
  contrast: >-
    The sibling fixture bad_dense_btin_checksum.h5 damages a NAME-index BTIN in
    the same file family and libhdf5 does reject it (all 30 attribute opens
    fail), so checksum verification is present on that path and absent on the
    creation-order path.

# ── Containment vs systemic (§11.5) ───────────────────────────────────────────
containment:
  status: landed
  description: >-
    h5policy already rejects: the dense creation-order walker verifies the
    stored lookup3 checksum of each node before decoding its records.
systemic:
  semantic_boundary: dense creation-order index integrity
  status: linked-followup
  owner: TODO
  description: >-
    Upstream follow-up for libhdf5: verify the node checksum on the
    creation-order traversal path as it already does on the name-index path.
    Severity is low as a security matter — an attacker who can edit the leaf can
    also recompute its checksum — so the material question is whether the
    RECORDS in that leaf are independently bounds-checked. That is a separate
    audit, tracked below.

# ── Reproducers (§11.4) ───────────────────────────────────────────────────────
reproducers:
  direct_fixture: h5policy/tests/malformed/bad_dense_attr_corder_leaf_checksum.h5
  generator: "h5policy-gencorpus: _make_bad_dense_corder_leaf_checksum (type 9)"
  assertions:
    stable_finding: true
    no_plugin_load: true
    no_decompression: true
    no_external_open: true

sibling_audit: >-
  Open question, NOT yet answered: are the attribute records inside an
  unverified creation-order leaf bounds-checked independently? If they are not,
  a crafted leaf with a recomputed checksum reaches the same decode path and the
  severity assessment above changes. This is the follow-up worth doing.

coverage_manifest_change: >-
  TODO: heap_structures has no catalogued invariant for a dense creation-order
  node checksum. Add one (e.g. heap.corder_node_checksum) mapping to
  H5_CORRUPT_BAD_CHECKSUM, and give that message's grouped route rule the
  invariant id.

provenance:
  found_by: "h5cve matrix — oracle_alignment: divergent"
  case_bundle: "cases/div_dense_attr_corder_leaf (git-ignored working scratch)"
