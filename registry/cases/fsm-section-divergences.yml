# Two free-space-manager divergences surfaced when the free_space canary gave
# the validation_controls family a reachable surface for the first time. Filed so
# they are a tracked queue rather than an unexplained allowance in the matrix
# policy — same convention as arithmetic-divergences-backlog.yml.
#
# Why these rank high: unlike a checksum gap, a free-space section extent is not
# merely decoded and dropped. H5FS__cache_sinfo_deserialize passes each decoded
# section to H5FS_sect_add, which links it into the manager's live skip lists
# (H5FS__sect_link) and may merge it against neighbours — all while still inside
# the cache deserialize callback. The value is therefore USED to build native
# state before anything has established that it lies within the file. That is a
# reason to look, not a claim that it is exploitable.
schema_version: 1

id: fsm-section-divergences
title: libhdf5 accepts two files whose free-space section records h5policy rejects
status: uninvestigated
disclosure: "n/a — not yet assessed"

record: validation_controls
root_cause_classification: local_decode
entry_points:
  - h5policy (oracle)
  - "libhdf5 — H5Fget_free_sections (nothing else decodes FSHD/FSSE; a plain open
     and an object walk do not reach the manager at all)"

items:
  - fixture: h5policy/tests/malformed/bad_fsm_section_extent.h5
    invariant: control.fsm_section_extent
    oracle: reject_corrupt
    libhdf5: accepted
    measured: >-
      H5Fget_free_sections returns 7 sections, of which 1 has an extent that is
      not inside the file (probe counter free_sections_out_of_bounds=1).
    question: >-
      The library hands a caller a free-space region outside the file image. Is
      that region ever allocated from, read, or written on a subsequent write-mode
      open? The reporting path alone is already a soundness gap.

  - fixture: h5policy/tests/malformed/bad_fsm_section_count.h5
    invariant: control.fsm_section_extent
    oracle: reject_corrupt
    libhdf5: accepted
    measured: >-
      H5Fget_free_sections returns 8 sections, none out of bounds.
    question: >-
      The encoded section count disagrees with what the oracle accepts, yet every
      section reported is in-bounds. Is libhdf5 silently clamping, or is it
      reading section records past the encoded set?

# ── What makes this family's contrast informative ─────────────────────────────
contrast: >-
  libhdf5 is NOT uniformly permissive here. On the sibling fixtures
  bad_fsm_section_list_checksum.h5 and bad_fsm_section_type.h5 it reaches the
  section list and refuses it (rejected_in_traversal, aligned with the oracle).
  So the FSSE checksum and the section type ARE validated, while the section
  extent and count are not. That asymmetry is the thing to explain, and it makes
  "the field is simply never checked" the leading hypothesis for the two above.

# ── How to investigate ────────────────────────────────────────────────────────
method: >-
  Same pattern as the SOHM and dense-attribute cases: find the path that USES the
  value, not just the one that decodes it, and run a valid free-space fixture as
  a control so a null result is interpretable. Concretely: reopen in write mode so
  the manager is consulted for allocation, and check whether an out-of-bounds
  section can be selected to satisfy a request. Acceptance alone proves nothing.

caution: >-
  The matrix allows `verified` for both so it stays green. That allowance is
  provisional and is the reason this file exists: it must not be read as a
  judgement that these are benign. Note that `verified` here means the CANARY
  ran, not that libhdf5 behaved correctly — the row is simultaneously
  `verified` and `oracle_alignment: divergent`.

provenance:
  found_by: "h5cve matrix — first contract sweep after adding the free_space canary"
