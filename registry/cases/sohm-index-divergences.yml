# Four SOHM divergences, recorded together because one experiment splits them
# into two verdicts. Not numbered CVEs: no memory-safety consequence
# established.
schema_version: 1

id: sohm-index-divergences
title: Shared-object-header-message index validation is lazy, and two fields are never validated at all
status: partially-explained
disclosure: "n/a — validation gaps, no memory-safety consequence established"

record: shared_messages_legacy
versions: [1, 2]
entry_points:
  - h5policy (oracle)
  - "libhdf5 read path (H5Fopen/H5Ovisit3/H5Dget_type) — confirmed reached"
  - "libhdf5 write path (H5Dcreate2, which consults the dedup index)"
root_cause_classification: reference_graph

# ── The discriminating experiment ─────────────────────────────────────────────
# The SOHM index is a dedup structure consulted when a shared message is STORED.
# A read-only consumer never traverses it. So "libhdf5 accepted the file" cannot
# by itself distinguish "libhdf5 tolerates the corruption" from "libhdf5 never
# looked". Forcing a write (H5Dcreate2) makes it look, and the valid bases are
# the control that proves the test discriminates.
experiment:
  read_path: >-
    h5dump, h5ls -r and h5py all accept ALL FOUR fixtures (102 objects visited
    on the btree ones), so the read path is uninformative for every one of them.
  write_path:
    valid/sohm_btree.h5: H5Dcreate2 SUCCEEDED      # control
    valid/sohm_list.h5: H5Dcreate2 SUCCEEDED       # control
    malformed/bad_sohm_btree_cycle.h5: H5Dcreate2 FAILED
    malformed/bad_sohm_btree_deep_checksum.h5: H5Dcreate2 FAILED
    malformed/bad_sohm_btree_record_location.h5: H5Dcreate2 SUCCEEDED
    malformed/bad_sohm_list_location.h5: H5Dcreate2 SUCCEEDED

# ── Two verdicts ──────────────────────────────────────────────────────────────
findings:
  - fixtures: [bad_sohm_btree_cycle, bad_sohm_btree_deep_checksum]
    verdict: legitimate_divergence__lazy_vs_eager
    detail: >-
      libhdf5 does validate these, on the path that actually uses the index.
      h5policy is eager where libhdf5 is lazy. Exposure is limited to consumers
      that open untrusted files READ-WRITE, and there the failure is a clean
      error. Matches the earlier finding for bad_sohm_btree_child_address.
  - fixtures: [bad_sohm_btree_record_location, bad_sohm_list_location]
    verdict: genuine_gap__never_validated
    detail: >-
      These are accepted on the write path too, indistinguishably from the valid
      base, so the record/list location is never checked at all. This is the
      more interesting half: a location field that no path validates is one an
      attacker controls without needing to defeat any check. Whether a bad
      location can be steered somewhere harmful is NOT yet established.

containment:
  status: landed
  description: >-
    h5policy rejects all four: the SOHM walker validates child addresses, node
    checksums, cycles, and record/list locations before following them.
systemic:
  semantic_boundary: shared-message index integrity
  status: linked-followup
  owner: TODO
  description: >-
    Upstream follow-up: validate SOHM record and list locations at decode time.
    The lazy-index half needs no fix, only documentation that read-only
    consumers never traverse the index.

sibling_audit: >-
  Not yet done: whether a crafted SOHM record/list location is merely tolerated
  or is actually dereferenced somewhere. That is the question that decides
  whether the second verdict is a robustness gap or something sharper.

coverage_manifest_change: >-
  shared_messages_legacy already covered (sohm.child_address, sohm.no_cycle,
  sohm.location). These fixtures are now contracted, so the family's canary has
  four malformed specimens rather than none.

provenance:
  found_by: "h5cve matrix — contract sweep over previously uncontracted fixtures"
