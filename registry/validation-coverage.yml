      source_cases: [cve/37_sizeof-size-uninit-length.h5]
      entry_point_driver: bounded shared-message resolution and legacy object-open canary
      ci_checks: reference-count closure, version handling, padding checks, and no-crash assertions
    tests:
      - {path: h5policy/tests/expected/valid-shared_attr_datatype.yml, asserts: shared.storage_address}
      - {path: h5policy/tests/expected/malformed-bad_sohm_btree_child_address.yml, asserts: sohm.child_address}
      - {path: h5policy/tests/expected/valid-userblock_latest.yml, asserts: shared_messages_legacy.bypass_unexercised}
    validators: {h5policy: enforced, hdf5: partial}
    coverage_status: partial
    migration_status: oracle-partial

  - record: message_envelope
    section: "IV.A.2 — Object-header messages and legacy envelopes"
    scope: local_decode
    semantic_boundary: message versions, flags, declared lengths, and padding
    invariants:
      - {id: envelope.layout_minimum_size, finding: H5_CORRUPT_LAYOUT_MESSAGE_TOO_SMALL}
      - {id: envelope.object_header_version, finding: H5_CORRUPT_UNSUPPORTED_OBJECT_HEADER_VERSION}
      - {id: envelope.group_info_version, finding: H5_CORRUPT_UNSUPPORTED_GROUP_INFO_VERSION}
      - {id: envelope.group_info_trailing_bytes, finding: H5_CORRUPT_GROUP_INFO_TRAILING_BYTES}
      - {id: envelope.link_info_max_corder, finding: H5_CORRUPT_LINK_INFO_NEGATIVE_MAX_CORDER}
      - {id: envelope.link_info_trailing_bytes, finding: H5_CORRUPT_LINK_INFO_TRAILING_BYTES}
      - {id: envelope.message_flags, finding: H5_CORRUPT_MESSAGE_FLAG_COMBINATION}
      - {id: envelope.null_gap, finding: H5_CORRUPT_NULL_MESSAGE_GAP}
      - {id: envelope.message_count, finding: H5_CORRUPT_OBJECT_HEADER_MESSAGE_COUNT}
      - {id: envelope.symbol_table_cache_type, finding: H5_CORRUPT_SYMBOL_TABLE_CACHE_TYPE}
      - {id: envelope.symbol_table_node_version, finding: H5_CORRUPT_UNSUPPORTED_SYMBOL_TABLE_NODE_VERSION}
      - {id: envelope.attribute_complete, finding: [H5_CORRUPT_ATTRIBUTE_MESSAGE_TOO_SMALL, H5_CORRUPT_ATTRIBUTE_OVERRUNS_MESSAGE]}
      - {id: envelope.attribute_name_nonempty, finding: H5_CORRUPT_ATTRIBUTE_NAME_EMPTY}
      # Attribute raw value bytes are embedded in the attribute MESSAGE, so the
      # budget on them is this family's, like that message's other checks.
      - {id: envelope.single_value_budget, finding: H5_RESOURCE_SINGLE_VALUE_BYTES}
      - {id: envelope.attribute_version_supported, finding: H5_CORRUPT_UNSUPPORTED_ATTRIBUTE_VERSION}
      - {id: envelope.group_info_complete, finding: H5_CORRUPT_GROUP_INFO_MESSAGE_TOO_SMALL}
      - {id: envelope.group_info_flags, finding: H5_CORRUPT_GROUP_INFO_FLAGS}
      - {id: envelope.link_info_complete, finding: H5_CORRUPT_LINK_INFO_MESSAGE_TOO_SMALL}
      - {id: envelope.link_info_flags, finding: H5_CORRUPT_LINK_INFO_FLAGS}
      - {id: envelope.link_info_version_supported, finding: H5_CORRUPT_UNSUPPORTED_LINK_INFO_VERSION}
      - {id: envelope.link_message_complete, finding: H5_CORRUPT_LINK_MESSAGE_TOO_SMALL}
      # h5policy_validate_link_payload decodes a link identically for an
      # object-header message and for a dense index's heap record; the role in
      # the finding message says which.  These are this family's half.
      - {id: envelope.link_name_nonempty, finding: H5_CORRUPT_LINK_NAME_EMPTY}
      - {id: envelope.address_in_file, finding: [H5_CORRUPT_OFFSET_OUT_OF_FILE, H5_CORRUPT_LENGTH_OVERFLOW]}
      - {id: envelope.link_version_supported, finding: H5_CORRUPT_UNSUPPORTED_LINK_VERSION}
      - {id: envelope.message_shareable, finding: H5_CORRUPT_MESSAGE_FLAG_UNSHAREABLE}
      - {id: envelope.name_nonempty, finding: H5_CORRUPT_NAME_MESSAGE_EMPTY}
      - {id: envelope.symbol_table_complete, finding: H5_CORRUPT_SYMBOL_TABLE_MESSAGE_TOO_SMALL}
      - {id: envelope.symbol_table_reserved_zero, finding: H5_CORRUPT_SYMBOL_TABLE_NODE_RESERVED}
      - {id: envelope.mtime_encoding, finding: [H5_CORRUPT_MTIME_MESSAGE_SIZE, H5_CORRUPT_MTIME_RESERVED, H5_CORRUPT_UNSUPPORTED_MTIME_VERSION]}
      # Stored checksum must match the block, and the block must be large
      # enough to hold it.
      - {id: envelope.checksum_valid, finding: H5_CORRUPT_BAD_CHECKSUM}
      # Size and offset arithmetic must stay inside the validator's domain.
      - {id: envelope.size_arithmetic, finding: H5_CORRUPT_LENGTH_OVERFLOW}
      # The validator DECODES this family's structures rather than skipping
      # them; the finding fires where coverage stops.
      - {id: envelope.decode_coverage, finding: H5_UNSUPPORTED_PICKLE_COVERAGE_GAP}
    backlog:
      validator: h5policy message/object-header validators
      stable_findings: message-envelope catalog entries
      fixtures:
        - h5policy/tests/expected/valid-continuation_chunks.yml
        - h5policy/tests/expected/malformed-bad_message_flag_combination.yml
      entry_point_driver: h5cve bounded H5Ovisit3/H5Oopen object-header envelope traversal
      ci_checks: version, length, flag, and padding checks
    tests:
      - {path: h5policy/tests/expected/valid-continuation_chunks.yml, asserts: envelope.message_flags}
      - {path: h5policy/tests/expected/malformed-bad_message_flag_combination.yml, asserts: envelope.message_flags}
      - {path: h5policy/tests/expected/malformed-bad_message_flag_combination.yml, asserts: message_envelope.unexercised_on_open_reject}
