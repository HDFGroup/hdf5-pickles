# h5policy validation-coverage manifest.
#
# One entry per record family: the invariants that family requires (strategy
# doc §5 / §11.5), the finding each maps to, where the oracle enforces it, the
# tests and fuzz targets that exercise it, and its migration status.
#
# `validators.h5policy` describes the ORACLE. `validators.hdf5` is a SEPARATE
# claim about libhdf5 and must be proven per §11.4-11.5, never inferred from
# h5policy's own verdict. `unverified` means exactly that: not yet established
# by an exact-build probe.
#
# Statuses:
#   coverage_status : covered | partial | coverage_gap
#   migration_status: oracle-enforced | oracle-partial | not-modeled
#   validators.*    : enforced | partial | unverified | not-modeled
#
# Catalogued families: object_header_continuation (§5) and the external-reference
# family -- EFL, external links, VDS (§7). `invariants[*].id` values are the
# shared keys that findings.yml references.
schema_version: 1

records:

  - record: object_header_continuation
    section: "IV.A.2 — Object Headers and Object Header Messages"
    message_type: 0x0010
    versions: [1, 2]
    scope: reference_graph
    child_reference: object_header_chunk       # v2 chunks begin with 'OCHK'; v1 have no signature
    coordinator: h5policy_validate_msg_chunk    # h5policy/pickles/h5_dispatch.pk
    semantic_boundary: object-header continuation closure   # strategy §11.3

    # Interval model: the coordinator tracks each chunk's occupied [lo, hi)
    # extent (h5policy_cont_lo/_hi in h5_walk.pk), not bare start addresses, and
    # counts a chunk only after it clears the overlap gate.
    invariants:
      - id: continuation.local_encoding
        strategy: "§5 local validation — fields fully encoded, arithmetic representable"
        finding: null            # local decode; failure surfaces as a map/bounds error
      - id: continuation.target_in_file
        strategy: "§5 — target within the permitted file region"
        finding: H5_CORRUPT_OFFSET_OUT_OF_FILE
      - id: continuation.nonzero_extent
        strategy: "§5 — chunk has a message region to parse"
        finding: H5_CORRUPT_ZERO_CONTINUATION_CHUNK
      - id: continuation.no_source_overlap
        strategy: "§5 — target does not improperly overlap the current chunk"
        finding: H5_CORRUPT_SELF_REFERENTIAL_CONTINUATION
      - id: continuation.no_chunk_alias
        strategy: "§5 — target does not overlap another object-header chunk"
        finding: H5_CORRUPT_NON_PROGRESS_LOOP
      - id: continuation.valid_envelope
        strategy: "§5 — every chunk envelope (OCHK signature / size) is valid"
        finding: [H5_CORRUPT_MESSAGE_OVERRUNS_CHUNK, H5_CORRUPT_BAD_SIGNATURE]
      - id: continuation.valid_checksum
        strategy: "§5 — every chunk checksum is valid"
        finding: H5_CORRUPT_BAD_CHECKSUM
      - id: continuation.unique_counting
        strategy: "§5 — counts derive from the final set of validated unique chunks"
        finding: null            # counting rule; the budget itself is a resource finding
      - id: continuation.chunk_budget
        strategy: "§8 — bounded traversal under profile limits"
        finding: H5_RESOURCE_OBJECT_HEADER_CHUNKS

    validators:
      h5policy: enforced
      hdf5: enforced   # measured; see libhdf5-evidence.yml

    tests:
      - path: h5policy/tests/expected/malformed-continuation_overlaps_source.yml
        asserts: continuation.no_source_overlap
      - path: h5policy/tests/expected/valid-continuation_chunks.yml
        asserts: [continuation.valid_envelope, continuation.valid_checksum]
      - path: h5policy/tests/expected/integration-object_header_chunks.yml
        asserts: [continuation.chunk_budget, continuation.unique_counting]
      - path: h5policy/tests/unit_limits.pk
        asserts: [continuation.chunk_budget, continuation.unique_counting]

    fuzz_targets:
      seed: h5policy/tests/valid/continuation_chunks.h5
      engine: h5mutate                        # h5policy/tools/h5mutate (family --verify)
      recipes:                                # each self-validating against its invariant
        - status: built
          recipe: cont_overlap_source_start
          mutation: continuation target == source chunk start
          asserts: continuation.no_source_overlap
        - status: built
          recipe: cont_overlap_source_inside
          mutation: continuation target a few bytes inside the source chunk
          asserts: continuation.no_source_overlap
        - status: built
          recipe: cont_overlap_source_end
          mutation: continuation target on the source chunk's last byte
          asserts: continuation.no_source_overlap
        - status: built
          recipe: cont_zero_size
          mutation: continuation with zero declared size
          asserts: continuation.nonzero_extent
        - status: built
          recipe: cont_out_of_file
          mutation: continuation target past end of file
          asserts: continuation.target_in_file
        - status: built
          recipe: cont_alias_prior_chunk
          mutation: continuation aliases an already-decoded chunk
          asserts: continuation.no_chunk_alias
        - status: planned                     # needs a deeper seed / synthesised chain
          mutation: pending-node back edges, short and long cycles
        - status: planned
          mutation: message count vs validated unique-chunk count

    coverage_status: covered
    migration_status: oracle-enforced
    related_cves: []             # continuation self-reference family; no numbered case bundled yet

  # ── external-reference family: EFL, external links, VDS (strategy §7) ─────────
  # "External links and VDS mappings [and EFL] are decoded as bounded strings and
  # inert references ... external access occurs only during an explicitly
  # authorised activation step."  h5policy DENIES these features under untrusted
  # profiles (policy findings) and validates their record encoding; it never
  # opens a target.  The exact-build probe supplies the libhdf5 side: on
  # GHSA-rw9f-j585-9m4p it caught libhdf5 opening the EFL target /etc/passwd --
  # a premature external open the oracle refuses.

  - record: external_file_list
    section: "IV.A.2.j — Data Storage: External Data Files (EFL)"
    message_type: 0x0007
    versions: [1]
    scope: policy                       # feature gate; record decode is record_local
    child_reference: external_file
    coordinator: h5policy_validate_external_file_list   # h5policy/pickles/h5_external.pk
    semantic_boundary: external file list message + its target-path decode
    invariants:
      - id: efl.no_external_open
        strategy: "§7 — inert reference; no external open before authorised activation"
        finding: H5_POLICY_EXTERNAL_STORAGE
      - id: efl.target_path_classified
        strategy: "§7 — classify the decoded target path (absolute/parent/relative), do not traverse"
        finding: [H5_ADVISORY_EXTERNAL_STORAGE_ABSOLUTE_PATH, H5_ADVISORY_EXTERNAL_STORAGE_PARENT_PATH, H5_ADVISORY_EXTERNAL_STORAGE_RELATIVE_PATH]
      - id: efl.segment_bounded
        finding: H5_ADVISORY_EXTERNAL_STORAGE_UNLIMITED_SEGMENT
      - id: efl.header_complete
        finding: H5_CORRUPT_EXTERNAL_FILE_LIST_TRUNCATED_HEADER
      - id: efl.supported_version
        finding: H5_CORRUPT_UNSUPPORTED_EXTERNAL_FILE_LIST_VERSION
      - id: efl.reserved_zero
        finding: H5_CORRUPT_EXTERNAL_FILE_LIST_RESERVED
      - id: efl.slot_count_consistent
        finding: H5_CORRUPT_EXTERNAL_FILE_LIST_SLOT_COUNT
      - id: efl.slots_present
        finding: H5_CORRUPT_EXTERNAL_FILE_LIST_TRUNCATED_SLOTS
      - id: efl.no_trailing_bytes
        finding: H5_CORRUPT_EXTERNAL_FILE_LIST_TRAILING_BYTES
      - id: efl.name_offset_in_heap
        finding: H5_CORRUPT_EXTERNAL_FILE_LIST_NAME_OFFSET
      - id: efl.segment_extent_representable
        finding: H5_CORRUPT_EXTERNAL_FILE_LIST_SEGMENT_OVERFLOW
    validators:
      h5policy: enforced
      hdf5: enforced   # measured; see libhdf5-evidence.yml
    tests:
      - {path: h5policy/tests/expected/policy-external_storage.yml, asserts: efl.no_external_open}
      - {path: h5policy/tests/expected/policy-external_storage_parent_unlimited.yml, asserts: [efl.target_path_classified, efl.segment_bounded]}
      - {path: h5policy/tests/expected/malformed-bad_efl_slot_count.yml, asserts: efl.slot_count_consistent}
      - {path: h5policy/tests/expected/malformed-bad_efl_name_offset.yml, asserts: efl.name_offset_in_heap}
      - {path: h5policy/tests/expected/malformed-overflowing_efl_segment.yml, asserts: efl.segment_extent_representable}
    coverage_status: covered
    migration_status: oracle-enforced
    related_cves: [GHSA-rw9f-j585-9m4p, GHSA-6prg-6cfw-6mf7]   # EFL arbitrary read / write

  - record: external_link
    section: "IV.A.2.f — Link Message (external link value)"
    message_type: 0x0006
    versions: [1]
    scope: policy
    child_reference: external_target_path
    coordinator: h5policy_validate_external_link        # h5policy/pickles/h5_dense_links.pk
    semantic_boundary: external link message value (file + object path)
    invariants:
      - id: elink.no_external_traverse
        strategy: "§7 — decode target, do not open the external file"
        finding: H5_POLICY_EXTERNAL_LINK
      - id: elink.target_path_classified
        finding: [H5_ADVISORY_EXTERNAL_LINK_ABSOLUTE_PATH, H5_ADVISORY_EXTERNAL_LINK_PARENT_PATH, H5_ADVISORY_EXTERNAL_LINK_RELATIVE_PATH]
      - id: elink.message_complete
        finding: H5_CORRUPT_EXTERNAL_LINK_MESSAGE_TOO_SMALL
      - id: elink.info_complete
        finding: H5_CORRUPT_EXTERNAL_LINK_INFO_TOO_SMALL
      - id: elink.value_terminated
        strategy: "§1 — string searches bounded by their encoded region"
        finding: H5_CORRUPT_EXTERNAL_LINK_VALUE_NOT_TERMINATED
    validators:
      h5policy: enforced
      hdf5: enforced   # measured; see libhdf5-evidence.yml
    tests:
      - {path: h5policy/tests/expected/policy-external_link.yml, asserts: elink.no_external_traverse}
      - {path: h5policy/tests/expected/policy-external_link_parent-legacy.yml, asserts: elink.target_path_classified}
      - {path: h5policy/tests/expected/malformed-external_link_unterminated_value.yml, asserts: elink.value_terminated}
      - {path: h5policy/tests/expected/malformed-bad_external_link_info.yml, asserts: elink.info_complete}
    coverage_status: covered
    migration_status: oracle-enforced
    related_cves: [GHSA-vgg6-x295-v778, GHSA-8993-mw9r-68ff]   # extern traverse / elink path traversal

  - record: virtual_dataset
    section: "IV.A.2.l — Data Layout Message (version 4, virtual)"
    message_type: 0x0008
    versions: [4]
    scope: policy
    child_reference: vds_source
    coordinator: h5policy_validate_vds_layout           # h5policy/pickles/h5_vds.pk
    semantic_boundary: virtual layout message + per-mapping source name/selection
    invariants:
      - id: vds.no_source_open
        strategy: "§7 — decode mappings as inert references; no source open before activation"
        finding: H5_POLICY_VDS
      - id: vds.source_path_classified
        finding: [H5_ADVISORY_VDS_ABSOLUTE_SOURCE, H5_ADVISORY_VDS_PARENT_SOURCE, H5_ADVISORY_VDS_RELATIVE_SOURCE]
      - id: vds.layout_complete
        finding: H5_CORRUPT_VDS_LAYOUT_TOO_SMALL
      - id: vds.mapping_header_complete
        finding: H5_CORRUPT_VDS_MAPPING_HEADER
      - id: vds.mapping_flags_valid
        finding: H5_CORRUPT_VDS_MAPPING_FLAGS
      - id: vds.no_mapping_trailing_bytes
        finding: H5_CORRUPT_VDS_MAPPING_TRAILING_BYTES
      - id: vds.selection_valid
        finding: H5_CORRUPT_VDS_SELECTION
      - id: vds.source_name_bounded
        strategy: "§1 — bounded string decode"
        finding: H5_CORRUPT_VDS_SOURCE_NAME
      - id: vds.heap_object_present
        finding: H5_CORRUPT_VDS_HEAP_OBJECT_MISSING
    validators:
      h5policy: enforced
      hdf5: enforced   # measured; see libhdf5-evidence.yml
    tests:
      - {path: h5policy/tests/expected/policy-vds_absolute_source.yml, asserts: [vds.no_source_open, vds.source_path_classified]}
      - {path: h5policy/tests/expected/cve-vds_nentries_mult_overflow.yml, asserts: vds.layout_complete}
    coverage_status: covered
    migration_status: oracle-enforced
    related_cves: [GHSA-96x8-6f7x-7r4f, GHSA-cqj6-3x6m-235g, GHSA-ggpr-6p6h-cv96]

  # Backlog families.  These are deliberately not authoritative mappings:
  # promote them to `covered` only when the validator, stable findings,
  # fixtures, entry-point driver, and CI gate land together as one vertical
  # slice.
  - record: datatypes
    section: "IV.A.3 — Datatypes"
    scope: local_decode
    semantic_boundary: datatype recursion, member bounds, and size arithmetic
    invariants:
      - id: datatype.recursion_depth
        finding: H5_RESOURCE_DATATYPE_RECURSION_DEPTH
      - id: datatype.compound_member_bounds
        finding: H5_CORRUPT_DATATYPE_COMPOUND_MEMBER_BOUNDS
      - id: datatype.size_arithmetic
        finding: H5_CORRUPT_LENGTH_OVERFLOW
      - {id: datatype.members_nonzero, finding: H5_CORRUPT_DATATYPE_ZERO_MEMBERS}
      - {id: datatype.precision_bounds, finding: H5_CORRUPT_DATATYPE_PRECISION_BOUNDS}
      - {id: datatype.unused_bits, finding: H5_CORRUPT_DATATYPE_UNUSED_BITS}
      - {id: datatype.version_supported, finding: H5_CORRUPT_UNSUPPORTED_DATATYPE_VERSION}
    backlog:
      validator: h5policy datatype validator (existing implementation; registry slice pending)
      stable_findings:
        - H5_RESOURCE_DATATYPE_RECURSION_DEPTH
        - H5_CORRUPT_DATATYPE_COMPOUND_MEMBER_BOUNDS
        - H5_CORRUPT_LENGTH_OVERFLOW
      fixtures:
        - h5policy/tests/expected/cve-dtype_unbounded_recursion.yml
        - h5policy/tests/expected/cve-dtype_compound_unbounded_recursion.yml
        - h5policy/tests/expected/malformed-compound_member_array_bounds.yml
        - h5policy/tests/expected/malformed-compound_member_array_nelem_overflow.yml
        - h5policy/tests/expected/malformed-compound_member_offset_oob.yml
      source_cases:
        - cve/GHSA-6422-xp8g-rjf6/16_dtype-unbounded-recursion.h5
        - cve/GHSA-v7v6-7rm9-q8xg/14_compound-v1-array-bounds.h5
        - cve/GHSA-fqg8-mff7-72f6/compound_member_offset_oob.h5
        - cve/GHSA-4rg2-qjqh-fcfc/15_array-create-nelem-overflow.h5
      entry_point_driver: h5cve datatype canary (H5Topen/H5Tget_size/H5Tget_member_* and bounded dataset materialization)
      ci_checks: exact-build probe plus recursion/resource limits, no-crash, and no-premature-materialization assertions
    tests:
      - {path: h5policy/tests/expected/valid-nested_datatypes.yml, asserts: datatype.recursion_depth}
      - {path: h5policy/tests/expected/malformed-bad_datatype_precision_bounds.yml, asserts: datatype.precision_bounds}
      - {path: h5policy/tests/expected/valid-empty.yml, asserts: datatypes.bypass_unexercised}
    validators: {h5policy: enforced, hdf5: partial}
    coverage_status: partial
    migration_status: oracle-partial

  - record: btree_heap_index
    section: "III — B-tree, heap, and index structures"
    scope: aggregate_object
    semantic_boundary: traversal progress, entry counts, extents, and budgets
    invariants:
      - id: btree.entry_count
        finding: H5_CORRUPT_BTREE_NODE_ENTRY_COUNT
      - id: btree.extent_bounds
        finding: H5_CORRUPT_V2_BTREE_NODE_SIZE
      - id: btree.traversal_budget
        finding: H5_RESOURCE_BTREE_DEPTH
    backlog:
      validator: h5policy structural traversal validators
      stable_findings:
        - H5_CORRUPT_BTREE_NODE_ENTRY_COUNT
        - H5_CORRUPT_V2_BTREE_NODE_SIZE
        - H5_RESOURCE_BTREE_DEPTH
      fixtures:
        - h5policy/tests/expected/valid-dense_links_deep.yml
        - h5policy/tests/expected/malformed-bad_group_btree_declared_size.yml
        - h5policy/tests/expected/integration-btree_depth.yml
      source_cases:
        - cve/GHSA-94rm-5gh9-v94p/64_bt2-hdrinit-divzero-assert.h5
        - cve/GHSA-hx9j-mp99-2p98/63_bt2-chksize-oob-read.h5
        - cve/GHSA-79pc-6c3v-2cp3/62_bt2-nrec-heap-overflow.h5
        - cve/GHSA-9cjq-p566-7jc5/53_gheap-infinite-loop.h5
      entry_point_driver: h5cve bounded H5Lvisit2 indexed-name resolution canary
      ci_checks: exact-build probe with traversal budget, timeout, and no-crash assertions
    tests:
      - {path: h5policy/tests/expected/valid-dense_links_deep.yml, asserts: btree.indexed_name_resolution}
      - {path: h5policy/tests/expected/integration-btree_depth.yml, asserts: btree.traversal_budget}
      - {path: h5policy/tests/expected/malformed-bad_group_btree_declared_size.yml, asserts: btree_heap_index.unexercised_on_traversal_reject}
      - {path: h5policy/tests/expected/valid-empty.yml, asserts: btree_heap_index.bypass_unexercised}
    validators: {h5policy: enforced, hdf5: enforced}
    coverage_status: partial
    migration_status: oracle-partial

  - record: dataset_layout_filter_fill
    section: "IV.A.2.k — Dataset layout, filters, and fill values"
    scope: aggregate_object
    semantic_boundary: layout dimensions and filter/fill-size arithmetic
    invariants:
      - id: layout.fill_value_size
        finding: H5_CORRUPT_FILL_VALUE_SIZE_MISMATCH
      - id: layout.logical_bytes_budget
        finding: H5_RESOURCE_LOGICAL_DATASET_BYTES
      - id: layout.filter_pipeline_bounds
        finding: H5_CORRUPT_FILTER_PIPELINE_OVERRUNS_MESSAGE
      - id: layout.filter_element_count
        finding: H5_CORRUPT_FILTER_NELMTS_MISMATCH
      - id: layout.filter_element_size
        finding: H5_CORRUPT_FILTER_ELEMENT_SIZE_MISMATCH
      - id: layout.chunk_size_32bit
        finding: H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT
      - id: layout.rank_match
        finding: H5_CORRUPT_LAYOUT_RANK_MISMATCH
      - id: layout.chunk_size_budget
        finding: H5_RESOURCE_CHUNK_TOO_SMALL
      - id: layout.filter_decode_advisory
        finding: H5_ADVISORY_DECODE_FILTER
      - id: layout.filtered_heap_checksum
        finding: H5_CORRUPT_FILTERED_HEAP_NO_DBLOCK_CHECKSUM
      - {id: layout.filter_count_budget, finding: H5_RESOURCE_FILTER_COUNT}
      - {id: layout.filter_parameter_depth, finding: H5_RESOURCE_FILTER_PARAMETER_RECURSION_DEPTH}
      - {id: layout.chunk_count_budget, finding: H5_RESOURCE_CHUNK_COUNT}
      - {id: layout.metadata_bytes_budget, finding: H5_RESOURCE_ACCOUNTED_METADATA_BYTES}
      - {id: layout.metadata_ratio_budget, finding: H5_RESOURCE_METADATA_RATIO}
      - {id: layout.single_value_budget, finding: H5_RESOURCE_SINGLE_VALUE_BYTES}
      - {id: layout.contiguous_size, finding: H5_CORRUPT_CONTIGUOUS_LAYOUT_SIZE_MISMATCH}
      - {id: layout.dataset_present, finding: H5_CORRUPT_DATASET_MISSING_LAYOUT}
      - {id: layout.storage_extent, finding: H5_CORRUPT_DATASET_STORAGE_OVERFLOW}
    backlog:
      validator: h5policy layout/filter validators (existing implementation; slice pending)
      stable_findings:
        - H5_RESOURCE_FILTER_COUNT
        - H5_CORRUPT_LENGTH_OVERFLOW
        - H5_CORRUPT_FILTERED_HEAP_NO_DBLOCK_CHECKSUM
        - H5_CORRUPT_FILTER_PIPELINE_OVERRUNS_MESSAGE
        - H5_CORRUPT_FILTER_NELMTS_MISMATCH
        - H5_CORRUPT_FILTER_ELEMENT_SIZE_MISMATCH
        - H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT
        - H5_CORRUPT_LAYOUT_RANK_MISMATCH
        - H5_RESOURCE_CHUNK_TOO_SMALL
        - H5_ADVISORY_DECODE_FILTER
      fixtures:
        - h5policy/tests/expected/integration-filter_count.yml
        - h5policy/tests/expected/integration-filter_parameter_depth.yml
        - h5policy/tests/expected/malformed-filtered_dense_link_pipeline_overrun.yml
      source_cases:
        - cve/GHSA-g8gr-rcqj-9rqw/41_huge-filter-size-overflow.h5
        - cve/GHSA-vphp-6m8x-3gwq/52_fill-size-oob-read.h5
        - cve/GHSA-jqv4-697v-vh6r/58_dblock-filter-size-mismatch.h5
        - cve/GHSA-9cjq-p566-7jc5/53_gheap-infinite-loop.h5
      entry_point_driver: h5cve dataset-I/O canary (bounded H5Dopen/H5Dread and creation-plist inspection)
      ci_checks: exact-build bounded read, filter isolation, no-plugin-load, and no-crash assertions
    tests:
      - {path: h5policy/tests/expected/integration-multi_filter-baseline.yml, asserts: layout.filter_decode_advisory}
      - {path: h5policy/tests/expected/malformed-scaleoffset_size_mismatch.yml, asserts: layout.filter_element_size}
      - {path: h5policy/tests/expected/valid-empty.yml, asserts: dataset_layout_filter_fill.bypass_unexercised}
    validators: {h5policy: enforced, hdf5: partial}
    coverage_status: partial
    migration_status: oracle-partial

  - record: cache_image_dependency_graph
    section: "III.G — Metadata cache images and dependency graphs"
    scope: reference_graph
    semantic_boundary: cache-image extents and dependency-graph closure/order
    invariants:
      - id: mdci.entry_count
        finding: H5_CORRUPT_MDCI_ENTRY_COUNT
      - id: mdci.entry_extent
        finding: H5_CORRUPT_MDCI_ENTRY_OVERRUNS_IMAGE
      - id: mdci.length_match
        finding: H5_CORRUPT_MDCI_LENGTH_MISMATCH
      - id: mdci.header_complete
        finding: H5_CORRUPT_CACHE_IMAGE_MESSAGE_TOO_SMALL
      - id: mdci.supported_version
        finding: H5_CORRUPT_UNSUPPORTED_CACHE_IMAGE_VERSION
    backlog:
      validator: h5policy MDCI/cache-image envelope validator
      stable_findings:
        - H5_CORRUPT_MDCI_ENTRY_COUNT
        - H5_CORRUPT_MDCI_ENTRY_OVERRUNS_IMAGE
        - H5_CORRUPT_MDCI_LENGTH_MISMATCH
        - H5_CORRUPT_CACHE_IMAGE_MESSAGE_TOO_SMALL
        - H5_CORRUPT_UNSUPPORTED_CACHE_IMAGE_VERSION
      fixtures:
        - h5policy/tests/expected/valid-cache_image.yml
        - h5policy/tests/expected/cve-mdci_entry_offby_header.yml
      source_cases:
        - cve/GHSA-xmpx-xpfm-9wg8/29_mdci-pend-offby-header.h5
      entry_point_driver: h5cve H5Fget_mdc_image_info/H5Fget_mdc_size bounded image and object traversal canary
      ci_checks: entry-count/extent checks, dependency-order validation, timeout, and no-crash assertions
    tests:
      - {path: h5policy/tests/expected/valid-cache_image.yml, asserts: mdci.entry_extent}
      - {path: h5policy/tests/expected/cve-mdci_entry_offby_header.yml, asserts: mdci.entry_extent}
      - {path: h5policy/tests/expected/valid-empty.yml, asserts: cache_image_dependency_graph.bypass_unexercised}
    validators: {h5policy: partial, hdf5: enforced}
    coverage_status: partial
    migration_status: oracle-partial

  - record: dataspace_dimension
    section: "IV.A.2.i — Dataspaces and dimension arithmetic"
    scope: local_decode
    semantic_boundary: rank, dimensions, maxima, element-count products, and selections
    invariants:
      - id: dataspace.nelem_product
        finding: H5_CORRUPT_DATASPACE_NELEM_OVERFLOW
      - id: dataspace.dimension_max
        finding: H5_CORRUPT_DATASPACE_DIMENSION_EXCEEDS_MAX
      - id: dataspace.rank_budget
        finding: H5_RESOURCE_DATASPACE_RANK
      - id: dataspace.version_supported
        finding: H5_CORRUPT_UNSUPPORTED_DATASPACE_VERSION
      - id: dataspace.padding_zero
        finding: H5_CORRUPT_DATASPACE_NONZERO_PADDING
    backlog:
      validator: h5policy dataspace validator (existing implementation; slice pending)
      stable_findings:
        - H5_CORRUPT_DATASPACE_NELEM_OVERFLOW
