  - record: shared_messages_legacy
    section: "III.D/IV.A — Shared messages and legacy compatibility"
    scope: reference_graph
    semantic_boundary: shared-message references, versions, placement, and legacy padding
    invariants:
      - {id: legacy.mapping, finding: H5_CORRUPT_MAPPING_FAILED}
      - {id: legacy.unknown_message_policy, finding: H5_POLICY_UNKNOWN_MESSAGE}
      - {id: legacy.dangerous_message_policy, finding: H5_POLICY_LEGACY_DANGEROUS_MESSAGE}
      - {id: sohm.child_address, finding: H5_CORRUPT_SOHM_BTREE_CHILD_ADDRESS}
      - {id: sohm.no_cycle, finding: H5_CORRUPT_SOHM_BTREE_CYCLE}
      - {id: sohm.location, finding: H5_CORRUPT_SOHM_LOCATION}
      - {id: legacy.v1_reference_count, finding: H5_CORRUPT_REFERENCE_COUNT_IN_V1_OBJECT_HEADER}
      - {id: shared.storage_address, finding: H5_CORRUPT_SOHM_STORAGE_ADDRESS}
      - {id: shared.message_complete, finding: H5_CORRUPT_SHARED_MESSAGE_TOO_SMALL}
      - {id: shared.message_version, finding: H5_CORRUPT_SHARED_MESSAGE_VERSION}
      # A committed (shared) datatype is reached through a shared message but is
      # itself an object header, and h5_shared.pk decodes that header's version
      # prefix.  Distinct from shared.message_version above, which is the version
      # of the shared MESSAGE, not of the header it points at.
      - {id: shared.object_header_version, finding: H5_CORRUPT_UNSUPPORTED_OBJECT_HEADER_VERSION}
      # h5_shared.pk walks that header's chunk itself, so a message overrunning
      # it is this family's; h5_dispatch.pk's identical check on an ordinary
      # object header is object_header_continuation's.
      - {id: shared.chunk_envelope, finding: H5_CORRUPT_MESSAGE_OVERRUNS_CHUNK}
      # Same for a filtered SOHM heap's embedded pipeline.
      - {id: sohm.pipeline_message_complete, finding: H5_CORRUPT_FILTER_PIPELINE_MESSAGE_TOO_SMALL}
      - {id: sohm.filter_pipeline_bounds, finding: H5_CORRUPT_FILTER_PIPELINE_OVERRUNS_MESSAGE}
      - {id: sohm.pipeline_version_supported, finding: H5_CORRUPT_UNSUPPORTED_FILTER_PIPELINE_VERSION}
      - {id: sohm.dynamic_filter_policy, finding: H5_POLICY_DYNAMIC_FILTER}
      - {id: sohm.filter_count_budget, finding: H5_RESOURCE_FILTER_COUNT}
      - {id: sohm.filter_element_count, finding: H5_CORRUPT_FILTER_NELMTS_MISMATCH}
      - {id: legacy.old_mtime_encoding, finding: [H5_CORRUPT_OLD_MTIME_FORMAT, H5_CORRUPT_OLD_MTIME_MESSAGE_SIZE, H5_CORRUPT_OLD_MTIME_RANGE, H5_CORRUPT_OLD_MTIME_RESERVED]}
      - {id: legacy.refcount_encoding, finding: [H5_CORRUPT_REFCOUNT_MESSAGE_SIZE, H5_CORRUPT_UNSUPPORTED_REFCOUNT_VERSION]}
      - {id: sohm.message_complete, finding: H5_CORRUPT_SOHM_MESSAGE_TOO_SMALL}
      - {id: sohm.version_supported, finding: H5_CORRUPT_SOHM_VERSION}
      - {id: sohm.index_definition, finding: [H5_CORRUPT_SOHM_INDEX_COUNT, H5_CORRUPT_SOHM_INDEX_TYPE, H5_CORRUPT_SOHM_MESSAGE_TYPES, H5_CORRUPT_SOHM_PHASE_CHANGE]}
      - {id: sohm.message_count, finding: H5_CORRUPT_SOHM_MESSAGE_COUNT}
      - {id: sohm.reference_count, finding: H5_CORRUPT_SOHM_REFERENCE_COUNT}
      - {id: sohm.heap_id, finding: H5_CORRUPT_SOHM_HEAP_ID}
      - {id: sohm.huge_object, finding: H5_CORRUPT_SOHM_HUGE_OBJECT}
      - {id: sohm.object_header_address, finding: H5_CORRUPT_SOHM_OBJECT_HEADER_ADDRESS}
      - {id: sohm.filter_mask, finding: H5_CORRUPT_FILTER_MASK}
      - {id: sohm.reserved_zero, finding: H5_CORRUPT_RESERVED_FIELD}
      - {id: sohm.btree_node_header, finding: H5_CORRUPT_V2_BTREE_NODE_HEADER}
      - {id: sohm.btree_record_size, finding: H5_CORRUPT_V2_BTREE_RECORD_SIZE}
      - {id: sohm.btree_node_size, finding: H5_CORRUPT_V2_BTREE_NODE_SIZE}
      - {id: sohm.btree_subtree_count, finding: H5_CORRUPT_V2_BTREE_SUBTREE_COUNT}
      - {id: sohm.btree_root_count, finding: H5_CORRUPT_V2_BTREE_ROOT_COUNT}
      - {id: sohm.btree_split_merge, finding: H5_CORRUPT_V2_BTREE_SPLIT_MERGE}
      - {id: sohm.fractal_version_supported, finding: H5_CORRUPT_UNSUPPORTED_FRACTAL_HEAP_VERSION}
      # Every address or extent this family decodes must lie inside the file.
      - {id: sohm.address_in_file, finding: [H5_CORRUPT_OFFSET_OUT_OF_FILE, H5_CORRUPT_LENGTH_OVERFLOW]}
      # The on-disk magic of every structure this family decodes must match.
      - {id: sohm.signature_valid, finding: H5_CORRUPT_BAD_SIGNATURE}
      # Stored checksum must match the block, and the block must be large
      # enough to hold it.
      - {id: sohm.checksum_valid, finding: H5_CORRUPT_BAD_CHECKSUM}
      # Size and offset arithmetic must stay inside the validator's domain.
      - {id: sohm.size_arithmetic, finding: H5_CORRUPT_LENGTH_OVERFLOW}
      # The validator DECODES this family's structures rather than skipping
      # them; the finding fires where coverage stops.
      - {id: sohm.decode_coverage, finding: H5_UNSUPPORTED_PICKLE_COVERAGE_GAP}
      - {id: sohm.traversal_budget, finding: H5_RESOURCE_BTREE_DEPTH}
      - {id: sohm.btree_entry_count, finding: H5_CORRUPT_BTREE_NODE_ENTRY_COUNT}
      - {id: sohm.filtered_heap_checksum, finding: H5_CORRUPT_FILTERED_HEAP_NO_DBLOCK_CHECKSUM}
    backlog:
      validator: h5policy shared-message/legacy validators (existing implementation; slice pending)
      stable_findings: [H5_CORRUPT_REFERENCE_COUNT_IN_V1_OBJECT_HEADER, H5_CORRUPT_UNSUPPORTED_BTREEK_VERSION, H5_CORRUPT_LENGTH_OVERFLOW]
      candidate_findings: [H5_CORRUPT_MAPPING_FAILED, H5_POLICY_UNKNOWN_MESSAGE]
