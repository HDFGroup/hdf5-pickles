# Message routing for H5_CORRUPT_V2_BTREE_RECORD_LAYOUT.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_V2_BTREE_RECORD_LAYOUT

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  # One shared v2-btree engine serves every role, so the family comes from
  # the message; the invariant is that family's own, because `record`
  # selects the exact-build canary.
  - record: chunk_index
    invariant: chunk.record_layout
    scope: aggregate_object
    evidence: curated
    matches:
      - "filtered v2 B-tree chunk-size field is wider than the file length encoding"
      - "unfiltered v2 B-tree chunk record size does not match the dataset rank"
      - "filtered v2 B-tree chunk record has no encoded chunk-size field"
      - "v2 B-tree chunk record size does not match the dataset rank"
  - record: heap_structures
    invariant: heap.btree_record_layout
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense attribute creation-order B-tree record size is invalid"
      - "dense attribute name-index record size is invalid"
  - record: dense_index
    invariant: dense.btree_record_layout
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense link creation-order B-tree record size is invalid"
      - "dense link name-index record size is invalid"
