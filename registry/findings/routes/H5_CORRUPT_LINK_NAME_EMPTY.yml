# Message routing for H5_CORRUPT_LINK_NAME_EMPTY.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_LINK_NAME_EMPTY

routes:
  - record: message_envelope
    invariant: envelope.link_name_nonempty
    scope: local_decode
    evidence: fixture
    matches:
      - "symbol table entry link name is empty"
  - record: dense_index
    invariant: dense.link_name_nonempty
    scope: local_decode
    evidence: fixture
    matches:
      # h5policy_validate_link_payload serves both an object-header link message
      # and a dense index's heap link record; its `role` names which. The loader
      # ranks the longer symbol-table discriminator ahead of these rules.
      - "dense-index link name contains a NUL byte"
  - record: message_envelope
    invariant: envelope.link_name_nonempty
    scope: local_decode
    evidence: curated
    matches:
      - "object-header link name contains a NUL byte"
      - "object-header link name is empty"
  - record: dense_index
    invariant: dense.link_name_nonempty
    scope: local_decode
    evidence: curated
    matches:
      - "dense-index link name is empty"
