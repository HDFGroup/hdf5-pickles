# Message routing for H5_RESOURCE_BTREE_DEPTH.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_RESOURCE_BTREE_DEPTH

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  # One shared v2-btree engine serves every role, so the family comes from
  # the message; the invariant is that family's own, because `record`
  # selects the exact-build canary.
  - record: heap_structures
    invariant: heap.traversal_budget
    scope: resource
    evidence: curated
    matches:
      - "dense attribute creation-order v2 B-tree depth exceeds the selected profile limit"
      - "dense attribute v2 B-tree depth exceeds the selected profile limit"
  - record: dense_index
    invariant: dense.traversal_budget
    scope: resource
    evidence: curated
    matches:
      - "dense link creation-order v2 B-tree depth exceeds the selected profile limit"
      - "dense link v2 B-tree depth exceeds the selected profile limit"
  - record: chunk_index
    invariant: chunk.traversal_budget
    scope: resource
    evidence: curated
    matches:
      - "chunk v2 B-tree depth exceeds the selected profile limit"
      - "chunk B-tree depth exceeds the selected profile limit"
  - record: shared_messages_legacy
    invariant: sohm.traversal_budget
    scope: resource
    evidence: curated
    matches:
      - "SOHM v2 B-tree depth exceeds the selected profile limit"
  - record: btree_heap_index
    invariant: btree.traversal_budget
    scope: resource
    evidence: curated
    matches:
      - "group B-tree depth exceeds the selected profile limit"
