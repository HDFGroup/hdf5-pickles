# Message routing for H5_CORRUPT_UNSUPPORTED_OBJECT_HEADER_VERSION.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_UNSUPPORTED_OBJECT_HEADER_VERSION

routes:
  # Two walkers decode an object-header version prefix.  h5_validate.pk reads
  # the one an object is reached by; h5_shared.pk reads the one a COMMITTED
  # (shared) datatype's message points at.  Same encoding, different family --
  # the header a shared message resolves to belongs to the shared-message
  # closure, not to the object-header envelope that referenced it.
  - record: message_envelope
    invariant: envelope.object_header_version
    scope: local_decode
    evidence: fixture
    matches:
      - "root object header is neither v1 nor v2"
  - record: message_envelope
    invariant: envelope.object_header_version
    scope: local_decode
    evidence: curated
    matches:
      - "v2 object-header signature has an unsupported version byte"
  - record: shared_messages_legacy
    invariant: shared.object_header_version
    scope: local_decode
    evidence: curated
    matches:
      - "shared-message object header"
