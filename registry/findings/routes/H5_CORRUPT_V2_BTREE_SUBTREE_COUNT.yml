# Message routing for H5_CORRUPT_V2_BTREE_SUBTREE_COUNT.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_V2_BTREE_SUBTREE_COUNT

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  # One shared v2-btree engine serves every role, so the family comes from
  # the message; the invariant is that family's own, because `record`
  # selects the exact-build canary.
  - record: shared_messages_legacy
    invariant: sohm.btree_subtree_count
    scope: aggregate_object
    evidence: curated
    matches:
      - "SOHM v2 B-tree subtree count is smaller than its node count"
  - record: heap_structures
    invariant: heap.btree_subtree_count
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense attribute creation-order"
  - record: dense_index
    invariant: dense.btree_subtree_count
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense link creation-order"
