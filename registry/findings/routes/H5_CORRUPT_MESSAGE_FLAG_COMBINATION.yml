# Message routing for H5_CORRUPT_MESSAGE_FLAG_COMBINATION.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_MESSAGE_FLAG_COMBINATION

routes:
  # The same three flag rules are checked in two places: on an object-header
  # message (h5_dispatch.pk) and on a dense ATTRIBUTE record
  # (h5policy_validate_dense_attr_record_flags, reached from the name index in
  # h5_dense_attrs.pk and from the type-9 creation-order index).  Both emitters
  # already name their role, so these match the role rather than each rule.
  - record: heap_structures
    invariant: heap.message_flags
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute record"
  - record: message_envelope
    invariant: envelope.message_flags
    scope: local_decode
    evidence: curated
    matches:
      - "object-header message"
