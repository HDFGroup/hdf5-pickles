      # other; h5_validate.pk compares the pipeline against the chunk shape.
      # Both are the same pipeline-vs-chunk element-count invariant of the same
      # family -- the two walkers differ in what they have available, not in
      # which record owns the check.
      # Role-split: the shared pipeline decoder emits this for all four
      # of its clients; a bare rule sent every one to the dataset family.
      - "dataset decode filters disagree on the chunk element count"
  - record: dense_index
    invariant: dense.filter_element_count
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense link filtered heap decode filters disagree on the chunk element count"
  - record: heap_structures
    invariant: heap.filter_element_count
    scope: aggregate_object
