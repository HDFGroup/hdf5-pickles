# Message routing for H5_CORRUPT_FILTER_NELMTS_MISMATCH.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_FILTER_NELMTS_MISMATCH

routes:
  - record: dataset_layout_filter_fill
    invariant: layout.filter_element_count
    matches:
      - "n-bit/scale-offset filter element count does not match the chunk element count"
  - record: dataset_layout_filter_fill
    invariant: layout.filter_element_count
    scope: aggregate_object
    evidence: curated
    matches:
