# Message routing for H5_CORRUPT_BTREE_NODE_ENTRY_COUNT.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_BTREE_NODE_ENTRY_COUNT

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  # One shared v2-btree engine serves every role, so the family comes from
  # the message; the invariant is that family's own, because `record`
  # selects the exact-build canary.
  - record: chunk_index
    invariant: chunk.btree_entry_count
    scope: aggregate_object
    evidence: curated
    matches:
      - "chunk B-tree node uses more entries than its superblock K permits"
      - "v2 B-tree chunk node record count exceeds its capacity"
  - record: btree_heap_index
    invariant: btree.entry_count
    scope: aggregate_object
    evidence: curated
    matches:
      - "group B-tree node uses more entries than its superblock K permits"
      - "symbol table node uses more entries than its superblock K permits"
  - record: shared_messages_legacy
    invariant: sohm.btree_entry_count
    scope: aggregate_object
    evidence: curated
    matches:
      - "SOHM v2 B-tree node record count exceeds its capacity"
