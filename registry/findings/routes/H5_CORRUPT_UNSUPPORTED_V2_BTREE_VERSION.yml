# Message routing for H5_CORRUPT_UNSUPPORTED_V2_BTREE_VERSION.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_UNSUPPORTED_V2_BTREE_VERSION

routes:
  - record: heap_structures
    invariant: heap.btree_version_supported
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute"
  - record: dense_index
    invariant: dense.btree_version_supported
    scope: local_decode
    evidence: curated
    matches:
      - "dense link"
  - record: chunk_index
    invariant: chunk.btree_version_supported
    scope: local_decode
    evidence: curated
    matches:
      # Same unrouted-chunk gap as H5_CORRUPT_V2_BTREE_NODE_HEADER.  The chunk
      # message used to be a strict SUBSTRING of the three dense ones above, so
      # h5_chunkindex.pk now names its role and this matches exactly rather than
      # depending on rule order.
      - "chunk index v2 B-tree header has an unsupported version"
