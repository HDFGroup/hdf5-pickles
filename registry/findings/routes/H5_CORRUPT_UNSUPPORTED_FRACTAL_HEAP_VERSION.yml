# Message routing for H5_CORRUPT_UNSUPPORTED_FRACTAL_HEAP_VERSION.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_UNSUPPORTED_FRACTAL_HEAP_VERSION

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  # Fractal heaps are reached from several indexes; the family is the index
  # that owns the reference, since `record` selects the exact-build canary.
  - record: heap_structures
    invariant: heap.fractal_version_supported
    scope: local_decode
    evidence: curated
    matches:
      - "fractal heap indirect block has an unsupported version"
      - "fractal heap direct block has an unsupported version"
      - "fractal heap header has an unsupported version"
  - record: shared_messages_legacy
    invariant: sohm.fractal_version_supported
    scope: local_decode
    evidence: curated
    matches:
      - "SOHM"
