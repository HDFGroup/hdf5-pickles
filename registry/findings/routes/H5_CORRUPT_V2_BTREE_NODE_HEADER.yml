# Message routing for H5_CORRUPT_V2_BTREE_NODE_HEADER.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_V2_BTREE_NODE_HEADER

routes:
  - record: heap_structures
    invariant: heap.btree_node_header
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense attribute"
  - record: dense_index
    invariant: dense.btree_node_header
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense link"
  - record: shared_messages_legacy
    invariant: sohm.btree_node_header
    scope: aggregate_object
    evidence: curated
    matches:
      - "SOHM"
  - record: chunk_index
    invariant: chunk.btree_node_header
    scope: aggregate_object
    evidence: curated
    matches:
      # The chunk role needs a rule of its own: an `ambiguous` code whose
      # message matches nothing resolves to NO record at all (deliberately --
      # see resolve_finding), so without this a chunk-index node-header defect
      # named no family instead of falling back to the entry's `record`.
      - "v2 B-tree chunk node version or record type"
