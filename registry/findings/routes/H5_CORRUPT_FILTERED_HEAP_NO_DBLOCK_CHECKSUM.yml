  # as a dataset-layout defect.  corpus seed 59 is a dense-LINK
  # heap whose crash path is H5G__dense_iterate -> H5HF_op, with no dataset
  # anywhere in it.
  - record: dense_index
    invariant: dense.filtered_heap_checksum
    scope: aggregate_object
    evidence: fixture
    matches:
      - "filtered dense link heap disables direct-block checksums"
  - record: heap_structures
    invariant: heap.filtered_heap_checksum
    scope: aggregate_object
    evidence: curated
    matches:
      - "filtered dense attribute heap disables direct-block checksums"
  - record: shared_messages_legacy
