# Message routing for H5_CORRUPT_FRACTAL_HEAP_ID.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_FRACTAL_HEAP_ID

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  # Fractal heaps are reached from several indexes; the family is the index
  # that owns the reference, since `record` selects the exact-build canary.
  - record: heap_structures
    invariant: heap.fractal_id_valid
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense attribute name-index heap ID cannot be resolved in file bounds"
      - "dense attribute name index has a zero-length heap object ID"
      - "dense attribute creation-order index has a zero-length heap object ID"
      - "dense attribute creation-order heap ID cannot be resolved"
  - record: dense_index
    invariant: dense.fractal_id_valid
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense link name-index heap ID cannot be resolved in file bounds"
      - "dense link creation-order index has a zero-length heap object ID"
      - "dense link name index has a zero-length heap object ID"
      - "dense link creation-order heap ID cannot be resolved"
