# Message routing for H5_CORRUPT_BAD_CHECKSUM.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_BAD_CHECKSUM

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  #
  # Two different checks share this code, and they are NOT the same scope:
  #   "<x> checksum mismatch"            stored field vs the hash of the same
  #                                      record's bytes -> record_local
  #                                      ("cross-field rules belong in
  #                                      record-local validation", doc S11.3)
  #   "<x> checksum field outside block" the block is too small to contain its
  #                                      trailing checksum: an extent check
  #                                      -> local_decode
  # The continuation chunk is the exception: its envelope belongs to the
  # object-header closure, so it keeps reference_graph.
  #
  # Most messages are composed as `what + " checksum ..."` inside the two
  # trailing-checksum helpers (h5_btree2.pk, h5_dense_links.pk), so they are
  # enumerated from each caller's `what` argument -- and from the shared
  # engine's per-client leaf_what/internal_what spec fields -- not from
  # literals at the emit site.
  - record: heap_structures
    invariant: heap.checksum_valid
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute v2 B-tree internal node checksum field outside block"
      - "dense attribute creation-order v2 B-tree header checksum field outside block"
      - "dense attribute creation-order v2 B-tree node checksum field outside block"
      - "dense attribute v2 B-tree header checksum field outside block"
      - "dense attribute v2 B-tree leaf checksum field outside block"
      - "fractal heap indirect block checksum field outside block"
      - "fractal heap header checksum field outside block"
  - record: dense_index
    invariant: dense.checksum_valid
    scope: local_decode
    evidence: curated
    matches:
      - "dense link creation-order v2 B-tree header checksum field outside block"
      - "dense link creation-order v2 B-tree node checksum field outside block"
      - "dense link v2 B-tree internal node checksum field outside block"
      - "dense link v2 B-tree header checksum field outside block"
      - "dense link v2 B-tree leaf checksum field outside block"
  - record: chunk_index
    invariant: chunk.checksum_valid
    scope: local_decode
    evidence: curated
    matches:
      - "extensible-array data-block prefix checksum field outside block"
      - "extensible-array data-block page checksum field outside block"
      - "extensible-array secondary block checksum field outside block"
      - "fixed array data block prefix checksum field outside block"
      - "v2 B-tree chunk internal node checksum field outside block"
      - "extensible-array index block checksum field outside block"
      - "extensible-array data block checksum field outside block"
      - "fixed array data block page checksum field outside block"
      - "fixed array data block checksum field outside block"
      - "v2 B-tree chunk leaf checksum field outside block"
  - record: shared_messages_legacy
    invariant: sohm.checksum_valid
    scope: local_decode
    evidence: curated
    matches:
      - "SOHM v2 B-tree internal node checksum field outside block"
      - "SOHM fractal heap header checksum field outside block"
      - "SOHM v2 B-tree header checksum field outside block"
      - "SOHM v2 B-tree leaf checksum field outside block"
      - "SOHM table checksum field outside block"
      - "SOHM list checksum field outside block"
  - record: heap_structures
    invariant: heap.checksum_valid
    scope: record_local
    evidence: curated
    matches:
      - "dense attribute v2 B-tree internal node checksum mismatch"
      - "dense attribute creation-order v2 B-tree header checksum mismatch"
      - "dense attribute creation-order v2 B-tree node checksum mismatch"
      - "dense attribute v2 B-tree header checksum mismatch"
      - "dense attribute v2 B-tree leaf checksum mismatch"
  - record: dense_index
    invariant: dense.checksum_valid
    scope: record_local
    evidence: curated
    matches:
      - "dense link creation-order v2 B-tree header checksum mismatch"
      - "dense link creation-order v2 B-tree node checksum mismatch"
      - "dense link v2 B-tree internal node checksum mismatch"
  - record: validation_controls
    invariant: control.checksum_valid
    scope: local_decode
    evidence: curated
    matches:
      - "free-space manager header checksum field outside block"
      - "free-space section list checksum field outside block"
  - record: chunk_index
    invariant: chunk.checksum_valid
    scope: record_local
    evidence: curated
    matches:
      - "extensible-array data-block prefix checksum mismatch"
      - "extensible-array data-block page checksum mismatch"
      - "extensible-array secondary block checksum mismatch"
      - "fixed array data block prefix checksum mismatch"
      - "v2 B-tree chunk internal node checksum mismatch"
      - "extensible-array index block checksum mismatch"
      - "fixed array data block page checksum mismatch"
      - "extensible array header checksum mismatch"
      - "fixed array data block checksum mismatch"
      - "fixed array header checksum mismatch"
      - "v2 B-tree header checksum mismatch"
  - record: shared_messages_legacy
    invariant: sohm.checksum_valid
    scope: record_local
    evidence: curated
    matches:
      - "SOHM v2 B-tree internal node checksum mismatch"
      - "SOHM fractal heap header checksum mismatch"
      - "SOHM v2 B-tree header checksum mismatch"
      - "SOHM table checksum mismatch"
      - "SOHM list checksum mismatch"
  - record: dense_index
    invariant: dense.checksum_valid
