      - "dense link v2 B-tree leaf checksum mismatch"
  - record: chunk_index
    invariant: chunk.checksum_valid
    scope: record_local
    evidence: fixture
    matches:
      - "extensible-array data block checksum mismatch"
      - "v2 B-tree chunk leaf checksum mismatch"
  - record: heap_structures
    invariant: heap.checksum_valid
