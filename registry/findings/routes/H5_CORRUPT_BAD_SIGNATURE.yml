# Message routing for H5_CORRUPT_BAD_SIGNATURE.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_BAD_SIGNATURE

routes:
  # Matching is a substring test. The loader ranks longer matches first, so the
  # broad "v2 B-tree header signature mismatch" fallback cannot shadow
  # "dense link v2 B-tree header signature mismatch".
  #
  # A signature is a fixed magic value at a known offset in one record, so
  # every rule here is scope local_decode ("extent, representation,
  # arithmetic ... belong in raw decode", strategy doc S11.3) -- except the
  # continuation chunk, whose envelope belongs to the object-header closure.
  # The record differs because it selects the exact-build canary.
  #
  # Four messages come from the shared v2-btree engine's per-client spec
  # (leaf_sig_message / internal_sig_message in h5_chunkindex.pk and
  # h5_sohm.pk), not from a literal at the emit site.
  - record: heap_structures
    invariant: heap.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute v2 B-tree internal node signature mismatch"
      - "dense attribute creation-order v2 B-tree header signature mismatch"
      - "dense attribute creation-order v2 B-tree node signature mismatch"
      - "dense attribute v2 B-tree header signature mismatch"
      - "dense attribute v2 B-tree leaf signature mismatch"
      - "fractal heap indirect block signature mismatch"
      - "fractal heap direct block signature mismatch"
      - "fractal heap header signature mismatch"
      - "local heap signature mismatch"
  - record: validation_controls
    invariant: control.base_address
    scope: local_decode
    evidence: fixture
    matches:
      - "HDF5 signature was not found at a valid superblock offset"
  - record: dense_index
    invariant: dense.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "dense link creation-order v2 B-tree header signature mismatch"
      - "dense link creation-order v2 B-tree node signature mismatch"
      - "dense link v2 B-tree internal node signature mismatch"
      - "dense link v2 B-tree header signature mismatch"
      - "dense link v2 B-tree leaf signature mismatch"
  - record: chunk_index
    invariant: chunk.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "extensible-array secondary block signature mismatch"
      - "expected a raw-data-chunk (type 1) v1 B-tree node"
      - "v2 B-tree chunk internal-node signature mismatch"
      - "extensible array index block signature mismatch"
      - "extensible-array data block signature mismatch"
      - "extensible array header signature mismatch"
      - "fixed array data block signature mismatch"
      - "v2 B-tree chunk leaf signature mismatch"
      - "fixed array header signature mismatch"
      - "v2 B-tree header signature mismatch"
      - "chunk B-tree signature mismatch"
  - record: shared_messages_legacy
    invariant: sohm.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "SOHM v2 B-tree internal-node signature mismatch"
      - "SOHM fractal heap header signature mismatch"
      - "SOHM v2 B-tree header signature mismatch"
      - "SOHM v2 B-tree leaf signature mismatch"
      - "SOHM table signature mismatch"
      - "SOHM list signature mismatch"
  - record: validation_controls
    invariant: control.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "free-space manager header signature mismatch"
      - "free-space section list signature mismatch"
  - record: btree_heap_index
    invariant: btree.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "expected a group (type 0) v1 B-tree node"
      - "symbol table node signature mismatch"
      - "group B-tree signature mismatch"
  - record: object_header_continuation
    invariant: continuation.valid_envelope
    scope: reference_graph
    evidence: curated
    matches:
      - "v2 continuation chunk signature mismatch"
  - record: cache_image_dependency_graph
    invariant: mdci.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "metadata cache image signature mismatch"
  - record: virtual_dataset
    invariant: vds.signature_valid
    scope: local_decode
    evidence: curated
    matches:
      - "VDS global heap signature mismatch"
