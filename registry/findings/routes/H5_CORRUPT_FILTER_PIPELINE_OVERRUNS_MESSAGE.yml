# Message routing for H5_CORRUPT_FILTER_PIPELINE_OVERRUNS_MESSAGE.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_FILTER_PIPELINE_OVERRUNS_MESSAGE

routes:
  # One filter-pipeline decoder serves four clients: a dataset's PLINE
  # message and the pipeline inside a filtered fractal heap header for
  # dense-link, dense-attribute and SOHM storage.  The role prefix the
  # decoder puts on its messages is the only discriminator.
  - record: dataset_layout_filter_fill
    invariant: layout.filter_pipeline_bounds
    scope: local_decode
    evidence: curated
    matches:
      - "dataset "
  - record: dense_index
    invariant: dense.filter_pipeline_bounds
    scope: local_decode
    evidence: curated
    matches:
      - "dense link filtered heap "
  - record: heap_structures
    invariant: heap.filter_pipeline_bounds
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute filtered heap "
  - record: shared_messages_legacy
    invariant: sohm.filter_pipeline_bounds
    scope: local_decode
    evidence: curated
    matches:
      - "SOHM filtered heap "
