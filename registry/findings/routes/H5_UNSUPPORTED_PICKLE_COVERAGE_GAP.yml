# Message routing for H5_UNSUPPORTED_PICKLE_COVERAGE_GAP.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_UNSUPPORTED_PICKLE_COVERAGE_GAP

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  #
  # This code is not a defect in the FILE: it says the validator declined to
  # decode something.  The `record` is still the structural family rather than
  # validation_controls, because `record` selects the exact-build canary
  # (CANARY_BY_RECORD in tools/h5cve) -- and "we skipped this; what does
  # libhdf5 do with it?" is exactly the question a coverage gap raises.
  # Routing them all to validation_controls would run the free-space canary
  # for, say, a dense-link fractal-heap gap: the wrong surface entirely.
  #
  # The invariant is the family's own `*.decode_coverage` -- "the validator
  # decodes this family's structures rather than skipping them" -- a statement
  # about OUR coverage, which is what the coverage manifest records.  Only the
  # two genuinely file-level surfaces (driver member files, non-file
  # free-space managers) keep control.coverage_gap.
  #
  # scope stays `policy`: a validator-policy outcome, not a decode,
  # record-local, or graph failure.
  - record: shared_messages_legacy
    invariant: sohm.decode_coverage
    scope: policy
    evidence: curated
    matches:
      - "shared object-header message is not stored in a committed object header"
      - "shared committed object header does not expose the requested message"
      - "nested shared object-header message resolution is not covered yet"
      - "SOHM heap-backed shared message could not be resolved"
  - record: heap_structures
    invariant: heap.decode_coverage
    scope: policy
    evidence: curated
    matches:
      - "dense attribute storage uses an unsupported fractal-heap/B-tree layout"
      - "dense attribute name index uses a non-managed fractal-heap ID"
      - "dense attribute creation-order index uses a non-managed fractal-heap ID"
  - record: dense_index
    invariant: dense.decode_coverage
    scope: policy
    evidence: curated
    matches:
      - "dense link storage uses an unsupported fractal-heap/B-tree layout"
      - "dense link creation-order index uses a non-managed fractal-heap ID"
      - "dense link name index uses a non-managed fractal-heap ID"
  - record: message_envelope
    invariant: envelope.decode_coverage
    scope: policy
    evidence: curated
    matches:
      - "unknown object-header message is not classified by this validator"
  - record: validation_controls
    invariant: control.coverage_gap
    scope: policy
    evidence: curated
    matches:
      - "non-file free-space manager section decoding is not covered yet"
      - "driver-specific member files are not validated"
  - record: cache_image_dependency_graph
    invariant: mdci.decode_coverage
    scope: policy
    evidence: curated
    matches:
      - "metadata cache image contents are not decoded by Phase 2"
  - record: chunk_index
    invariant: chunk.decode_coverage
    scope: policy
    evidence: curated
    matches:
      - "chunk index traversal is bounded but not decoded yet"
  - record: address_space_bounds
    invariant: address.decode_coverage
    scope: policy
    evidence: curated
    matches:
      - "unsupported superblock length width"
      - "unsupported superblock offset width"
