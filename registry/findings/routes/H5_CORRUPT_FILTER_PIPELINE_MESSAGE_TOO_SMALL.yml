# Message routing for H5_CORRUPT_FILTER_PIPELINE_MESSAGE_TOO_SMALL.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_FILTER_PIPELINE_MESSAGE_TOO_SMALL

routes:
  # One filter-pipeline decoder serves four clients: a dataset's PLINE
  # message and the pipeline inside a filtered fractal heap header for
  # dense-link, dense-attribute and SOHM storage.  The role prefix the
  # decoder puts on its messages is the only discriminator.
  - record: dataset_layout_filter_fill
    invariant: layout.pipeline_message_complete
    scope: local_decode
    evidence: curated
    matches:
      - "dataset "
  - record: dense_index
    invariant: dense.pipeline_message_complete
    scope: local_decode
    evidence: curated
    matches:
      - "dense link filtered heap "
  - record: heap_structures
    invariant: heap.pipeline_message_complete
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute filtered heap "
  - record: shared_messages_legacy
    invariant: sohm.pipeline_message_complete
    scope: local_decode
    evidence: curated
    matches:
      - "SOHM filtered heap "
