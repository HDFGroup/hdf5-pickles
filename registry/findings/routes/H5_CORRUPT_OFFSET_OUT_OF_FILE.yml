# Message routing for H5_CORRUPT_OFFSET_OUT_OF_FILE.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_OFFSET_OUT_OF_FILE

routes:
  # Matching is a substring test. The loader ranks longer matches first, so a
  # broad rule ("v2 B-tree header outside file") cannot shadow a role-specific
  # one ("dense link v2 B-tree header outside file").
  #
  # Every one of these is the same rule -- a decoded address or extent must
  # lie inside the file -- so all are scope local_decode ("extent,
  # representation, arithmetic ... belong in raw decode", strategy doc S11.3).
  # The record differs because it selects the exact-build canary.
  #
  # Some messages exist only as `what + " outside file"` compositions (see
  # h5_btree2.pk / h5_dense_links.pk); those are enumerated from the `what`
  # arguments, not from literal message strings.
  - record: address_space_bounds
    invariant: address.offset_in_file
    scope: local_decode
    evidence: fixture
    matches:
      - "object header address is at or beyond the declared end-of-file"
      - "contiguous data range outside file"
  - record: heap_structures
    invariant: heap.address_in_file
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute creation-order v2 B-tree child address outside file"
      - "dense attribute creation-order v2 B-tree root address outside file"
      - "dense attribute v2 B-tree child address outside file"
      - "dense attribute v2 B-tree internal node outside file"
      - "dense attribute v2 B-tree root address outside file"
      - "dense attribute creation-order v2 B-tree header outside file"
      - "dense attribute creation-order v2 B-tree node outside file"
      - "dense attribute v2 B-tree header outside file"
      - "dense attribute creation-order heap object outside file"
      - "dense attribute v2 B-tree leaf outside file"
      - "fractal heap indirect block outside file"
      - "fractal heap direct block outside file"
      - "fractal heap header outside file"
  - record: dense_index
    invariant: dense.address_in_file
    scope: local_decode
    evidence: curated
    matches:
      - "dense link creation-order v2 B-tree child address outside file"
      - "dense link creation-order v2 B-tree root address outside file"
      - "dense link creation-order v2 B-tree header outside file"
      - "dense link creation-order v2 B-tree node outside file"
      - "dense link v2 B-tree child address outside file"
      - "dense link v2 B-tree internal node outside file"
      - "dense link v2 B-tree root address outside file"
      - "dense link creation-order heap object outside file"
      - "dense link v2 B-tree header outside file"
      - "dense link v2 B-tree leaf outside file"
      - "dense-index hard link target address outside file"
  - record: chunk_index
    invariant: chunk.address_in_file
    scope: local_decode
    evidence: curated
    matches:
      - "extensible-array direct data-block address outside file"
      - "extensible-array secondary-block address outside file"
      - "extensible-array data-block address outside file"
      - "extensible-array data-block prefix outside file"
      - "extensible array index block body outside file"
      - "extensible-array data-block page outside file"
      - "extensible-array secondary block outside file"
      - "fixed array data block prefix outside file"
      - "v2 B-tree chunk internal node outside file"
      - "extensible array index block outside file"
      - "extensible-array index block outside file"
      - "fixed array paged data block outside file"
      - "extensible-array chunk data outside file"
      - "extensible-array data block outside file"
      - "fixed array data block body outside file"
      - "fixed array data block page outside file"
      - "chunk B-tree child address outside file"
      - "extensible array header outside file"
      - "chunk B-tree node body outside file"
      - "fixed array data block outside file"
      - "chunk B-tree address outside file"
      - "v2 B-tree chunk leaf outside file"
      - "v2 B-tree root node outside file"
      - "chunk data address outside file"
      - "fixed array header outside file"
      - "chunk B-tree node outside file"
      - "v2 B-tree header outside file"
      - "v2 B-tree node outside file"
      - "chunk data outside file"
  - record: address_space_bounds
    invariant: address.offset_in_file
    evidence: curated
    matches:
      - "end-of-file address is beyond the available file image"
      - "superblock extension address is outside the file"
      - "driver-info address is outside the file"
  - record: btree_heap_index
    invariant: btree.address_in_file
    scope: local_decode
    evidence: curated
    matches:
      - "symbol table entry object header address outside file"
      - "symbol-table B-tree address outside file"
      - "symbol table node entries outside file"
      - "group B-tree node body outside file"
      - "group B-tree node outside file"
