# Message routing for H5_CORRUPT_LENGTH_OVERFLOW.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_LENGTH_OVERFLOW

routes:
  # The loader orders matches LONGEST FIRST -- substring matching, first hit wins.
  #
  # Two populations share this code, both from h5_checked.pk:
  #   * `h5policy_checked_addr_range` emits it for the same `what` as
  #     H5_CORRUPT_OFFSET_OUT_OF_FILE -- one reports a base address past EOF,
  #     the other an EXTENT that runs past it.  Those rules deliberately reuse
  #     the family's `*.address_in_file` invariant, which is worded to cover
  #     both ("every address or extent ... must lie inside the file").
  #   * `h5policy_checked_add_u64` / `_mul_u64` emit it when a size or offset
  #     calculation leaves the validator's 64-bit domain; those map to the
  #     family's `*.size_arithmetic`.
  #
  # All local_decode ("extent, representation, arithmetic ... belong in raw
  # decode", strategy doc S11.3) except the continuation chunk, whose target
  # belongs to the object-header closure.
  - record: chunk_index
    invariant: chunk.size_arithmetic
    scope: local_decode
    evidence: curated
    matches:
      - "extensible-array first secondary-block geometry overflow"
      - "extensible-array secondary-block address table overflow"
      - "extensible-array direct data-block geometry overflow"
      - "extensible-array direct-block address table overflow"
      - "extensible-array secondary group geometry overflow"
      - "extensible-array secondary-block geometry overflow"
      - "extensible-array secondary group offset overflow"
      - "extensible-array page-init bitmap size overflow"
      - "extensible-array data-block page size overflow"
      - "extensible-array secondary group span overflow"
      - "extensible-array secondary-block size overflow"
      - "v2 B-tree chunk-record dimensionality overflow"
      - "extensible-array page checksum bytes overflow"
      - "v2 B-tree chunk node checksum offset overflow"
      - "v2 B-tree chunk child-pointer bytes overflow"
      - "extensible array index block size overflow"
      - "v2 B-tree chunk node record bytes overflow"
      - "extensible-array data block size overflow"
      - "extensible-array group offset overflow"
      - "extensible-array group span overflow"
      - "fixed array data block size overflow"
      - "chunk B-tree node capacity overflow"
      - "v2 B-tree chunk node size overflow"
      - "chunk B-tree node size overflow"
      - "chunk B-tree key size overflow"
      - "fixed array page size overflow"
  - record: heap_structures
    invariant: heap.size_arithmetic
    scope: local_decode
    evidence: curated
    matches:
      - "fractal heap direct block checksum field outside block"
      # Same invariant, but enforced whether or not the heap checksums its
      # direct blocks -- the prefix exists either way (corpus seed 61).
      - "fractal heap direct block is smaller than its own prefix"
      - "fractal heap indirect block checksum size overflow"
      - "dense attribute creation-order v2 B-tree node size overflow"
      - "dense attribute v2 B-tree leaf size overflow"
      - "dense attribute v2 B-tree node size overflow"
      - "fractal heap header checksum size overflow"
      - "fractal heap indirect block size overflow"
      - "dense attribute filtered heap filter client-data byte count overflow"
      - "dense attribute filtered heap filter descriptor padding overflow"
      - "fractal heap header size overflow"
      - "dense attribute filtered heap filter descriptor size overflow"
  - record: heap_structures
    invariant: heap.address_in_file
    scope: local_decode
    evidence: curated
    matches:
      - "dense attribute v2 B-tree internal node outside file"
      - "dense attribute creation-order v2 B-tree header outside file"
