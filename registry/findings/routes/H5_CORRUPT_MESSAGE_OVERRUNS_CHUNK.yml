# Message routing for H5_CORRUPT_MESSAGE_OVERRUNS_CHUNK.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_MESSAGE_OVERRUNS_CHUNK

routes:
  # The loader orders matches LONGEST FIRST -- the shared-message wording below CONTAINS
  # the ordinary object-header one, so the specific rule has to win.
  # h5_dispatch.pk and h5_shared.pk run the identical overrun check on the two
  # kinds of object header they each walk.
  - record: shared_messages_legacy
    invariant: shared.chunk_envelope
    scope: reference_graph
    evidence: curated
    matches:
      - "shared-message object header message payload overruns chunk"
  - record: object_header_continuation
    invariant: continuation.valid_envelope
    scope: reference_graph
    evidence: curated
    matches:
      - "object-header message payload overruns chunk"
      - "v2 continuation chunk is too small for its signature and checksum"
