# Message routing for H5_CORRUPT_DENSE_CORDER_MISMATCH.
# Authoritative source; the loader expands each matches list and applies
# longest-substring-first precedence.
schema_version: 1
finding: H5_CORRUPT_DENSE_CORDER_MISMATCH

routes:
  # The creation-order walker in h5_dense_links.pk is shared: record type 6
  # is a dense LINK index, type 9 a dense ATTRIBUTE one, and the two belong
  # to different families.  The role prefix the walker puts on its messages
  # is the discriminator; a bare `record` here would be right for only one.
  - record: heap_structures
    invariant: heap.corder_index_closure
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense attribute"
  - record: dense_index
    invariant: dense.corder_index_closure
    scope: aggregate_object
    evidence: curated
    matches:
      - "dense link"
