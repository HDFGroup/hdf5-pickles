# Finding catalog shard for the address_space_bounds record family.
# Authoritative source; routing for ambiguous codes lives in ../routes/.
schema_version: 1
record: address_space_bounds

findings:

  H5_CORRUPT_OFFSET_OUT_OF_FILE:
    severity: corrupt
    scope: local_decode
    invariant: address.offset_in_file
    record: address_space_bounds
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via its route shard.
    ambiguous: true
    versions: [1, 2]
    shared: true
    edge_type: file_address
    emitted_in: [h5policy/pickles/h5_checked.pk]   # via h5policy_checked_addr_range
    message: file address lies outside the end-of-file bound

  H5_CORRUPT_LENGTH_EXCEEDS_U64:
    severity: corrupt
    scope: local_decode
    invariant: address.length_representable
    record: address_space_bounds
    versions: [0, 1, 2, 3]
    shared: false
    edge_type: file_address
    emitted_in: [h5policy/pickles/h5_walk.pk]
    message: encoded metadata length exceeds the validator's 64-bit file domain

  H5_CORRUPT_SUPERBLOCK_EXTENSION_ALIAS:
    severity: corrupt
    scope: reference_graph
    invariant: address.no_extension_alias
    record: address_space_bounds
    # The superblock extension only exists for v2/v3 superblocks.
    versions: [2, 3]
    shared: false
    edge_type: file_address
    emitted_in: [h5policy/pickles/h5_walk.pk]
    message: superblock extension address aliases a reachable object header
    # Scope is reference_graph, not local_decode like its siblings in this
    # record: the address decodes fine and is in file: what is wrong is that
    # two roles claim one object header.  Detected in the duplicate-enqueue
    # suppression, which is reachable only because the extension is always
    # enqueued before the root.  Source case
    # corpus seed 38 (variant).
