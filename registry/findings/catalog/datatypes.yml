# Finding catalog shard for the datatypes record family.
# Authoritative source; routing for ambiguous codes lives in ../routes/.
schema_version: 1
record: datatypes

findings:

  # datatype vertical slice

  H5_RESOURCE_DATATYPE_RECURSION_DEPTH:
    severity: resource
    scope: resource
    invariant: datatype.recursion_depth
    record: datatypes
    versions: [1, 2, 3]
    shared: false
    edge_type: datatype
    emitted_in: [h5policy/pickles/h5_datatype.pk]
    message: datatype recursion depth exceeds the bounded validation limit

