# Finding catalog shard for the chunk_index record family.
# Authoritative source; routing for ambiguous codes lives in ../routes/.
schema_version: 1
record: chunk_index

findings:

  H5_CORRUPT_CHUNK_INDEX_CHILD_ADDRESS:
    severity: corrupt
    scope: aggregate_object
    invariant: chunk.child_address
    record: chunk_index
    versions: [2]
    shared: false
    edge_type: chunk_index
    emitted_in: [h5policy/pickles/h5_chunkindex.pk]
    message: chunk-index child address is undefined or out of bounds

  H5_CORRUPT_CHUNK_INDEX_CYCLE:
    severity: corrupt
    scope: reference_graph
    invariant: chunk.no_cycle
    record: chunk_index
    versions: [2]
    shared: false
    edge_type: chunk_index
    emitted_in: [h5policy/pickles/h5_chunkindex.pk]
    message: chunk-index traversal contains a cycle

  H5_CORRUPT_V2_BTREE_RECORD_LAYOUT:
    severity: corrupt
    scope: aggregate_object
    invariant: chunk.record_layout
    record: chunk_index
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via its route shard.
    ambiguous: true
    versions: [2]
    shared: true
    edge_type: btree_node
    emitted_in: [h5policy/pickles/h5_chunkindex.pk]
    message: V2 B-tree record layout is invalid

  H5_CORRUPT_V2_BTREE_RECORD_SIZE:
    severity: corrupt
    scope: aggregate_object
    invariant: chunk.record_size
    record: chunk_index
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via its route shard.
    ambiguous: true
    # One shared engine (h5policy_validate_v2_btree_geometry) serves all five
    # v2 B-tree roles, so the role has to come from the message.  Until
    # 2026-07-22 the message was role-less and every occurrence resolved to
    # chunk_index -- corpus seed 64 is a type-5 dense LINK name index
    # (chunk indexes are types 10/11) that was catalogued as a chunk defect.
    versions: [2]
    shared: true
    edge_type: btree_node
    emitted_in: [h5policy/pickles/h5_btree2.pk]
    message: V2 B-tree record size is invalid

  H5_CORRUPT_CHUNK_INDEX_WITHOUT_UNLIMITED_DIM:
    severity: corrupt
    scope: aggregate_object
    invariant: chunk.unlimited_dimension
    record: chunk_index
    versions: [2, 3]
    shared: false
    edge_type: chunk_index
    emitted_in: [h5policy/pickles/h5_layout.pk]
    message: extensible chunk index has no unlimited dimension

  # Chunk-index encodings and their shared V2 B-tree roles.

