# Finding catalog shard for the btree_heap_index record family.
# Authoritative source; routing for ambiguous codes lives in ../routes/.
schema_version: 1
record: btree_heap_index

findings:

  H5_CORRUPT_BTREE_NODE_ENTRY_COUNT:
    severity: corrupt
    scope: aggregate_object
    invariant: btree.entry_count
    record: btree_heap_index
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via its route shard.
    ambiguous: true
    versions: [2]
    shared: false
    edge_type: btree_node
    emitted_in: [h5policy/pickles/h5_btree2.pk]
    message: B-tree node entry count is inconsistent with its bounds

  H5_CORRUPT_V2_BTREE_NODE_SIZE:
    severity: corrupt
    scope: aggregate_object
    invariant: btree.extent_bounds
    record: btree_heap_index
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via its route shard.
    ambiguous: true
    # Same shared-engine problem as H5_CORRUPT_V2_BTREE_RECORD_SIZE: the
    # "cannot hold one record" message comes from the geometry check all five
    # roles call, the "contents exceed" ones from the shared node walker's
    # per-client spec.  Every current emission is matched here, so the
    # btree_heap_index fallback above is now only a guard against a new
    # unrouted message.
    versions: [2]
    shared: false
    edge_type: btree_node
    emitted_in:
      - h5policy/pickles/h5_btree2.pk
      - h5policy/pickles/h5_dense_links.pk
    message: B-tree node extent or size is invalid

  H5_RESOURCE_BTREE_DEPTH:
    severity: resource
    scope: resource
    invariant: btree.traversal_budget
    record: btree_heap_index
    # Emitted from more than one walker; the mapping above is a
    # fallback, not an authoritative attribution.  Resolve with the
    # finding message via its route shard.
    ambiguous: true
    versions: [2]
    shared: false
    edge_type: btree_node
    emitted_in: [h5policy/pickles/h5_btree2.pk]
    message: B-tree traversal depth exceeds the validation budget
