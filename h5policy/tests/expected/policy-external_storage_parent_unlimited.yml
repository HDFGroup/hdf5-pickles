# Legacy permits external storage, but this descriptor combines a parent-path
# filename with an unlimited segment.  Both hazards remain advisory, and the
# referenced external file must not be opened during validation.
file: policy/external_storage_parent_unlimited.h5
profile: legacy
expected_decision: accept_with_warnings
expected_exit: 1
required_findings:
  - H5_ADVISORY_EXTERNAL_STORAGE_PARENT_PATH
  - H5_ADVISORY_EXTERNAL_STORAGE_UNLIMITED_SEGMENT
h5cve: {family: external_file_list, allowed_statuses: [violation]}
forbidden: [accept, external_open, plugin_load, write, crash, timeout]
