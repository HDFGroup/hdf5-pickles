# A four-byte fixed-point datatype declares a bit precision far beyond its
# 32-bit storage width.  h5policy must reject the offset-plus-precision bound
# before constructing or using the malformed type, as libhdf5 does.
file: malformed/bad_datatype_precision_bounds.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATATYPE_PRECISION_BOUNDS]
h5cve:
  family: datatypes
  require_oracle_alignment: true
  allowed_statuses: [unexercised, violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
