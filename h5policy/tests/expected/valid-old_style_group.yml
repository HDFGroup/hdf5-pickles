# Regression guard for old-style (pre-1.8) group traversal: a symbol table
# message -> v1 B-tree (node type 0) -> symbol table nodes -> local heap names.
# Nested group + several contiguous datasets; libhdf5 opens it, so h5policy must
# reach every object and accept.  (Was a coverage gap before the traversal was
# implemented.)
file: valid/old_style_group.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden: [crash, timeout, external_open, plugin_load, write]
