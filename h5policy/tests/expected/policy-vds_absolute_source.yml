# A well-formed virtual dataset names its source with an absolute path.  Legacy
# permits the mapping with an advisory while validating only its in-file
# metadata; the source file is never opened.
file: policy/vds_absolute_source.h5
profile: legacy
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_VDS_ABSOLUTE_SOURCE]
h5cve: {family: virtual_dataset, allowed_statuses: [violation]}
forbidden: [accept, external_open, plugin_load, write, crash, timeout]
