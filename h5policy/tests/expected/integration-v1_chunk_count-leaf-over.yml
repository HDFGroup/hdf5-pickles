# The same valid four-chunk leaf exceeds a ceiling of three.  The counter
# saturates at three and the fourth record establishes resource rejection,
# rather than disappearing behind an equality early return.
file: valid/chunked_v1_btree.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_chunk_count: 3
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_CHUNK_COUNT]
forbidden_findings:
  - H5_CORRUPT_BTREE_NODE_ENTRY_COUNT
  - H5_CORRUPT_OFFSET_OUT_OF_FILE
expected_metrics:
  chunk_index_refs: 3
  visited_btree_refs: 3
forbidden: [crash, timeout, external_open, plugin_load, write]
