# Regression guard for the version-2 B-tree chunk index (v4 layout index type
# 5), used by chunked datasets with two unlimited dimensions.  h5policy
# validates the checksummed header, enforces the chunk-count budget from the
# header's total record count, and checks each chunk address (root is a leaf).
file: valid/chunk_v2_btree.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden: [crash, timeout, external_open, plugin_load, write]
