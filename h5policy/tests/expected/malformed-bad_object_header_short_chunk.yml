# A v1 object header declares one message, but its message chunk is too short
# to contain even one v1 message prefix.  h5policy used to accept this because it
# only checked for more parsed messages than declared, not fewer.  Found by
# h5policy-fuzz.
file: malformed/bad_object_header_short_chunk.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_OBJECT_HEADER_MESSAGE_COUNT]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
