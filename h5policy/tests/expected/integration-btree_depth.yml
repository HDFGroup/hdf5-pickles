# The valid 1000-link group's name index is a multi-level v2 B-tree.  Reducing
# only the recursive tree ceiling to one must classify its greater depth as a
# resource-policy choice rather than format corruption.
file: valid/dense_links_deep.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_btree_depth: 1
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_BTREE_DEPTH]
forbidden_findings: [H5_CORRUPT_BTREE_DEPTH_EXCEEDED]
expected_metrics:
  visited_btree_refs: 1
forbidden: [crash, timeout, external_open, plugin_load, write]
