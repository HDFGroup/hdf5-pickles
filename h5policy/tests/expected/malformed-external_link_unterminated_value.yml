# External link whose value carries no NUL terminator, so the target file name
# never ends inside the value.  libhdf5's H5L__extern_traverse runs strlen()
# over it and reads past the buffer -- an out-of-bounds read.  The value is
# structurally malformed, so h5policy rejects it as corrupt under every profile
# (corrupt outranks the external-link policy finding), unlike a well-formed
# external link with a hostile *target*, which is only a policy matter.  Built
# by h5policy-gencorpus, which wipes the NUL terminators in a valid external
# link's value.
file: malformed/external_link_unterminated_value.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_EXTERNAL_LINK_VALUE_NOT_TERMINATED]
h5cve: {family: external_link, allowed_statuses: [violation]}
forbidden: [crash, timeout, external_open, plugin_load, write]
