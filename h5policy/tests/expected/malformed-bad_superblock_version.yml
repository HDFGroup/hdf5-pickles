# The HDF5 signature is intact, but the superblock version byte is patched to
# 0xff.  Mapping cannot construct a supported superblock and must produce a
# normal corruption report rather than continuing with the wrong layout.
file: malformed/bad_superblock_version.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_MAPPING_FAILED]
forbidden: [crash, timeout, external_open, plugin_load, write]
