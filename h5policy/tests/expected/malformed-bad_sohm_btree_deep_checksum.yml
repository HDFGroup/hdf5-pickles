# A child BTLF has a damaged checksum beneath a checksum-valid type-7 root.
file: malformed/bad_sohm_btree_deep_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: shared_messages_legacy
  require_oracle_alignment: true
  # Known divergence, explained: same as bad_sohm_btree_cycle -- write-side
  # index, read path never traverses it, write path rejects. See
  # registry/cases/sohm-index-divergences.yml.
  allowed_statuses: [violation]
expected_finding_evidence_locations:
  H5_CORRUPT_BAD_CHECKSUM:
  - role: actual
    length: 4
  - role: actual_source
    length: 448
forbidden: [crash, timeout, external_open, plugin_load, write]
