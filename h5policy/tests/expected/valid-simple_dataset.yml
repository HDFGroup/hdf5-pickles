# Baseline valid content: a rank-one contiguous dataset containing six int32
# values.  The untrusted-strict walk should accept this ordinary, self-contained
# file without findings.
file: valid/simple_dataset.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
expected_analysis:
  complete: true
  walk_started: true
  walk_completed: true
  stop_reason: ""
  continue_after_rejection: false
  findings_truncated: false
forbidden: [crash, timeout, external_open, plugin_load, write]
