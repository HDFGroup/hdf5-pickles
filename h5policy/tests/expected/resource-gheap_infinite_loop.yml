# An orphaned global heap collection (GCOL) whose free-space object (heap
# index 0) is encoded with a zero length.  libhdf5's H5HG deserialize advances
# by that object's size for index 0, so a zero never moves the parse cursor and
# a consumer that loads the collection loops forever (h5debug hangs on it).
# Nothing references the collection, so the reachable walk and libhdf5's normal
# open never touch it -- only the forensic profile's GCOL signature sweep finds
# it, reporting a resource (denial-of-service) hazard.  The default reachability
# profiles correctly accept the file (the hazard is unreachable).  Built by
# h5policy-gencorpus, which appends the collection to a valid empty file.
file: resource/gheap_infinite_loop.h5
profile: forensic
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_GLOBAL_HEAP_INFINITE_LOOP]
forbidden: [crash, timeout, external_open, plugin_load, write]
