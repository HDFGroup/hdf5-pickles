# A chunked dataset whose scale-offset filter declares a chunk element count
# (cd_values[2]) larger than the real chunk: 65537 for a 4-element chunk.
# libhdf5 auto-derives cd_values[2] from the chunk dataspace and its decompressor
# sizes the per-chunk output buffer as cd_values[2] * element_size, so an inflated
# value drives a write past the buffer sized from the real chunk -- and on a
# 32-bit size_t the 65537 * element_size product wraps and under-allocates (the
# classic filter integer-overflow OOB write).  n-bit (filter 5) shares the same
# cd_values[2] convention and code path.  h5policy reasons about the on-disk
# cd_values[2] in 64 bits and rejects it when it disagrees with the chunk element
# count, independent of target pointer size.  A 64-bit libhdf5 opens the file and
# even reads it (the wrap only bites on 32-bit), so h5policy is deliberately
# stricter here; h5dump still errors, which is the deeper-rejection evidence the
# differential harness demotes on (A+).  Built by h5policy-gencorpus, which
# byte-patches cd_values[2] and repairs the object-header checksum.
file: malformed/scaleoffset_nelmts_mismatch.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FILTER_NELMTS_MISMATCH]
expected_finding_evidence:
  H5_CORRUPT_FILTER_NELMTS_MISMATCH:
    field: filter.decode_element_count
    actual: 65537
    expected: 4
    comparison: equal
expected_finding_evidence_locations:
  H5_CORRUPT_FILTER_NELMTS_MISMATCH:
    - role: actual
      length: 4
      little_endian_value: 65537
forbidden: [crash, timeout, external_open, plugin_load, write]
