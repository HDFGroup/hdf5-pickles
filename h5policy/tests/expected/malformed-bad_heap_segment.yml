# An old-style group's local heap declares a ~1 TB data-segment size, far past
# the file.  libhdf5 rejects the oversized heap segment; h5policy used to read
# the size without bounds-checking the segment.  Found by h5policy-fuzz.
file: malformed/bad_heap_segment.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LENGTH_OVERFLOW]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: heap_structures
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
