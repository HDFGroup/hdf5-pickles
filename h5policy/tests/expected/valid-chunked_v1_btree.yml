# Regression guard for chunk-index traversal: an old-format chunked dataset
# (v3 layout -> v1 type-1 B-tree) with multiple chunks.  h5policy walks the
# index, counts chunks, checks each chunk address is in-file, and accepts.
file: valid/chunked_v1_btree.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden: [crash, timeout, external_open, plugin_load, write]
