# Start from the forensic preset but disable only its unreachable-metadata
# sweep.  The orphaned GCOL is unreachable, so the ordinary walk accepts it.
file: resource/gheap_infinite_loop.h5
profile: forensic
profile_overrides:
  analysis:
    sweep_unreachable_metadata: 0
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden_findings: [H5_RESOURCE_GLOBAL_HEAP_INFINITE_LOOP]
expected_mapping_mode: non_strict
forbidden: [crash, timeout, external_open, plugin_load, write]
