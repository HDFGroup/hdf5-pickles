# A scaleoffset filter-pipeline message is retagged as a legacy compact layout.
# The filter descriptor bytes then declare inline data far beyond the layout
# message, matching the CVE-2020-10811 decode-overrun shape.
file: malformed/bad_compact_layout_overrun.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LAYOUT_MESSAGE_TOO_SMALL]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
