# A fixed array large enough to page its data block is not decoded yet -> "not
# yet classified".  Flips to accept when paged data blocks are covered.
file: coverage/chunk_fixed_array_paged.h5
profile: untrusted-strict
expected_decision: unsupported_coverage_gap
expected_exit: 5
required_findings: [H5_UNSUPPORTED_PICKLE_COVERAGE_GAP]
forbidden: [crash, timeout, external_open, plugin_load, write]
