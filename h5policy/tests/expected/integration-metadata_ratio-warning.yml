# A reduced warning rule crosses both strict comparisons after a complete walk;
# the reject rule is explicitly disabled as a valid zero/zero pair.
file: valid/simple_dataset.h5
profile: untrusted-strict
profile_overrides:
  heuristics:
    metadata_ratio_warn_percent: 1
    metadata_ratio_warn_min_bytes: 0
    metadata_ratio_reject_percent: 0
    metadata_ratio_reject_min_bytes: 0
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_METADATA_RATIO]
forbidden_findings: [H5_RESOURCE_METADATA_RATIO]
forbidden: [crash, timeout, external_open, plugin_load, write]
