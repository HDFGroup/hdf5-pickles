# A symbol-table entry's link-name offset points past the local heap data segment (libhdf5: 'unable to offset into local heap data block').
# h5dump/libhdf5 fails on it; h5policy used to wrongly accept.  Byte-patched
# from a v1-header base by gencorpus.
file: malformed/bad_offset.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_HEAP_OFFSET_OUT_OF_BOUNDS]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: heap_structures
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
