# The same below-floor direct block as malformed-dblock_size_below_floor.h5,
# differing in ONE bit: the heap header's "direct blocks are checksummed" flag
# is clear.
#
# That bit used to decide whether h5policy looked at the block size at all.  The
# floor was a side effect of the checksum-position check ("checksum field
# outside block"), which sits behind an early return for heaps that do not
# checksum direct blocks -- so this file was ACCEPTED, exit 0, with no findings,
# while libhdf5 refuses to traverse it.  A false accept, caught while
# investigating corpus seed 61.
#
# The prefix exists whether or not a checksum follows, so the floor is now
# enforced independently of the flag.  This fixture is the guard for that: it
# fails if the check is ever moved back behind the checksum gate.  libhdf5 does
# not fault here (no checksum read to overflow), it just rejects -- which is
# precisely why only the oracle side can catch this one.
file: malformed/dblock_size_below_floor_nochecksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LENGTH_OVERFLOW]
h5cve: {family: heap_structures, allowed_statuses: [unexercised]}
forbidden: [accept, crash, timeout, external_open, plugin_load, write]
