# A dense-LINK name-index v2 B-tree root leaf (type 5, depth 0) declares more
# records than the node can hold: nrec is set past (node_size - 10)/record_size
# and the header checksum recomputed, so nothing upstream rejects it first.
#
# libhdf5 allocates node_size bytes for the node image and then locates the
# trailing checksum at 6 + nrec*record_size, i.e. past that allocation --
# heap-buffer-overflow READ in H5F_get_checksums <- H5B2__cache_leaf_verify_chksum
# (H5B2cache.c:973), confirmed on an ASAN build of 2.2.0.  The STOCK build does
# not fault: it reads out of bounds, compares garbage, and reports "incorrect
# metadata checksum after all read attempts".  That graceful rejection is the
# RESULT of the overflow, not a bound that prevented it, which is why the canary
# status here is unexercised rather than violation -- the uninstrumented build
# this matrix runs against has nothing observable to report.
#
# Guards the leaf half of the capacity check.  h5_btree2.pk's shared engine and
# the creation-order walker always had it; the two hand-written name-index
# readers compared the used-byte count only against file_size until 2026-07-22.
# See cases/GHSA-hx9j-mp99-2p98-63 and the internal-node sibling fixture.
file: malformed/over_capacity_v2_btree_leaf.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_V2_BTREE_NODE_SIZE]
h5cve: {family: dense_index, allowed_statuses: [unexercised]}
forbidden: [crash, timeout, external_open, plugin_load, write]
