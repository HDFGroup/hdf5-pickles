# An old-style group's v1 B-tree key (a local-heap name offset) points past the
# heap data segment.  libhdf5: 'unable to offset into local heap data block'.
# h5policy validated SNOD name offsets but not the B-tree keys.  Found by h5policy-fuzz.
file: malformed/bad_btree_key.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_HEAP_OFFSET_OUT_OF_BOUNDS]
forbidden: [crash, timeout, external_open, plugin_load, write]
