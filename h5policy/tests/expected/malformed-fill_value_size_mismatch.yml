# A dataset whose fill-value message declares 1 byte behind a 256-byte opaque
# datatype.  libhdf5 allocates the fill buffer at the DECLARED size and then
# copies at the DATATYPE size: H5D__fill -> H5S_select_fill -> H5VM_array_fill
# memcpy()s 256 bytes out of a 1-byte allocation.
#
# The reason this fixture matters more than a crash fixture: on libhdf5 2.2.0
# this is NOT a crash.  H5Dread returns 0 and hands the caller 255 bytes of
# adjacent heap -- pointer values included -- as if it were dataset content.
# ASAN reports "READ of size 256 ... 0 bytes after 1-byte region"; the stock
# build reports nothing at all.  A silent disclosure is precisely the case a
# metadata preflight exists for, because nothing downstream will notice.
#
# Hence the canary split: the stock build this matrix runs against reports
# `accepted` (it does not fault); the canary status is [verified] rather
# than [violation].  Do NOT read that as libhdf5 handling the file correctly --
# it is the leaking path that does not fault.  Verified on the ASAN candidate,
# where the same file reports outcome=crashed.
#
# Source: cases/GHSA-vphp-6m8x-3gwq-52.  Built by h5policy-gencorpus
# _make_fill_value_size_mismatch, which shrinks the v3 fill message's declared
# size from 256 to 1 and repairs the object-header checksum (without that
# repair libhdf5 rejects the file before it ever reaches H5D__fill, and the
# fixture would prove nothing).
file: malformed/fill_value_size_mismatch.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FILL_VALUE_SIZE_MISMATCH]
h5cve: {family: dataset_layout_filter_fill, allowed_statuses: [verified]}
forbidden: [accept, crash, timeout, external_open, plugin_load, write]
