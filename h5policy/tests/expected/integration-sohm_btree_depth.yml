# A zero depth allowance rejects the genuine type-7 BTIN root as a resource
# decision before following any child.
file: valid/sohm_btree.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_btree_depth: 0
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_BTREE_DEPTH]
forbidden_findings: [H5_CORRUPT_SOHM_BTREE_CYCLE]
forbidden: [crash, timeout, external_open, plugin_load, write]
