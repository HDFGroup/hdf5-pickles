# The minimal libhdf5-generated file contains only its root group.  It is the
# untrusted-strict baseline for mapping and walking a self-contained file with
# no findings or feature-policy decisions.
file: valid/empty.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
h5cve:
  families: [dense_index, datatypes, dataspace_dimension, dataset_layout_filter_fill, btree_heap_index, cache_image_dependency_graph]
  allowed_statuses: [unexercised]
forbidden: [crash, timeout, external_open, plugin_load, write]
