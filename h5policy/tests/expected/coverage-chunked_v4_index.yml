# Modern chunked datasets use a v4 layout index (fixed array / extensible array
# / v2 B-tree) that is not decoded yet -> "not yet classified".  Flips to accept
# when v4 chunk-index coverage lands.
file: coverage/chunked_v4_index.h5
profile: untrusted-strict
expected_decision: unsupported_coverage_gap
expected_exit: 5
required_findings: [H5_UNSUPPORTED_PICKLE_COVERAGE_GAP]
forbidden: [crash, timeout, external_open, plugin_load, write]
