# A tracked-order link-info message encodes max creation order as a signed
# int64.  Values with the sign bit set are rejected by libhdf5's
# H5O__linfo_decode before the group can be traversed.
file: malformed/bad_link_info_max_corder.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LINK_INFO_NEGATIVE_MAX_CORDER]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
