# Both reduced ratio rules trigger on this metadata-heavy small file.  The
# stricter reject rule runs first and suppresses the advisory warning.
file: valid/simple_dataset.h5
profile: untrusted-strict
profile_overrides:
  heuristics:
    metadata_ratio_warn_percent: 1
    metadata_ratio_warn_min_bytes: 0
    metadata_ratio_reject_percent: 2
    metadata_ratio_reject_min_bytes: 0
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_METADATA_RATIO]
forbidden_findings: [H5_ADVISORY_METADATA_RATIO]
forbidden: [crash, timeout, external_open, plugin_load, write]
