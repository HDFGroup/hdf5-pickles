# A well-formed scale-offset dataset (10x10 i4, chunks 5x5).  Structurally valid,
# so h5policy accepts -- but reading the data requires decoding untrusted bytes,
# so the decision carries the decode-filter advisory.  Its cd_values[2] (chunk
# element count) and cd_values[4] (element size) match the real chunk shape and
# datatype, so the filter chunk-consistency checks must NOT fire: this is the
# regression guard against a false positive in H5_CORRUPT_FILTER_NELMTS_MISMATCH /
# H5_CORRUPT_FILTER_ELEMENT_SIZE_MISMATCH, and against the v4 chunk element-count
# computation double-counting the trailing element-size dimension.
file: valid/scaleoffset_filter.h5
profile: untrusted-strict
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_DECODE_FILTER]
forbidden: [crash, timeout, external_open, plugin_load, write]
