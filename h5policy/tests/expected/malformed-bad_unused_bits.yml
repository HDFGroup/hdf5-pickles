# A fixed-point datatype whose size (65525 bytes) vastly exceeds its precision
# (32 bits) -- libhdf5: 'unusually large # of unused bits'.  h5dump/libhdf5
# fails on it; h5policy used to wrongly accept.  Byte-patched from a v1-header
# base by gencorpus.
file: malformed/bad_unused_bits.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATATYPE_UNUSED_BITS]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: datatypes
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
