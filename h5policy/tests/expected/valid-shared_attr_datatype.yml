# An attribute referencing a committed (shared) datatype.  The attribute's
# datatype field is a shared-message wrapper pointing at the committed
# datatype's object header; h5policy resolves it -- following the OCHK
# continuation chunk the datatype message lands in -- and validates the
# recovered datatype, so the file is a clean accept.
file: valid/shared_attr_datatype.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
h5cve:
  family: shared_messages_legacy
  allowed_statuses: [verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
