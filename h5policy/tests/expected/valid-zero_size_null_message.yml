# A v1 object header with zero-size NIL messages before later real messages and
# at the end of chunk 0.  libhdf5/h5dump accept this layout; the NIL messages
# count toward the declared v1 message total.  The gzip filter still produces
# the normal decode advisory.
file: valid/zero_size_null_message.h5
profile: untrusted-strict
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_DECODE_FILTER]
forbidden: [crash, timeout, external_open, plugin_load, write]
