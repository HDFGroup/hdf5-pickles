# Regression guard for the recursive dense-link v2 B-tree descent: a 1000-child
# group whose name index is multiple levels deep.  Every child (including those
# whose records live in internal nodes) must be reached and accepted.
file: valid/dense_links_deep.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
h5cve:
  family: btree_heap_index
  allowed_statuses: [verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
