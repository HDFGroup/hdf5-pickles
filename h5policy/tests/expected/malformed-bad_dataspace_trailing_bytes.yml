# A v1 dataspace message is inflated so its payload swallows the following
# object-header message prefix.  Those nonzero bytes are not legal dataspace
# padding and must be rejected before they can desynchronize the message walk.
file: malformed/bad_dataspace_trailing_bytes.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATASPACE_NONZERO_PADDING]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: dataspace_dimension
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
