# A v1 object header declares fewer messages than its chunk actually contains.
# libhdf5 rejects this as a bad object-header message count.
file: malformed/bad_object_header_message_count.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_OBJECT_HEADER_MESSAGE_COUNT
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
