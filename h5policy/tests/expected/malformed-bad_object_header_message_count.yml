# A v1 object header declares fewer messages than its chunk actually contains.
# libhdf5 rejects this as a bad object-header message count.
file: malformed/bad_object_header_message_count.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_OBJECT_HEADER_MESSAGE_COUNT
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
expected_finding_evidence_locations:
  H5_CORRUPT_OBJECT_HEADER_MESSAGE_COUNT:
  - role: expected
    length: 2
    little_endian_value: 1
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
