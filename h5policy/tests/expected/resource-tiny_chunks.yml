# Legal HDF5 with many tiny logical chunks.  untrusted-strict treats the
# metadata/cache overhead per useful byte as a denial-of-service resource shape.
file: resource/tiny_chunks.h5
profile: untrusted-strict
expected_decision: reject_resource
expected_exit: 4
required_findings:
  - H5_RESOURCE_CHUNK_TOO_SMALL
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
