# A gzip-compressed dataset.  Structurally valid (libhdf5 opens it), so h5policy
# accepts -- but reading the data requires decoding untrusted bytes, so the
# decision carries the decode-filter advisory.  Guards the H5_ADVISORY_DECODE_FILTER
# path (the H5Z filter-decompression CVE class, e.g. scale-offset CVE-2025-2308).
file: valid/decode_filter.h5
profile: untrusted-strict
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_DECODE_FILTER]
forbidden: [crash, timeout, external_open, plugin_load, write]
