# With this deterministic tree, the first chunk leaf accounts for exactly 57
# records.  The parent must still enter the next child at equality, where a
# nonempty validated leaf proves overflow and stops further index descent.
file: valid/chunked_v1_btree_deep.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_chunk_count: 57
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_CHUNK_COUNT]
forbidden_findings:
  - H5_CORRUPT_BTREE_NODE_ENTRY_COUNT
  - H5_CORRUPT_OFFSET_OUT_OF_FILE
expected_metrics:
  chunk_index_refs: 57
  visited_btree_refs: 5
forbidden: [crash, timeout, external_open, plugin_load, write]
