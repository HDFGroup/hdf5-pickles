# A v4 chunked layout whose encoded chunk dimensions multiply to 2**32 + 256.
# libhdf5 stores the per-chunk byte size in a uint32_t (H5O_layout_chunk_t.size),
# computed as the product of all encoded dims (the trailing dim is the element
# size), with no overflow check on decode -- so the product wraps to 256.  A
# 256-byte chunk buffer is then allocated for a chunk that covers ~4 GiB, an
# out-of-bounds write on the subsequent read.  h5policy multiplies the dims in
# 64 bits and rejects any chunk whose byte size cannot fit libhdf5's 32-bit
# field, independent of target pointer size.  No valid file reaches this state:
# H5Pset_chunk rejects chunks >= 4 GiB at creation, so libhdf5 refuses the
# dataset on open (the differential harness sees A': libhdf5 rejects => h5policy
# refuses).  Built by h5policy-gencorpus, which patches one encoded chunk
# dimension to 0x40000040 and repairs the object-header checksum.
file: malformed/chunk_size_uint32_wrap.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT]
forbidden: [accept, unsupported_coverage_gap, crash, timeout, external_open, plugin_load, write]
