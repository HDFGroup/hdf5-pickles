# A v4 chunked layout whose encoded chunk dimensions multiply to 2**32 + 256.
# Legacy libhdf5 stores the per-chunk byte size in a uint32_t
# (H5O_layout_chunk_t.size), computed as the product of all encoded dims (the
# trailing dim is the element size). Vulnerable versions wrap the product to
# 256 and can allocate a 256-byte buffer for a chunk covering ~4 GiB; newer
# versions reject the oversized legacy chunk. h5policy multiplies the dims in
# 64 bits and rejects any chunk whose byte size cannot fit the 32-bit field,
# independent of target pointer size. No valid writer-produced file reaches
# this state: H5Pset_chunk rejects chunks >= 4 GiB at creation. Built by
# h5policy-gencorpus, which patches one encoded chunk dimension to 0x40000040
# and repairs the object-header checksum.
file: malformed/chunk_size_uint32_wrap.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT]
expected_finding_evidence:
  H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT:
    field: layout.chunk_size_overflow_product
    actual: 4294967552
    expected: 4294967295
    comparison: less_than_or_equal
expected_finding_evidence_locations:
  H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT:
    - role: actual_source
      length: 4
      little_endian_value: 1073741888
    - role: actual_source
      length: 4
      little_endian_value: 4
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dataset_layout_filter_fill
  require_oracle_alignment: true
  # GENUINE gap, UNINVESTIGATED: libhdf5 accepts a chunk size whose 32-bit
  # arithmetic wraps. Integer-overflow shaped and the highest-priority of
  # the outstanding divergences -- see registry/cases/arithmetic-
  # divergences-backlog.yml before relying on this allowance.
  allowed_statuses: [violation]
forbidden: [accept, unsupported_coverage_gap, crash, timeout, external_open, plugin_load, write]
