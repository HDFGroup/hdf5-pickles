# The reduced ceiling permits the SOHM table, heap, B-tree header, and root,
# then saturates while charging the first complete fixed-size child node.
file: valid/sohm_btree.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_accounted_metadata_bytes: 1600
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_ACCOUNTED_METADATA_BYTES]
expected_metrics:
  metadata_bytes_seen: 1600
forbidden: [crash, timeout, external_open, plugin_load, write]
