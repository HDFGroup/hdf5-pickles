# The ceiling permits the huge-object header and BTIN root, then saturates on
# the first fixed-size BTLF allocation.
file: coverage/sohm_huge_btree.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_accounted_metadata_bytes: 2000
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_ACCOUNTED_METADATA_BYTES]
expected_metrics:
  metadata_bytes_seen: 2000
forbidden_findings: [H5_UNSUPPORTED_PICKLE_COVERAGE_GAP]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: shared_messages_legacy
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
