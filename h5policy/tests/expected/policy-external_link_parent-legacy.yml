# Legacy permits external links, but this link's target file name is a
# parent-directory ("../elink_target.h5") reference.  The target-path classifier
# flags it as a traversal hazard (advisory only -- h5policy resolves nothing and
# never opens the target).  This is the path-traversal shape that untrusted-strict
# rejects wholesale via H5_POLICY_EXTERNAL_LINK.
file: policy/external_link_parent.h5
profile: legacy
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_EXTERNAL_LINK_PARENT_PATH]
h5cve: {family: external_link, allowed_statuses: [violation]}
forbidden: [accept, external_open, plugin_load, write, crash, timeout]
