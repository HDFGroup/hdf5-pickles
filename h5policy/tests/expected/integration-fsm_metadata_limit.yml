# The reduced ceiling admits the superblock, root group, and shared-message
# table, then saturates while charging the first free-space manager header
# (FSHD), proving the free-space walk participates in metadata accounting.
file: valid/fsm_persist.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_accounted_metadata_bytes: 450
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_ACCOUNTED_METADATA_BYTES]
expected_metrics:
  metadata_bytes_seen: 450
forbidden: [crash, timeout, external_open, plugin_load, write]
