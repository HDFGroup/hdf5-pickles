# Persistent, non-paged free-space managers: eight datasets created and four
# freed, so the file-level free space is serialized into FSHD headers and FSSE
# section lists referenced from the file-space-info message.  h5policy walks
# every manager (header checksum, section-list checksum, and each free
# section's extent) and accepts the fully-covered file.
file: valid/fsm_persist.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden: [crash, timeout, external_open, plugin_load, write]
