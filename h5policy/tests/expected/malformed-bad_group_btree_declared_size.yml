# The superblock's group B-tree K value makes the declared root B-tree node body
# run past EOA.  h5policy must size old v1 B-tree nodes from the superblock K,
# not just from entries_used.
file: malformed/bad_group_btree_declared_size.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LENGTH_OVERFLOW]
h5cve:
  family: btree_heap_index
  require_oracle_alignment: true
  allowed_statuses: [unexercised, violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
