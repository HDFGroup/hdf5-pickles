# The cache-image traversal boundary must SKIP shadowed addresses, not abandon
# the walk.  Companion to valid-cache_image-forensic.yml, which pins the other
# half: shadowed bytes must never be decoded.
#
# A cache image shadows only the addresses it caches.  Here it caches the
# dense-link B-tree LEAF, while the B-tree header just before it -- carrying a
# record count of 59 against a 45-record node -- is NOT cached.  h5policy must
# skip the shadowed leaf and still reach the unshadowed header, so forensic
# reports BOTH the coverage gap and the named corruption.
#
# Why this matters: the boundary began as a hard stop at the first cache image,
# which reported unsupported_coverage_gap on GHSA-79pc-6c3v-2cp3/62 -- a file
# that SIGSEGVs stock libhdf5 2.2.0 (heap-buffer-overflow WRITE in
# H5G__dense_btree2_name_decode).  This fixture reproduces that shape
# deterministically and crashes libhdf5 the same way, hence allowed_statuses
# [violation].  Revert the skip to a stop and this expectation fails; the
# capacity check alone does not save it, because the walk never gets there.
#
# untrusted-strict is deliberately NOT pinned here: it stops at the first
# non-accept finding, which is the coverage gap itself, so it reports
# unsupported_coverage_gap (exit 5).  That is a refusal, not an accept.
# Enumeration is forensic's job.
file: malformed/cache_image_unshadowed_btree.h5
profile: forensic
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_V2_BTREE_NODE_SIZE, H5_UNSUPPORTED_PICKLE_COVERAGE_GAP]
forbidden_findings: [H5_CORRUPT_UNSUPPORTED_OBJECT_HEADER_VERSION]
expected_analysis:
  complete: false
  walk_started: true
  walk_completed: false
  stop_reason: cache_image_coverage_gap
  continue_after_rejection: true
  findings_truncated: false
h5cve: {family: dense_index, allowed_statuses: [violation]}
forbidden: [accept, crash, timeout, external_open, plugin_load, write]
