# A file free-space manager's serialized section-list (FSSE) checksum is
# flipped.  h5policy verifies the list checksum over its used prefix and rejects.
file: malformed/bad_fsm_section_list_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
forbidden: [crash, timeout, external_open, plugin_load, write]
