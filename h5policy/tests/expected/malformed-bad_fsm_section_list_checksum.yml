# A file free-space manager's serialized section-list (FSSE) checksum is
# flipped.  h5policy verifies the list checksum over its used prefix and rejects.
file: malformed/bad_fsm_section_list_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: validation_controls
  # The free_space canary (H5Fget_free_sections) is this family's exact-build
  # surface.  libhdf5 REACHES the section list and refuses it
  # (rejected_in_traversal, aligned with the oracle): it does verify the FSSE
  # checksum, so no section is reported and the canary cannot complete.
  allowed_statuses: [unexercised]
expected_finding_evidence_locations:
  H5_CORRUPT_BAD_CHECKSUM:
  - role: actual
    length: 4
  - role: actual_source
    length: 67
forbidden: [crash, timeout, external_open, plugin_load, write]
