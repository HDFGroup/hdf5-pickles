# A valid external-file-list slot is patched so its filename offset lies beyond
# the referenced local heap.  trusted-fast permits the feature but must still
# validate the in-file name reference before any external access.
file: malformed/bad_efl_name_offset.h5
profile: trusted-fast
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_EXTERNAL_FILE_LIST_NAME_OFFSET]
forbidden: [crash, timeout, external_open, plugin_load, write]
