# A normal dense-link file is run with a reduced deterministic work budget.
# The metric saturates exactly at the inclusive ceiling, independent of time.
file: valid/dense_links_deep.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_walk_operations: 1000
expected_decision: unsupported_coverage_gap
expected_exit: 5
required_findings: [H5_UNSUPPORTED_WALK_OPERATION_BUDGET]
expected_metrics:
  walk_operations: 1000
forbidden_findings: [H5_UNSUPPORTED_WALK_TIME_BUDGET]
forbidden: [crash, timeout, external_open, plugin_load, write]
