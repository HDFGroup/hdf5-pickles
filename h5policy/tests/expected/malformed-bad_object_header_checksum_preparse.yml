# A corrupt v2 child object header whose bad checksum must be reported before
# malformed dense-attribute metadata can turn the parse into an internal error.
file: malformed/bad_object_header_checksum_preparse.h5
profile: forensic
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_BAD_CHECKSUM
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
