# A version-1 compound whose legacy embedded-array member overruns the compound
# element: the member is a [262144] array of H5T_STD_U8LE (262144 bytes) inside
# a compound element declared as only 16 bytes.  libhdf5 reads base_size *
# element_count bytes per element, so the member extends far past the element
# storage -- an out-of-bounds read (h5py refuses the type; h5dump reads past the
# 16 real bytes).  h5policy must reject the member as extending outside its
# parent type, using the array footprint (base_size * nelem) rather than just
# the base size.  Built by h5policy-gencorpus, which splices a hand-built v1
# compound datatype into a compact dataset header of matching element size.
file: malformed/compound_member_array_bounds.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATATYPE_COMPOUND_MEMBER_BOUNDS]
forbidden: [crash, timeout, external_open, plugin_load, write]
