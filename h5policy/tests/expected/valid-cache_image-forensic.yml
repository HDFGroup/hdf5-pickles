# A metadata cache image can shadow the ordinary on-disk bytes at a logical
# metadata address.  Until h5policy decodes those cached bodies, forensic mode
# must stop at that dependency boundary instead of interpreting stale backing
# bytes as live metadata and manufacturing a corruption finding.
file: valid/cache_image.h5
profile: forensic
expected_decision: unsupported_coverage_gap
expected_exit: 5
required_findings: [H5_UNSUPPORTED_PICKLE_COVERAGE_GAP]
forbidden_findings: [H5_CORRUPT_UNSUPPORTED_OBJECT_HEADER_VERSION]
expected_analysis:
  complete: false
  walk_started: true
  walk_completed: false
  stop_reason: cache_image_coverage_gap
  continue_after_rejection: true
  findings_truncated: false
forbidden: [accept, crash, timeout, external_open, plugin_load, write]
