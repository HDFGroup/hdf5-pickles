# A version-1 compound whose member uses the legacy embedded-array encoding
# with dimensions [65537,65536,65536,65536] -- a product of 2**64 + 2**48 that
# overflows a 64-bit element count.  libhdf5 later scales that count by the base
# type size (H5T__array_create), so it wraps and underflows the array type's
# size; consumers that build the type overflow (h5py: "dtype size in bytes must
# fit into a C int").  h5policy validates the element-count product for the v1
# embedded-array member just as it does for a standalone array datatype, and
# rejects it as corrupt under every profile.  Built by h5policy-gencorpus, which
# splices a hand-built v1 compound datatype into a compact dataset header.
file: malformed/compound_member_array_nelem_overflow.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LENGTH_OVERFLOW]
forbidden: [crash, timeout, external_open, plugin_load, write]
