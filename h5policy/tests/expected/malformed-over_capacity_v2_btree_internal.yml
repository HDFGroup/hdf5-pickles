# The internal-node half of the same defect as
# malformed-over_capacity_v2_btree_leaf.h5, on the other reader that lacked the
# check: a dense-ATTRIBUTE name-index v2 B-tree (type 8) whose root is at
# depth 1, so the over-capacity node is an INTERNAL node.
#
# An internal node's checksum sits after the records AND the (nrec+1) child
# pointers, so the overflow surfaces one frame apart from the leaf case --
# H5F_get_checksums <- H5B2__cache_int_verify_chksum (H5B2cache.c:573) under
# ASAN.  Worth its own fixture precisely because the leaf check does not cover
# it: fixing only h5policy_dense_leaf_* would leave this path reporting a
# downstream BAD_CHECKSUM instead of the cause.
#
# family is heap_structures, not dense_index: dense ATTRIBUTE storage belongs to
# heap_structures throughout the registry (heap.attribute_info_*, and the
# valid-dense_attribute canary), and the finding message carries the role that
# routes it there.  Stock libhdf5 rejects without faulting, hence unexercised.
file: malformed/over_capacity_v2_btree_internal.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_V2_BTREE_NODE_SIZE]
h5cve: {family: heap_structures, allowed_statuses: [unexercised]}
forbidden: [crash, timeout, external_open, plugin_load, write]
