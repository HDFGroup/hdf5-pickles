# Contiguous dataset whose data address is inside the file but whose data range
# ends past the end-of-file.
#
# The address_space_bounds canary specimen: the superblock is untouched and
# valid, so libhdf5 opens the file (h5ls -r exits 0) and only trips when the
# dataset is opened or read (h5dump exits 1). The family's other fixture,
# inflated_eoa_ext_addr, is refused at H5Fopen and so never reaches the family
# surface.
file: malformed/contiguous_data_past_eof.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LENGTH_OVERFLOW]
h5cve:
  family: address_space_bounds
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
