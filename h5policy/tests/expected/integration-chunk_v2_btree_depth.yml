# The valid chunk tree has a BTIN root.  A zero recursive-depth allowance must
# reject at that root as a resource choice, not misclassify it as corruption.
file: valid/chunk_v2_btree_deep.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_btree_depth: 0
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_BTREE_DEPTH]
forbidden_findings: [H5_CORRUPT_CHUNK_INDEX_CYCLE]
forbidden: [crash, timeout, external_open, plugin_load, write]
