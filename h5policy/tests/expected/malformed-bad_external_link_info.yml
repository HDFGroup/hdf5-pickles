# The external link user-data length is smaller than the minimum encoded
# external-link value.  libhdf5 rejects it while decoding the link message,
# before any external-link traversal policy should decide the file.
file: malformed/bad_external_link_info.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_EXTERNAL_LINK_INFO_TOO_SMALL]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: external_link
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
