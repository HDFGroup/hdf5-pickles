# The canonical continuation flag drains the reachable queue after a rejection,
# so the JSON must distinguish this complete diagnostic pass from fail-fast
# output over the same malformed file.
file: malformed/bad_btree_key.h5
profile: untrusted-strict
mode_flags: [--continue-after-rejection]
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_HEAP_OFFSET_OUT_OF_BOUNDS]
expected_analysis:
  complete: true
  walk_started: true
  walk_completed: true
  stop_reason: ""
  continue_after_rejection: true
  findings_truncated: false
forbidden: [crash, timeout, external_open, plugin_load, write]
