# A v4 contiguous dataset whose declared EOF is one byte below the end of its
# contiguous data.  libhdf5 rejects ("invalid dataset size"); h5policy must
# bounds-check the contiguous data extent against the EOF ceiling.  The v4 layout
# branch used to skip this (v3 had it) -- found by the structure-aware fuzzer.
file: malformed/eof_truncates_data.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LENGTH_OVERFLOW]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: address_space_bounds
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
