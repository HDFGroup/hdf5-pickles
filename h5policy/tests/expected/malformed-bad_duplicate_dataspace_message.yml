# A dataset object header has a second dataspace message whose payload is
# actually a chunked layout message.  libhdf5 rejects the duplicate dataspace
# while decoding its unsupported version byte.  Found by h5policy-fuzz's
# checksum-repairing struct mutator.
file: malformed/bad_duplicate_dataspace_message.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_UNSUPPORTED_DATASPACE_VERSION]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dataspace_dimension
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
expected_finding_evidence_locations:
  H5_CORRUPT_UNSUPPORTED_DATASPACE_VERSION:
  - role: actual
    length: 1
    little_endian_value: 4
forbidden: [crash, timeout, external_open, plugin_load, write]
