# Old-style group B-tree with a high-bit child address.  The pointer field is
# corrupt; reporting it must not convert the target address to a poke offset
# before the range check.
file: malformed/bad_group_btree_child_address.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_OFFSET_OUT_OF_FILE
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: btree_heap_index
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
expected_finding_evidence_locations:
  H5_CORRUPT_OFFSET_OUT_OF_FILE:
  - role: actual
    length: 8
    little_endian_value: 2305843009213695024
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
