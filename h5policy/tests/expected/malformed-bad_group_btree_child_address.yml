# Old-style group B-tree with a high-bit child address.  The pointer field is
# corrupt; reporting it must not convert the target address to a poke offset
# before the range check.
file: malformed/bad_group_btree_child_address.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_OFFSET_OUT_OF_FILE
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
