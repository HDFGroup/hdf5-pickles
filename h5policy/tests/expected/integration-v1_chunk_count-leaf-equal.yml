# The legacy chunk B-tree contains exactly four allocated chunks.  Equality at
# a finite ceiling is allowed and the complete leaf remains structurally
# validated.
file: valid/chunked_v1_btree.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_chunk_count: 4
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden_findings:
  - H5_RESOURCE_CHUNK_COUNT
  - H5_CORRUPT_BTREE_NODE_ENTRY_COUNT
expected_metrics:
  chunk_index_refs: 4
  visited_btree_refs: 3
forbidden: [crash, timeout, external_open, plugin_load, write]
