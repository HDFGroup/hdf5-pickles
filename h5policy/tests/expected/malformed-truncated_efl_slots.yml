# An external-file-list header declares two allocated and used slots, but the
# message contains bytes for only one.  trusted-fast must reject the truncated
# in-file slot array before attempting any external access.
file: malformed/truncated_efl_slots.h5
profile: trusted-fast
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_EXTERNAL_FILE_LIST_TRUNCATED_SLOTS]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: external_file_list
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
