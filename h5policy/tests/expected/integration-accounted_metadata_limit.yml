# A complete file run with a reduced accounted-metadata ceiling.  The first
# charge crosses the limit, saturates the public metric, and rejects as a
# resource policy rather than corruption.
file: valid/simple_dataset.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_accounted_metadata_bytes: 1
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_ACCOUNTED_METADATA_BYTES]
expected_metrics:
  metadata_bytes_seen: 1
forbidden: [crash, timeout, external_open, plugin_load, write]
