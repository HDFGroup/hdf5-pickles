# A chunked dataset whose scale-offset filter declares a per-element size
# (cd_values[4], H5Z_SCALEOFFSET_PARM_SIZE) larger than the real datatype:
# 131073 for an i4 (4-byte) datatype, with the element count left consistent.
# cd_values[4] is the second factor libhdf5 multiplies into the decompressed
# buffer (nelmts * size), so inflating it alone still overflows that product on a
# 32-bit size_t (131073 * 131073 wraps below the real chunk) and drives the same
# out-of-bounds write -- reachable even when the element count matches the chunk.
# h5policy reasons about cd_values[4] in 64 bits and rejects it when it disagrees
# with the dataset's datatype size, independent of target pointer size.  A 64-bit
# libhdf5 opens and reads the file; h5dump reading data errors, the deeper A+
# evidence the differential harness demotes on.  Built by h5policy-gencorpus,
# which byte-patches cd_values[4] and repairs the object-header checksum.
file: malformed/scaleoffset_size_mismatch.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FILTER_ELEMENT_SIZE_MISMATCH]
forbidden: [crash, timeout, external_open, plugin_load, write]
