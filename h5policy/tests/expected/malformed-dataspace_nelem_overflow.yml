# Compact dataset whose dataspace dimensions multiply to more than 2**64.
# libhdf5 stores the element count in hsize_t, so the product wraps to a small
# value and it under-sizes the inline compact buffer -- an out-of-bounds read
# in H5D__compact_readvv (h5dump segfaults reading the data).  An
# unrepresentable element count is invalid metadata, so h5policy rejects it as
# corrupt under every profile -- distinct from a representable-but-oversized
# dataset, which is a tunable resource shape (H5_RESOURCE_LOGICAL_DATASET_BYTES).
# Built by h5policy-gencorpus, which overflows the dims of a compact 2-D dataset.
file: malformed/dataspace_nelem_overflow.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATASPACE_NELEM_OVERFLOW]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dataspace_dimension
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
