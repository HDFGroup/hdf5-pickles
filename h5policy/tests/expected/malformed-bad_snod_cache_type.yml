# An old-style group's symbol-table entry declares an unknown cache type (>2).
# libhdf5: "unknown symbol table entry cache type".  h5policy did not validate
# the field.  Found by the structure-aware fuzzer (h5policy-fuzz, interesting).
file: malformed/bad_snod_cache_type.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_SYMBOL_TABLE_CACHE_TYPE]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
