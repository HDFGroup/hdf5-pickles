# The dataspace current dimension is larger than its encoded maximum dimension.
# libhdf5 rejects this while opening the dataset's dataspace.
file: malformed/bad_dataspace_maxdim.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_DATASPACE_DIMENSION_EXCEEDS_MAX
h5cve:
  family: dataspace_dimension
  require_oracle_alignment: true
  allowed_statuses: [unexercised, violation]
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
