# The shared count-boundary fixture is ordinary valid HDF5: four allocated
# chunks and a two-stage shuffle+gzip pipeline.  Only gzip's normal metadata-
# only decode advisory prevents an unconditional accept.
file: integration/multi_filter_dataset.h5
profile: untrusted-strict
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_DECODE_FILTER]
forbidden_findings:
  - H5_RESOURCE_CHUNK_COUNT
  - H5_RESOURCE_FILTER_COUNT
expected_metrics:
  chunk_index_refs: 4
expected_features:
  decode_filters: [1]
forbidden: [crash, timeout, external_open, plugin_load, write]
