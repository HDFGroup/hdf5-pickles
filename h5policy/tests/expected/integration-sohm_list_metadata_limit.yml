# Although only one SMLI record is used/checksummed, the on-disk allocation
# reserves all 50 configured slots.  The metadata counter charges that full
# allocation and saturates at this reduced ceiling.
file: valid/sohm_list.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_accounted_metadata_bytes: 400
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_ACCOUNTED_METADATA_BYTES]
expected_metrics:
  metadata_bytes_seen: 400
forbidden: [crash, timeout, external_open, plugin_load, write]
