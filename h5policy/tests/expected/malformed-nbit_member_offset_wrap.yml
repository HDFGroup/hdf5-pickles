# An n-bit compound whose single member is declared at byte offset 0xFFFFFFF0 --
# exactly the compound's own declared size -- so the member lies entirely outside
# the type it belongs to.
#
# libhdf5's decompressor takes the cd_values type tree on trust: H5Z__nbit_decompress
# allocates the COMPOUND node's declared size and writes each member at its declared
# offset.  On the corpus specimen that is a heap-buffer-overflow WRITE in
# H5Z__nbit_decompress_one_nooptype -- one byte past a 4294967280-byte region.
#
# What makes this worth a fixture: every parameter INDEX stays inside cd_nelmts, so
# the pre-existing structural walk (H5_CORRUPT_NBIT_PARAMS_OVERRUN) is satisfied.
# The numbers are in range; they just describe a type that cannot exist.  h5policy
# therefore ACCEPTED the specimen -- accept_with_warnings, exit 1 -- until the
# member-bounds check was added.  This fixture is the guard for that check: it
# fails if the check is removed.
#
# LIMITATION, stated so nobody mistakes the canary status for safety: this
# generated file does NOT reproduce libhdf5's crash (both builds report
# `accepted`), because reproducing it also needs the specimen's chunk contents and
# NOOPTYPE member, not just the wrapped offset.  The crash evidence lives with the
# specimen in cases/GHSA-xj9h-m4g7-fw64-43; this row pins the ORACLE check only.
# Hence allowed_statuses [verified] rather than [violation].
file: malformed/nbit_member_offset_wrap.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_NBIT_MEMBER_BOUNDS]
h5cve: {family: dataset_layout_filter_fill, allowed_statuses: [verified]}
forbidden: [accept, crash, timeout, external_open, plugin_load, write]
