# VDS mapping count overstated by one, with the heap object's checksum repaired.
#
# The virtual_dataset canary specimen. Overstating the count by one keeps the
# arithmetic ordinary: libhdf5 opens the file (h5ls -r exits 0) and rejects
# while decoding the second, non-existent mapping (h5dump exits 1), with no
# crash and no source-file open. Its sibling cve/vds_nentries_mult_overflow.h5
# sets the count to 2^61, which crashes the selected libhdf5 and so never
# reaches the family surface.
file: malformed/vds_nentries_overcount.h5
profile: legacy
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_VDS_SOURCE_NAME]
h5cve:
  family: virtual_dataset
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [accept, unsupported_coverage_gap, crash, timeout, external_open, plugin_load, write]
