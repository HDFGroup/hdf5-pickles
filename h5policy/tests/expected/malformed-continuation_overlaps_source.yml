# Object-header continuation family: the root header's continuation message
# points a few bytes INTO its own source chunk (root_off + 4, just past the OHDR
# signature) instead of to a separate continuation block.  The old walk rejected
# a continuation only on an exact address match against the message-region
# start, so a target landing inside the chunk -- with a start address nobody had
# claimed -- evaded the self-reference test, the visited-address set, and the
# file-bounds test, then got followed and counted.  The interval model rejects
# any target that shares a byte with an already-decoded chunk before it is
# counted or recursed into, so the self-overlap is the primary finding.
file: malformed/continuation_overlaps_source.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_SELF_REFERENTIAL_CONTINUATION]
expected_analysis:
  complete: false
  walk_started: true
  walk_completed: false
  stop_reason: rejection
  continue_after_rejection: false
  findings_truncated: false
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: object_header_continuation
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
expected_finding_evidence_locations:
  H5_CORRUPT_SELF_REFERENTIAL_CONTINUATION:
  - role: actual
    length: 8
    little_endian_value: 52
  - role: actual_source
    length: 147
forbidden: [crash, timeout, external_open, plugin_load, write]
