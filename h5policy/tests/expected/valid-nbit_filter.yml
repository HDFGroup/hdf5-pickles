# A well-formed n-bit dataset with a compound datatype (int32 + int16), produced
# by repacking a normal dataset through libhdf5 (h5repack -f NBIT), since h5py
# cannot write n-bit.  Structurally valid, so h5policy accepts -- but reading the
# data requires decoding untrusted bytes, so the decision carries the decode-filter
# advisory.  Its cd_values type tree is self-consistent (the compound's nmembers
# and every atomic node stay within the client-data array), so the n-bit
# parameter-bounds walk must NOT fire: this is the regression guard, against real
# libhdf5 output, that the walk does not false-reject a valid n-bit tree.
file: valid/nbit_filter.h5
profile: untrusted-strict
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_DECODE_FILTER]
forbidden: [crash, timeout, external_open, plugin_load, write]
