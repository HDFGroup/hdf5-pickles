# The valid shuffle+gzip pipeline contains two descriptors.  Lowering only the
# per-pipeline filter ceiling to one produces a resource finding while parsing
# continues far enough to retain the gzip advisory and all four chunk records.
file: integration/multi_filter_dataset.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_filter_count: 1
expected_decision: reject_resource
expected_exit: 4
required_findings:
  - H5_RESOURCE_FILTER_COUNT
  - H5_ADVISORY_DECODE_FILTER
forbidden_findings: [H5_RESOURCE_CHUNK_COUNT]
expected_metrics:
  chunk_index_refs: 4
expected_features:
  decode_filters: [1]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dataset_layout_filter_fill
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
