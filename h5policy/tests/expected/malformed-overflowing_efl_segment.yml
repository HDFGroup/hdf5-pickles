# An external-file-list slot's external offset is patched so offset plus segment
# size wraps uint64.  Even trusted-fast must reject the malformed extent before
# an external file is opened or the wrapped range is used.
file: malformed/overflowing_efl_segment.h5
profile: trusted-fast
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_EXTERNAL_FILE_LIST_SEGMENT_OVERFLOW]
forbidden: [crash, timeout, external_open, plugin_load, write]
