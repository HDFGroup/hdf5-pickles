# Object-header NIL messages must account for the free space they represent;
# a checksum-valid NIL message leaving a gap is rejected by libhdf5.
file: malformed/bad_null_message_gap.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_NULL_MESSAGE_GAP]
forbidden: [crash, timeout, external_open, plugin_load, write]
