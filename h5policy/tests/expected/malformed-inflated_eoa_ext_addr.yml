# End-of-allocation bypass: the superblock inflates the declared end-of-file
# above an out-of-file superblock extension address, so a naive
# `addr < declared EOA` bounds check would accept the extension address even
# though it sits far past the physical image.  h5policy checks superblock
# addresses against the physical file size and caps its walk ceiling at
# min(declared EOF, physical), so the out-of-file address is still rejected --
# an attacker cannot buy address space past the file image by lying in the
# superblock.  Regression guard for that min() defense.  Built by
# h5policy-gencorpus from a valid empty file.
file: malformed/inflated_eoa_ext_addr.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_OFFSET_OUT_OF_FILE]
h5cve:
  family: address_space_bounds
  require_oracle_alignment: true
  allowed_statuses: [unexercised, violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
