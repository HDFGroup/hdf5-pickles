# This otherwise-valid dense-link heap has one stored byte flipped in its FRHP
# header checksum.  The header must be rejected before its heap geometry and
# block addresses are trusted.
file: malformed/bad_dense_frhp_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: heap_structures
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
