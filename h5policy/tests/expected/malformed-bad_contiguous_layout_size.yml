# A contiguous dataset's dataspace is patched from six elements to zero while
# its layout still declares 24 bytes of storage.  The cross-message mismatch is
# invalid metadata, not a resource limit; libhdf5 rejects it as a bad size.
file: malformed/bad_contiguous_layout_size.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_CONTIGUOUS_LAYOUT_SIZE_MISMATCH]
forbidden: [crash, timeout, external_open, plugin_load, write]
