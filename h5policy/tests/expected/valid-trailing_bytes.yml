# A normal dataset with a deterministic 16-byte physical trailer after the
# superblock's declared EOA.  The trailer is outside HDF5's address space, so it
# is reported as geometry and does not change the acceptance decision.
file: valid/trailing_bytes.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
expected_geometry:
  trailing_bytes: 16
forbidden: [crash, timeout, external_open, plugin_load, write]
