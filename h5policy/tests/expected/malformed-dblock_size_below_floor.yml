# A fractal heap declares start_block_size=1, so its root DIRECT block is one
# byte -- shorter than the block's own prefix (signature 4, version 1, heap
# header address, block offset) plus the four-byte checksum.
#
# libhdf5 allocates exactly block_size and then reads the checksum at the prefix
# offset: heap-buffer-overflow READ in H5HF__cache_dblock_verify_chksum
# (H5HFcache.c:1600), "16 bytes after 1-byte region", confirmed on an ASAN build
# of 2.2.0.  Stock 2.2.0 does not fault, so the canary here is unexercised
# rather than violation -- the uninstrumented build this matrix runs against
# rejects in traversal with nothing observable to report.
#
# Paired with malformed-dblock_size_below_floor_nochecksum.yml: identical file
# except that the heap does NOT checksum direct blocks.  See that fixture for
# why the pair exists.  Source: cases/GHSA-7ggx-c45p-66ph-61.
file: malformed/dblock_size_below_floor.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LENGTH_OVERFLOW]
h5cve: {family: heap_structures, allowed_statuses: [unexercised]}
forbidden: [crash, timeout, external_open, plugin_load, write]
