# A group's compact link message whose one-byte name is a NUL.  The compact
# link name is stored without a terminator, so libhdf5 decodes an empty link
# name and refuses to open the file.  The v2 object-header checksum is re-sealed
# so the empty name -- not a checksum mismatch -- is the defect h5policy must
# reject.  Regression for a false-accept unmasked once shared attribute
# datatypes started resolving.
file: malformed/nul_compact_link_name.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LINK_NAME_EMPTY]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dense_index
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
