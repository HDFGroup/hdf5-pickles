# A free section is given a class type outside the manager's declared class
# table; the section-list checksum is repaired so only the bad type remains.
file: malformed/bad_fsm_section_type.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FSM_SECTION_TYPE]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: validation_controls
  # The free_space canary (H5Fget_free_sections) is this family's exact-build
  # surface.  As with the list checksum, libhdf5 validates the section type and
  # rejects (aligned with the oracle), so no section is reported.
  allowed_statuses: [unexercised]
forbidden: [crash, timeout, external_open, plugin_load, write]
