# A structurally valid external link is forbidden by untrusted-strict.  The
# in-file link metadata is sufficient for the policy decision; the target file
# must never be opened.
file: policy/external_link.h5
profile: untrusted-strict
expected_decision: reject_policy
expected_exit: 3
required_findings: [H5_POLICY_EXTERNAL_LINK]
h5cve: {family: external_link, allowed_statuses: [violation]}
forbidden: [crash, timeout, external_open, plugin_load, write]
