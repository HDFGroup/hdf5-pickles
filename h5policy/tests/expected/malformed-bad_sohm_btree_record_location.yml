# A BTLF record has an invalid location tag under a repaired leaf checksum.
file: malformed/bad_sohm_btree_record_location.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_SOHM_LOCATION]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: shared_messages_legacy
  require_oracle_alignment: true
  # GENUINE gap: unlike the cycle/checksum cases, libhdf5 does not reject
  # this even on the write path (H5Dcreate2 succeeds, identically to the
  # valid base), so the record location is never validated at all. See
  # registry/cases/sohm-index-divergences.yml.
  allowed_statuses: [violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
