# The free-space manager header's total section count is bumped so the identity
# serial + ghost == total no longer holds; the header checksum is repaired.
file: malformed/bad_fsm_section_count.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FSM_SECTION_COUNT]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: validation_controls
  # The free_space canary (H5Fget_free_sections) is this family's exact-build
  # surface, and it reaches the family here: libhdf5 OPENS this file and reports
  # 8 free sections, none out of bounds, where the oracle rejects the encoded
  # count.  `verified` means the CANARY ran -- the row is simultaneously
  # verified and oracle_alignment: divergent.  UNINVESTIGATED: see
  # registry/cases/fsm-section-divergences.yml.  Provisional; NOT a judgement
  # that the divergence is benign.
  allowed_statuses: [verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
