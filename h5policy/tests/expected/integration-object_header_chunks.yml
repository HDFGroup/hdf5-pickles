# This valid root header uses three continuation messages.  The second crosses
# a reduced cumulative ceiling of one; the public counter saturates there even
# though structural continuation validation remains independent.
file: valid/continuation_chunks.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_object_header_chunks: 1
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_OBJECT_HEADER_CHUNKS]
expected_metrics:
  object_header_chunk_count: 1
forbidden: [crash, timeout, external_open, plugin_load, write]
