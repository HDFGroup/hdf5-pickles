# An old-style group's local heap free-list head points outside the heap data
# segment.  libhdf5 rejects this while initializing the local heap free list.
file: malformed/bad_heap_free_list.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_LOCAL_HEAP_FREE_LIST
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: heap_structures
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
