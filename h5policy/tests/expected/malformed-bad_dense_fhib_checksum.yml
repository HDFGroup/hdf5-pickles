# This otherwise-valid dense-link heap has one stored byte flipped in an FHIB
# indirect-block checksum.  The indirect block must be rejected before its
# child block addresses are followed.
file: malformed/bad_dense_fhib_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: heap_structures
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
