# A structurally valid external-file-list message is forbidden by
# untrusted-strict.  h5policy rejects from the in-file descriptor without
# opening or reading the external payload.
file: policy/external_storage.h5
profile: untrusted-strict
expected_decision: reject_policy
expected_exit: 3
required_findings: [H5_POLICY_EXTERNAL_STORAGE]
forbidden: [crash, timeout, external_open, plugin_load, write]
