# Compact link declares an ASCII name but contains a high-bit byte.
#
# libhdf5 does NOT reject this: h5dump, h5ls -r and h5py all traverse the file
# and return the name with its high-bit byte intact, so the declared charset is
# not enforced. h5policy is deliberately stricter. See
# registry/cases/link-name-charset-unenforced.yml.
file: malformed/bad_link_name_charset.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LINK_NAME_CHARSET]
# The only malformed fixture exercising dense_index. It is a known divergence,
# not a passing canary: the status is allowed so the matrix stays green, and
# the reason is recorded in the registry case rather than left unexplained.
h5cve:
  family: dense_index
  require_oracle_alignment: true
  allowed_statuses: [violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
