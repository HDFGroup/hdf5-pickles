# The superblock extension address IS the root group's object header, so one
# header is claimed by both the file-level extension and the object graph.  The
# extension is not part of that graph: libhdf5 loads it in its own metadata-
# cache ring and then refuses to re-protect it as a group ("ring type mismatch
# occurred for cache entry"), so the file opens but the root group does not.
#
# h5policy walks the extension BEFORE the root, so the duplicate-enqueue
# suppression that exists for hard links used to merge the two roles silently:
# the file was accepted, and any finding inside the aliased header was reported
# against /<superblock-extension> instead of the object's real path.  Regression
# guard for that.  Built by h5policy-gencorpus from a valid one-dataset file;
# unlike inflated_eoa_ext_addr the address is a perfectly good in-file object
# header, and only the aliasing is wrong.
file: malformed/ext_addr_aliases_root.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_SUPERBLOCK_EXTENSION_ALIAS]
h5cve:
  family: address_space_bounds
  require_oracle_alignment: true
  # `unexercised`, not `verified`: libhdf5 opens this file, so the address_space
  # exercise is selected and completes, but H5Ovisit3 then FAILS on the aliased
  # root group -- the surface is driven, not satisfied.  That is the expected
  # result for a malformed fixture and is what makes the row evidence: the build
  # under test refuses the same file the oracle refuses.
  allowed_statuses: [unexercised]
forbidden: [crash, timeout, external_open, plugin_load, write]
