# The fixture's datatype and fill value are one byte, but its valid attribute
# holds four bytes.  A reduced ceiling therefore isolates the attribute site.
file: integration/value_sites.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_single_value_bytes: 2
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_SINGLE_VALUE_BYTES]
expected_metrics:
  attribute_count: 1
forbidden: [crash, timeout, external_open, plugin_load, write]
