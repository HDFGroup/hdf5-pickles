# Dataset object header whose Data Layout message type byte is overwritten with
# Null, so the header has a dataspace and datatype but no layout message.
# libhdf5's H5D__layout_oh_read rejects the open; h5policy used to accept it.
file: malformed/bad_dataset_missing_layout.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATASET_MISSING_LAYOUT]
forbidden: [crash, timeout, external_open, plugin_load, write]
