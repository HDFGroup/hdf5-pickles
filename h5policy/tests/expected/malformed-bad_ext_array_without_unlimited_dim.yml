# An extensible-array chunk index is used, but the dataspace no longer encodes
# any unlimited maximum dimension.  libhdf5 rejects this while opening the
# chunked dataset.
file: malformed/bad_ext_array_without_unlimited_dim.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_CHUNK_INDEX_WITHOUT_UNLIMITED_DIM]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: chunk_index
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
