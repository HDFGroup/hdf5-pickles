# The same valid dataset has four fixed-array chunks.  A reduced ceiling of one
# rejects the resource shape and saturates the mixed chunk-accounting metric at
# that ceiling; it does not reclassify the index as corrupt.
file: integration/multi_filter_dataset.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_chunk_count: 1
expected_decision: reject_resource
expected_exit: 4
required_findings:
  - H5_ADVISORY_DECODE_FILTER
  - H5_RESOURCE_CHUNK_COUNT
forbidden_findings: [H5_RESOURCE_FILTER_COUNT]
expected_metrics:
  chunk_index_refs: 1
expected_features:
  decode_filters: [1]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dataset_layout_filter_fill
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
