# The same external-link file that untrusted-strict rejects is accepted under
# trusted-fast, which permits external references (h5policy still records the
# feature; it just does not deny it).  Because the feature is permitted, the
# target file name is classified: "other.h5" is a plain relative path, so the
# relative-target advisory fires (matching the external-storage and VDS source
# classifiers).  The target file is still never opened.
file: policy/external_link.h5
profile: trusted-fast
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_EXTERNAL_LINK_RELATIVE_PATH]
h5cve: {family: external_link, allowed_statuses: [violation]}
forbidden: [accept, crash, timeout, external_open, plugin_load, write]
