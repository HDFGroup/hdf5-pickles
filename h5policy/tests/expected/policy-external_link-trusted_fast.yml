# The same external-link file that untrusted-strict rejects is accepted under
# trusted-fast, which permits external references (h5policy still records the
# feature; it just does not deny it).
file: policy/external_link.h5
profile: trusted-fast
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden: [crash, timeout, external_open, plugin_load, write]
