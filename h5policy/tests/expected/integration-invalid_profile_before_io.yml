# The path is deliberately absent.  Invalid profile configuration must produce
# a normal internal-error report before h5policy attempts to open the file.
file: integration/not-created-invalid-profile.h5
allow_missing_file: true
profile: untrusted-strict
profile_overrides:
  analysis:
    max_walk_seconds: 0
expected_decision: internal_error
expected_exit: 70
required_findings: [H5_INTERNAL_INVALID_PROFILE]
forbidden: [timeout, external_open, plugin_load, write]
