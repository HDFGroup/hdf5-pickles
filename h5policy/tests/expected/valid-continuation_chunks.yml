# Regression guard for two v2 object-header bugs found on a real file:
#  1. continuation chunks are OCHK(4) + messages + checksum(4); the checksum
#     was being parsed as a message ("payload overruns chunk"), and
#  2. a chunk's trailing gap (< a message prefix) was parsed as a message
#     ("prefix overruns chunk").
# libhdf5 opens this file, so h5policy must accept it.
file: valid/continuation_chunks.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
h5cve:
  family: message_envelope
  allowed_statuses: [verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
