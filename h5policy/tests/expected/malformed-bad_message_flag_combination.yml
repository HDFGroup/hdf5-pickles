# A symbol-table object-header message has WAS_UNKNOWN set without
# MARK_IF_UNKNOWN.  libhdf5 rejects this invalid object-header message flag
# combination while decoding the object header.
file: malformed/bad_message_flag_combination.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_MESSAGE_FLAG_COMBINATION]
h5cve:
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
