# The first byte of an otherwise-valid HDF5 signature is flipped.  Even the
# forensic profile must fail cleanly with the signature finding rather than
# treating arbitrary bytes as a superblock.
file: malformed/bad_signature.h5
profile: forensic
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_SIGNATURE]
expected_geometry:
  declared_eoa: null
  trailing_bytes: null
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: validation_controls
  # The free_space canary (H5Fget_free_sections) is this family's exact-build
  # surface.  libhdf5 rejects this file at H5Fopen, so no free-space manager is
  # ever reachable and the canary correctly cannot complete.
  allowed_statuses: [unexercised]
forbidden: [crash, timeout, external_open, plugin_load, write]
