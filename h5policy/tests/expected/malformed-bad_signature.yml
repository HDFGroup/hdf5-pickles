# The first byte of an otherwise-valid HDF5 signature is flipped.  Even the
# forensic profile must fail cleanly with the signature finding rather than
# treating arbitrary bytes as a superblock.
file: malformed/bad_signature.h5
profile: forensic
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_SIGNATURE]
expected_geometry:
  declared_eoa: null
  trailing_bytes: null
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: validation_controls
  # validation_controls is a controls family (budgets, base address,
  # free-space managers, profile validity) with no single traversal
  # surface, so it has no exact-build canary; coverage_gap is the
  # honest status here, not a stand-in for success.
  allowed_statuses: [coverage_gap]
forbidden: [crash, timeout, external_open, plugin_load, write]
