# A child leaf below the type-6 creation-order root has a damaged checksum.
file: malformed/bad_dense_link_corder_leaf_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: heap_structures
  require_oracle_alignment: true
  # GENUINE gap: libhdf5 does not verify creation-order B-tree leaf checksums
  # for dense LINK storage, the same gap recorded for dense attributes in
  # registry/cases/dense-corder-leaf-checksum.yml.
  allowed_statuses: [violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
