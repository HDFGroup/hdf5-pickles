# A datatype header declares class reference with an unsupported version.
# h5policy-fuzz found this by splicing "GCOL" over a compound datatype header;
# libhdf5 rejects the resulting reference datatype.
file: malformed/bad_reference_datatype_version.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_UNSUPPORTED_DATATYPE_VERSION]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: datatypes
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
