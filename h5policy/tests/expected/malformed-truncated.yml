# A valid empty latest-format file is cut to its first 32 bytes, leaving the
# superblock incomplete and omitting the root metadata.  Forensic mapping must
# reject the short image cleanly instead of reading beyond it.
file: malformed/truncated.h5
profile: forensic
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_MAPPING_FAILED]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: shared_messages_legacy
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
