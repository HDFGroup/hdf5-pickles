# A legacy chunked layout stores dataset-rank+1 dimensions.  This fixture
# patches the dataspace rank to zero while leaving a three-dimensional chunked
# layout, which libhdf5 rejects when opening the dataset.
file: malformed/bad_layout_rank_mismatch.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_LAYOUT_RANK_MISMATCH]
expected_finding_evidence:
  H5_CORRUPT_LAYOUT_RANK_MISMATCH:
    field: layout.legacy_chunk_dimensions
    actual: 3
    expected: 1
    comparison: equal
expected_finding_evidence_locations:
  H5_CORRUPT_LAYOUT_RANK_MISMATCH:
    - role: actual
      length: 1
      little_endian_value: 3
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dataset_layout_filter_fill
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
