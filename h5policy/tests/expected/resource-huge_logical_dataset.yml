# A late-allocated contiguous dataset declares 2**34 float64 elements: 128 GiB
# logically, while the physical file stays tiny.  The shape is valid HDF5, but
# untrusted-strict rejects it as a resource hazard without allocating the data.
file: resource/huge_logical_dataset.h5
profile: untrusted-strict
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_LOGICAL_DATASET_BYTES]
forbidden: [crash, timeout, external_open, plugin_load, write]
