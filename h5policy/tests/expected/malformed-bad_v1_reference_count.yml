# A reference-count object-header message is only valid in v2 object headers.
# libhdf5 rejects this message class when it appears in a v1 object header.
file: malformed/bad_v1_reference_count.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_REFERENCE_COUNT_IN_V1_OBJECT_HEADER]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: shared_messages_legacy
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
