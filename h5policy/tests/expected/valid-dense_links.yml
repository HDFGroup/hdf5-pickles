# Regression guard for dense link storage (fractal heap + name v2 B-tree).
# h5policy enumerates the links and enqueues each child object header; all 40
# children plus the group and root must be reached and accepted.
file: valid/dense_links.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
h5cve:
  family: dense_index
  allowed_statuses: [verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
