# A minimized, multi-fault distillation of the libhdf5 `invalid_read` seed.  The
# original 950 KB file held 24 filter/type datasets plus a 900 KB trailing
# garbage region; only three scale-offset `_le` datasets carried faults.  This
# fixture keeps just those three, each fault byte-identical to the seed, in a
# single ~5 KB old-style (symbol-table) file.  Every fault lives inside an
# unchecksummed v1 object header, so h5policy-gencorpus embeds the three headers
# verbatim (base64) and repoints a fresh h5py-built symbol-table container at
# them; the one external reference each header carries -- the chunked-layout
# B-tree address -- is neutralized to the undefined sentinel, so the fixture
# needs no raw data or chunk index.  One pass must surface all four faults across
# the three datasets, which is the multi-fault reporting this fixture guards:
#   * Scale_offset_float_data_le     -> H5_CORRUPT_LAYOUT_RANK_MISMATCH
#     (layout dimensionality disagrees with the dataspace rank)
#   * Scale_offset_double_data_le    -> H5_POLICY_UNKNOWN_MESSAGE
#     (object-header message with an unrecognized type)
#   * Scale_offset_long_long_data_le -> H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT
#     and H5_CORRUPT_FILTER_NELMTS_MISMATCH (chunk dimension byte-size exceeds
#     32 bits; scale-offset cd_values[2] disagrees with the chunk element count)
# libhdf5 cannot traverse the file (h5ls reports the long_long dataset as
# *ERROR* and h5dump errors), so the reject is sound under invariant A'.
file: malformed/multifault_scaleoffset.h5
profile: untrusted-strict
# Continue past the first rejection so the single pass reports every fault; the
# whole point of this fixture is multi-fault coverage.  In default stop-at-first
# mode the walk would halt at whichever fault it reaches first (a policy
# rejection on the unknown message) and never surface the corrupt findings.
mode_flags: [--continue-after-rejection]
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_LAYOUT_RANK_MISMATCH
  - H5_POLICY_UNKNOWN_MESSAGE
  - H5_CORRUPT_CHUNK_SIZE_EXCEEDS_32BIT
  - H5_CORRUPT_FILTER_NELMTS_MISMATCH
forbidden: [crash, timeout, external_open, plugin_load, write]
