# Superblock base address does not equal the superblock's own location.  libhdf5
# measures the EOA relative to base, so a wrong base shifts every address and it
# rejects with "actual len exceeds EOA".  h5policy used to only check base <
# filesize.  Found by the structure-aware fuzzer (h5policy-fuzz, super strategy).
file: malformed/bad_base_address.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BASE_ADDRESS_MISMATCH]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: validation_controls
  # The free_space canary (H5Fget_free_sections) is this family's exact-build
  # surface.  libhdf5 rejects in traversal, before the free-space manager is
  # reachable, so the canary correctly cannot complete.
  allowed_statuses: [unexercised]
forbidden: [crash, timeout, external_open, plugin_load, write]
