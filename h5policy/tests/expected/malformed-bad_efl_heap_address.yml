# A valid external-file-list message is patched so its filename local-heap
# address lies far outside the file.  trusted-fast permits external storage but
# must still reject this in-file pointer without opening any external payload.
file: malformed/bad_efl_heap_address.h5
profile: trusted-fast
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_OFFSET_OUT_OF_FILE]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: heap_structures
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
