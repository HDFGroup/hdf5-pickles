# One free section's [address, size) extent is moved beyond the end of the
# allocated file and the section-list checksum is repaired, so the out-of-file
# extent is the only surviving fault.
file: malformed/bad_fsm_section_extent.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_OFFSET_OUT_OF_FILE]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: validation_controls
  # The free_space canary (H5Fget_free_sections) is this family's exact-build
  # surface, and it reaches the family here: libhdf5 OPENS this file and reports
  # 7 free sections, 1 of them outside the file image
  # (probe counter free_sections_out_of_bounds=1), where the oracle rejects.
  # `verified` means the CANARY ran -- the row is simultaneously verified and
  # oracle_alignment: divergent.  UNINVESTIGATED: see
  # registry/cases/fsm-section-divergences.yml.  Provisional; NOT a judgement
  # that the divergence is benign.
  allowed_statuses: [verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
