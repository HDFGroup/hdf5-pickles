# One free section's [address, size) extent is moved beyond the end of the
# allocated file and the section-list checksum is repaired, so the out-of-file
# extent is the only surviving fault.
file: malformed/bad_fsm_section_extent.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_OFFSET_OUT_OF_FILE]
forbidden: [crash, timeout, external_open, plugin_load, write]
