# Regression guard for dense attribute storage (fractal heap + name v2 B-tree).
# h5policy resolves each heap object and validates it as an attribute message.
# (Was a coverage gap before fractal-heap traversal was implemented.)
file: valid/dense_attribute.h5
profile: untrusted-strict
