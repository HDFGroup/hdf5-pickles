# A version-1 compound whose single member starts far past the compound element:
# member "a" (a 4-byte integer) declares byte offset 0xFFFFFF00 inside a compound
# element of only 16 bytes.  libhdf5 accumulates member offset + size, and on a
# 32-bit size_t 0xFFFFFF00 + 4 wraps back below the element size -- the classic
# integer-overflow path to a member landing outside the element, where any
# conversion or access is an out-of-bounds heap write.  h5policy reasons about
# the raw on-disk offset in 64 bits and guards member_off > elm_size before
# subtracting, so it rejects the member as extending outside its parent type.
# Built by h5policy-gencorpus, which splices a hand-built v1 compound datatype
# into a compact dataset header of matching element size.
file: malformed/compound_member_offset_oob.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATATYPE_COMPOUND_MEMBER_BOUNDS]
forbidden: [crash, timeout, external_open, plugin_load, write]
