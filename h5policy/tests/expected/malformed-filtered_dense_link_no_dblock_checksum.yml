# Dense link storage whose fractal heap declares an I/O filter pipeline
# (scale-offset) but leaves the "direct blocks are checksummed" header flag
# clear.  libhdf5 always writes this flag set for dense link/attribute heaps,
# so the combination is malformed.  It is also a memory-safety hazard: with the
# flag clear, H5HF__cache_dblock_verify_chksum short-circuits and never
# allocates the direct-block buffer, so H5HF__cache_dblock_deserialize then
# memcpy()s the reverse-filtered bytes into a NULL block (H5HFcache.c) -- a raw
# fuzz seed with a real filtered root block segfaults h5dump there.  h5policy
# must reject the header outright rather than report a bare fractal-heap
# coverage gap.  Built by h5policy-gencorpus, which rewrites a valid dense-link
# FRHP header into the filtered, flag-clear form.
file: malformed/filtered_dense_link_no_dblock_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FILTERED_HEAP_NO_DBLOCK_CHECKSUM]
forbidden: [crash, timeout, external_open, plugin_load, write]
