# A compound datatype declaring zero members (libhdf5: 'invalid number of members: 0').
# h5dump/libhdf5 fails on it; h5policy used to wrongly accept.  Byte-patched
# from a v1-header base by gencorpus.
file: malformed/bad_compound.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATATYPE_ZERO_MEMBERS]
forbidden: [crash, timeout, external_open, plugin_load, write]
