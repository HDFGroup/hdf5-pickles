# The reduced ceiling permits the header and root but not the first complete
# child node.  Accounting charges each fixed node allocation and then stops
# recursive descent after saturating the public metric.
file: valid/chunk_v2_btree_deep.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_accounted_metadata_bytes: 4096
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_ACCOUNTED_METADATA_BYTES]
expected_metrics:
  metadata_bytes_seen: 4096
forbidden: [crash, timeout, external_open, plugin_load, write]
