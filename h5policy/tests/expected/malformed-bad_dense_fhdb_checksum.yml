# This otherwise-valid dense-link heap has one stored byte flipped in an FHDB
# direct-block checksum.  The direct block must be rejected before heap-resident
# link messages are decoded.
file: malformed/bad_dense_fhdb_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
forbidden: [crash, timeout, external_open, plugin_load, write]
