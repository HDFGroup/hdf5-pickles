# Dense-attribute v2 B-tree with checksum-valid depth 120.  Forensic permits
# that depth, so this exercises the saturated subtree-counter-width helper.
file: malformed/bad_dense_attr_btree_deep.h5
profile: forensic
expected_decision: reject_corrupt
expected_exit: 2
required_findings:
  - H5_CORRUPT_OFFSET_OUT_OF_FILE
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: heap_structures
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
expected_finding_evidence_locations:
  H5_CORRUPT_OFFSET_OUT_OF_FILE:
  - role: actual
    length: 8
    little_endian_value: 403473516558
forbidden:
  - crash
  - timeout
  - external_open
  - plugin_load
  - write
