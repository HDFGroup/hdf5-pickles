# A dataset carrying a non-empty object comment (name message, type 0x0D), set
# through libhdf5 (H5Oset_comment).  Structurally valid and self-contained, so
# h5policy accepts it outright.  This is the regression guard that the empty-name
# check (H5_CORRUPT_NAME_MESSAGE_EMPTY, which rejects a zero-length 0x0D message
# whose H5O__name_decode would underflow p_size-1 to SIZE_MAX) does not
# false-reject a well-formed, NUL-terminated comment string.
file: valid/object_comment.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden: [crash, timeout, external_open, plugin_load, write]
