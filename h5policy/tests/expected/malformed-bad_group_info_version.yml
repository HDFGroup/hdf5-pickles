# Group-info message payload version must be zero; libhdf5 rejects other
# versions while decoding group creation info.
file: malformed/bad_group_info_version.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_UNSUPPORTED_GROUP_INFO_VERSION]
# message_envelope canary that reaches the family surface: libhdf5 rejects this
# only once the group creation property list is decoded, so the probe exercise
# must call H5Gget_create_plist to reach it.
h5cve:
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [verified, unexercised]
forbidden: [crash, timeout, external_open, plugin_load, write]
