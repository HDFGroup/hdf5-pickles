# A structurally valid rank-one dataset exceeds a deliberately lower custom
# profile ceiling while remaining below HDF5's fixed rank-32 format ceiling.
file: valid/simple_dataset.h5
profile: untrusted-strict
profile_overrides:
  limits:
    max_rank: 0
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_DATASPACE_RANK]
expected_features:
  max_rank_seen: 1
forbidden_findings: [H5_CORRUPT_DATASPACE_RANK_TOO_LARGE]
forbidden: [crash, timeout, external_open, plugin_load, write]
