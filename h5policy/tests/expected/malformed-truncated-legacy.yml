# Compatibility bias still rejects genuinely unmappable bytes: even legacy maps
# strictly, so corruption is caught.
file: malformed/truncated.h5
profile: legacy
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_MAPPING_FAILED]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: shared_messages_legacy
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
