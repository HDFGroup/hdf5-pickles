# Modern libhdf5 stores attributes in a dense fractal-heap index; the pickles
# do not decode that yet, so a valid attribute-bearing file is "not yet
# classified" rather than accepted.  Flips to accept when coverage lands.
file: coverage/dense_attribute.h5
profile: untrusted-strict
expected_decision: unsupported_coverage_gap
expected_exit: 5
required_findings: [H5_UNSUPPORTED_PICKLE_COVERAGE_GAP]
forbidden: [crash, timeout, external_open, plugin_load, write]
