# Declared superblock EOF is <= the root object header address, so reachable
# metadata lies at/past the declared end-of-file.  libhdf5 rejects any address
# >= EOA even when the bytes are physically present; h5policy used to bound
# addresses against the physical file size.  Found by h5policy-fuzz (super/eof).
file: malformed/eof_past_metadata.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_OFFSET_OUT_OF_FILE]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: address_space_bounds
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
