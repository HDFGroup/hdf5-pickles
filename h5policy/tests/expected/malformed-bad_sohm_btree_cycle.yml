# A checksum-valid type-7 child pointer refers back to its visited BTIN root.
file: malformed/bad_sohm_btree_cycle.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_SOHM_BTREE_CYCLE]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: shared_messages_legacy
  require_oracle_alignment: true
  # Known divergence, explained: the SOHM v2 B-tree is a WRITE-side dedup
  # index. libhdf5 never traverses it on a read path (h5dump/h5ls/h5py all
  # accept), and the write path does consult it and rejects
  # (H5Dcreate2 fails, while it succeeds on valid/sohm_btree.h5). Lazy vs
  # eager validation, not a soundness gap. See
  # registry/cases/sohm-index-divergences.yml.
  allowed_statuses: [violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
