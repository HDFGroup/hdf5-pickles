# Dense link storage whose fractal-heap filter pipeline holds a version-1
# descriptor that runs past the declared I/O filter length: it announces two
# client-data values the encoded pipeline has no room for.  This is the shape
# of a "wrong decode buffer length" fuzz seed -- libhdf5 cannot enumerate the
# group, and h5policy must reject the header rather than trust the pipeline and
# fall through to a fractal-heap coverage gap.  Built by h5policy-gencorpus,
# which rewrites a valid dense-link FRHP header into the filtered form and
# plants the overrunning descriptor.
file: malformed/filtered_dense_link_pipeline_overrun.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FILTER_PIPELINE_OVERRUNS_MESSAGE]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dense_index
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
