# The valid compound datatype contains an array member at nesting depth two.
# A reduced depth-one ceiling rejects that shape as resource policy, not as a
# malformed datatype.
file: valid/nested_datatypes.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_datatype_recursion_depth: 1
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_DATATYPE_RECURSION_DEPTH]
forbidden_findings: [H5_CORRUPT_DATATYPE_RECURSION_LIMIT]
forbidden: [crash, timeout, external_open, plugin_load, write]
