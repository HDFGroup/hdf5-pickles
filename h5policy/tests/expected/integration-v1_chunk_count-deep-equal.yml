# The generated multi-level legacy index contains exactly 130 chunks.  A finite
# ceiling of 130 permits the complete recursive tree and every leaf record.
file: valid/chunked_v1_btree_deep.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_chunk_count: 130
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden_findings:
  - H5_RESOURCE_CHUNK_COUNT
  - H5_CORRUPT_BTREE_NODE_ENTRY_COUNT
expected_metrics:
  chunk_index_refs: 130
  visited_btree_refs: 6
forbidden: [crash, timeout, external_open, plugin_load, write]
