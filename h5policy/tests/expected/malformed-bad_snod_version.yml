# An old-style group's symbol-table node has an unsupported version.
# libhdf5 rejects SNOD version 0; h5policy used to accept it. Found by
# h5policy-fuzz from chunked_v1_btree.h5.
file: malformed/bad_snod_version.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_UNSUPPORTED_SYMBOL_TABLE_NODE_VERSION]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
