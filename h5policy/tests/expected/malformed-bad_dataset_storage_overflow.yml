# The dataset's element count multiplied by datatype size overflows uint64.
# libhdf5 rejects this as a corrupt storage-size overflow rather than a policy
# resource limit.
file: malformed/bad_dataset_storage_overflow.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_DATASET_STORAGE_OVERFLOW]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: dataset_layout_filter_fill
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
