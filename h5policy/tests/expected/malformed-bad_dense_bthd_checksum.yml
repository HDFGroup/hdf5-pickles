# This otherwise-valid dense-link index has one stored byte flipped in its BTHD
# v2 B-tree header checksum.  The header must be rejected before its tree
# geometry or root address is trusted.
file: malformed/bad_dense_bthd_checksum.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_BAD_CHECKSUM]
forbidden: [crash, timeout, external_open, plugin_load, write]
