# v2/v3 superblock extension address is a defined 0 (the superblock's own
# location) rather than HADDR_UNDEF.  libhdf5 tries to read an object header there
# and rejects; h5policy used to treat 0 as "no extension".  Found by h5policy-fuzz.
file: malformed/bad_ext_address.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_UNSUPPORTED_OBJECT_HEADER_VERSION]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: message_envelope
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
