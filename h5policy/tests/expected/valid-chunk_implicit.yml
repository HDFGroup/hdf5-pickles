# A fixed-shape, early-allocated dataset uses the v4 implicit chunk index: its
# chunks are contiguous from a base address and no index block exists.  The
# derived chunk extents must all validate without inventing an index read.
file: valid/chunk_implicit.h5
profile: untrusted-strict
expected_decision: accept
expected_exit: 0
required_findings: []
forbidden: [crash, timeout, external_open, plugin_load, write]
