# A real libhdf5-generated n-bit pipeline contains a nested parameter type.
# Reducing only its independent recursion ceiling to zero must report the
# resource limit while retaining the filter's ordinary decode advisory.
file: valid/nbit_filter.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_filter_parameter_recursion_depth: 0
expected_decision: reject_resource
expected_exit: 4
required_findings:
  - H5_ADVISORY_DECODE_FILTER
  - H5_RESOURCE_FILTER_PARAMETER_RECURSION_DEPTH
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: dataset_layout_filter_fill
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
