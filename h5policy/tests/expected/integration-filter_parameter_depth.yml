# A real libhdf5-generated n-bit pipeline contains a nested parameter type.
# Reducing only its independent recursion ceiling exercises the full pipeline.
file: valid/nbit_filter.h5
profile: untrusted-strict
profile_overrides:
  limits:
    max_filter_parameter_recursion_depth: 0
expected_decision: reject_resource
expected_exit: 4
required_findings:
  - H5_ADVISORY_DECODE_FILTER
  - H5_RESOURCE_FILTER_PARAMETER_RECURSION_DEPTH
forbidden: [crash, timeout, external_open, plugin_load, write]
