# Permitting external storage does not open the external file; h5policy still
# validates the complete in-file EFL payload and referenced local heap.
file: policy/external_storage.h5
profile: trusted-fast
expected_decision: accept_with_warnings
expected_exit: 1
required_findings: [H5_ADVISORY_EXTERNAL_STORAGE_RELATIVE_PATH]
forbidden: [crash, timeout, external_open, plugin_load, write]
