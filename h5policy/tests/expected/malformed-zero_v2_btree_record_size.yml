# A checksum-valid dense-link v2 B-tree header declares record_size=0.
# libhdf5 divides by this field while initializing node capacity: H5B2__hdr_init
# takes SIGFPE, and `h5dump -H` dies with it (verified on 2.2.0), which is why
# `violation` is the expected canary status rather than a rejection.
#
# family is dense_index, NOT chunk_index: the header's type byte is 5
# (H5B2_GRP_DENSE_NAME_ID) and the crash path runs H5Gget_info ->
# H5G__obj_get_linfo -> H5B2_open.  Chunk indexes are types 10/11.  This said
# chunk_index until 2026-07-22, when the shared geometry check started naming
# its role in the message so the finding registry could route it.
file: malformed/zero_v2_btree_record_size.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_V2_BTREE_RECORD_SIZE]
h5cve: {family: dense_index, allowed_statuses: [violation]}
forbidden: [crash, timeout, external_open, plugin_load, write]
