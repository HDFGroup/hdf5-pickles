# A free section whose size selects a free-list bin past the manager's bin
# array.  libhdf5 sizes sinfo->bins as H5VM_log2_gen(max_sect_size) entries and
# indexes it with H5VM_log2_gen(sect->size) without checking they agree; the
# fixture shrinks max_sect_size to 4096 (nbins = 12) and gives one section size
# 4096 (bin == nbins, one past the last slot), with the extent kept in-file so
# the bin-range fault is the ONLY one.  The full CVE PoCs additionally run the
# extent out of file.
file: malformed/bad_fsm_section_bin_range.h5
profile: untrusted-strict
expected_decision: reject_corrupt
expected_exit: 2
required_findings: [H5_CORRUPT_FSM_SECTION_SIZE_OVER_MAX]
h5cve:
  # Family named mechanically from the primary finding via registry/findings/.
  family: validation_controls
  # The free_space canary (H5Fget_free_sections) reaches the family: libhdf5
  # OPENS this file and deserializes the section, indexing sinfo->bins out of
  # bounds.  On the stock baseline the out-of-bounds access does not always
  # fault (it is heap-layout dependent -- here it silently reports the section),
  # so the row is `verified` and oracle_alignment: divergent, exactly like
  # bad_fsm_section_extent.  Under a sanitizer build the same access is a hard
  # heap-buffer-overflow in H5FS__sect_link_size, hence `violation` is allowed
  # too.  `verified` means the CANARY ran, NOT that libhdf5 is safe; see
  # registry/cases/fsm-section-bin-range.yml.
  allowed_statuses: [verified, violation]
forbidden: [crash, timeout, external_open, plugin_load, write]
