# A zero depth allowance refuses the genuine huge-object BTIN root before the
# later unsupported body-resolution boundary can be reached.
file: coverage/sohm_huge_btree.h5
profile: untrusted-strict
profile_overrides:
  resources:
    max_btree_depth: 0
expected_decision: reject_resource
expected_exit: 4
required_findings: [H5_RESOURCE_BTREE_DEPTH]
forbidden_findings: [H5_UNSUPPORTED_PICKLE_COVERAGE_GAP]
h5cve:
  # Family named mechanically from the primary finding via registry/findings.yml.
  family: shared_messages_legacy
  require_oracle_alignment: true
  allowed_statuses: [unexercised, verified]
forbidden: [crash, timeout, external_open, plugin_load, write]
